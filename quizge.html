0dc\u10d3\u10dd\u10d1\u10d0\u10e1 \u10e3\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10dd\u10d1\u10d8\u10e1 \u10d9\u10d0\u10dc\u10d3\u10d8\u10d3\u10d0\u10e2\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0\u10e1", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d0 \u10d8\u10e0\u10e9\u10d4\u10d5\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1, \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8 \u10d9\u10d8 \u10dc\u10d8\u10e8\u10dc\u10d0\u10d5\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d4\u10d1\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7", "correctanswer": "C"}, {"questionid": 55, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d5\u10d8\u10e1\u10d6\u10d4 \u10d5\u10e0\u10ea\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10d2\u10d0\u10e0\u10d0\u10dc\u10e2\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d0?", "answerA": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10d6\u10d4", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d0\u10e0\u10d0\u10e1\u10e0\u10e3\u10da\u10ec\u10da\u10dd\u10d5\u10d0\u10dc \u10de\u10d8\u10e0\u10d4\u10d1\u10d6\u10d4; 19 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d4\u10d1\u10e8\u10d8", "answerC": "\u10e7\u10d5\u10d4\u10da\u10d0\u10d6\u10d4, \u10d2\u10d0\u10dc\u10e3\u10e0\u10e9\u10d4\u10d5\u10da\u10d0\u10d3 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1\u10d0", "answerD": "\u10e7\u10d5\u10d4\u10da\u10d0\u10d6\u10d4, \u10d2\u10d0\u10e0\u10d3\u10d0 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0", "correctanswer": "C"}, {"questionid": 56, "questiontext": "\u10e0\u10d0 \u10e4\u10dd\u10e0\u10db\u10d8\u10d7 \u10db\u10dd\u10d8\u10de\u10dd\u10d5\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d0?", "answerA": "\u10e1\u10d0\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d3\u10d0\u10d1\u10d0\u10d3\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10d3\u10d0\u10d1\u10d0\u10d3\u10d4\u10d1\u10d8\u10d7 \u10d3\u10d0 \u10dc\u10d0\u10e2\u10e3\u10e0\u10d0\u10da\u10d8\u10d6\u10d0\u10ea\u10d8\u10d8\u10d7", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "correctanswer": "C"}, {"questionid": 57, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0?", "answerA": "\u10d3\u10d8\u10d0\u10ee, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0, \u10d7\u10e3 \u10db\u10d0\u10dc \u10e9\u10d0\u10d8\u10d3\u10d8\u10dc\u10d0 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10d7 \u10db\u10eb\u10d8\u10db\u10d4 \u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10d8", "answerB": "\u10d0\u10e0\u10d0, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0", "answerC": "\u10d0\u10e0\u10d0, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d2\u10d0\u10e0\u10d3\u10d0 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da\u10d8 \u10d2\u10d0\u10db\u10dd\u10dc\u10d0\u10d9\u10da\u10d8\u10e1\u10d8\u10e1\u10d0", "answerD": "\u10d3\u10d8\u10d0\u10ee, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0", "correctanswer": "B"}, {"questionid": 58, "questiontext": "\u10d5\u10d8\u10dc \u10db\u10d4\u10d7\u10d0\u10e3\u10e0\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0\u10e1?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "answerD": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "correctanswer": "C"}, {"questionid": 59, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0?", "answerA": "\u10d3\u10d8\u10d0\u10ee, \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7", "answerB": "\u10d0\u10e0\u10d0, \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10d1\u10e1\u10dd\u10da\u10e3\u10e2\u10e3\u10e0\u10d8\u10d0 \u10d3\u10d0 \u10db\u10d8\u10e1\u10d8 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0", "answerC": "\u10d3\u10d8\u10d0\u10ee, \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7; \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3", "answerD": "\u10d0\u10e0\u10d0, \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d2\u10d0\u10e0\u10d3\u10d0 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1\u10d0", "correctanswer": "A"}, {"questionid": 60, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7?", "answerA": "\u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3 \u10d3\u10d0 \u10e3\u10d8\u10d0\u10e0\u10d0\u10e6\u10dd\u10d3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e1\u10ec\u10d0\u10e0 \u10dc\u10d4\u10d1\u10d0\u10e0\u10d7\u10d5\u10d0\u10e1", "answerB": "\u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3 \u10d3\u10d0 \u10e3\u10d8\u10d0\u10e0\u10d0\u10e6\u10dd\u10d3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10d0\u10e0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e1\u10ec\u10d0\u10e0 \u10dc\u10d4\u10d1\u10d0\u10e0\u10d7\u10d5\u10d0\u10e1", "answerC": "\u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3 \u10d3\u10d0 \u10e3\u10d0\u10e0\u10d0\u10e6\u10dd\u10d3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1 \u10de\u10dd\u10da\u10d8\u10ea\u10d8\u10d8\u10e1 \u10dc\u10d4\u10d1\u10d0\u10e0\u10d7\u10d5\u10d0\u10e1", "answerD": "\u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3 \u10d3\u10d0 \u10e3\u10d8\u10d0\u10e0\u10d0\u10e6\u10d0\u10dd\u10d3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10dc\u10d4\u10d1\u10d0\u10e0\u10d7\u10d5\u10d0\u10e1", "correctanswer": "B"}, {"questionid": 61, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8? \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10eb\u10d0\u10da\u10d4\u10d1\u10d8\u10e1 \u10e3\u10db\u10d0\u10e6\u10da\u10d4\u10e1\u10d8 \u10db\u10d7\u10d0\u10d5\u10d0\u10e0\u10e1\u10d0\u10e0\u10d3\u10d0\u10da\u10d8 \u10d0\u10e0\u10d8\u10e1:", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "correctanswer": "B"}, {"questionid": 62, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8? \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d1\u10d8\u10e3\u10ef\u10d4\u10e2\u10e1 \u10d0\u10db\u10e2\u10d9\u10d8\u10ea\u10d4\u10d1\u10e1:", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "correctanswer": "D"}, {"questionid": 63, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 \u10d0\u10e0\u10d8\u10e1 \u10db\u10ea\u10d3\u10d0\u10e0\u10d8?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd \u10d0\u10e0\u10d8\u10e1 \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10e0\u10d4\u10e1\u10de\u10e3\u10d1\u10da\u10d8\u10d9\u10d0. \u10ee\u10d0\u10da\u10ee\u10d8 \u10eb\u10d0\u10da\u10d0\u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1 \u10d0\u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d4\u10d1\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d8 \u10ec\u10d0\u10e0\u10db\u10dd\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10d4\u10d1\u10d8\u10e1, \u10d0\u10d2\u10e0\u10d4\u10d7\u10d5\u10d4 \u10e0\u10d4\u10e4\u10d4\u10e0\u10d4\u10dc\u10d3\u10e3\u10db\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e3\u10e8\u10e3\u10d0\u10da\u10dd \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10d8\u10e1 \u10e1\u10ee\u10d5\u10d0 \u10e4\u10dd\u10e0\u10db\u10d4\u10d1\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd \u10d0\u10e0\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd, \u10d7\u10e3\u10db\u10ea\u10d0 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d4\u10d1\u10d8\u10e1\u10d0\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10e3\u10da\u10d8 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10d7\u10d0 \u10d3\u10d0 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10d7, \u10e0\u10dd\u10d2\u10dd\u10e0\u10ea \u10e3\u10e8\u10e3\u10d0\u10da\u10dd\u10d3 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d8 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10d7", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd \u10d0\u10e0\u10d8\u10e1 \u10e1\u10dd\u10ea\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d6\u10e0\u10e3\u10dc\u10d0\u10d5\u10e1 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8 \u10e1\u10dd\u10ea\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1, \u10e1\u10dd\u10ea\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10d7\u10d0\u10dc\u10d0\u10e1\u10ec\u10dd\u10e0\u10dd\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10dd\u10ea\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10dd\u10da\u10d8\u10d3\u10d0\u10e0\u10dd\u10d1\u10d8\u10e1 \u10de\u10e0\u10d8\u10dc\u10ea\u10d8\u10de\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10db\u10e2\u10d9\u10d8\u10ea\u10d4\u10d1\u10d0\u10d6\u10d4", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd \u10d0\u10e0\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd. \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10de\u10e0\u10d8\u10dc\u10ea\u10d8\u10de\u10d6\u10d4 \u10d3\u10d0\u10e7\u10e0\u10d3\u10dc\u10dd\u10d1\u10d8\u10d7", "correctanswer": "B"}, {"questionid": 64, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d0\u10e0\u10d8\u10e1 \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10e0\u10d4\u10e1\u10de\u10e3\u10d1\u10da\u10d8\u10d9", "answerA": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10ec\u10e7\u10d0\u10e0\u10dd\u10d0: \u10d0) \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "answerB": "\u10ee\u10d0\u10da\u10ee\u10d8", "answerC": "\u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerD": "\u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd", "correctanswer": "B"}, {"questionid": 65, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8? \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10d0\u10d9\u10e0\u10eb\u10d0\u10da\u10e3\u10da\u10d8\u10d0:", "answerA": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0", "answerB": "\u10d0\u10e0\u10d0\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10e3\u10e0\u10d8 \u10db\u10dd\u10de\u10e7\u10e0\u10dd\u10d1\u10d0", "answerC": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0", "answerD": "\u10d3\u10d0\u10db\u10dc\u10d0\u10e8\u10d0\u10d5\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7 \u10e1\u10d0\u10e1\u10ef\u10d4\u10da\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10e7\u10d4\u10dc\u10d4\u10d1\u10d0", "correctanswer": "B"}, {"questionid": 66, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d4\u10d1\u10d8 \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd", "answerA": "\u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d8\u10e1 \u10d3\u10d0\u10ee\u10e3\u10e0\u10d5\u10d0? \u10d0) \u10d3\u10d8\u10d0\u10ee, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d8\u10e1 \u10d3\u10d0\u10ee\u10e3\u10e0\u10d5\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d7\u10e3 \u10d0\u10db\u10d0\u10e1 \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8", "answerB": "\u10d0\u10e0\u10d0, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d8\u10e1 \u10d3\u10d0\u10ee\u10e3\u10e0\u10d5\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d5\u10d8\u10dc\u10d0\u10d8\u10d3\u10d0\u10dc \u10db\u10d8\u10e1\u10d8 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0 \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d0", "answerC": "\u10d3\u10d8\u10d0\u10ee, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d8\u10e1 \u10d3\u10d0\u10ee\u10e3\u10e0\u10d5\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d7\u10e3 \u10d0\u10db\u10d0\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10d4\u10e0\u10d7\u10d8 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10d8" e1 \u10e8\u10d4\u10ec\u10e7\u10d5\u10d4\u10e2\u10d0 \u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10d7\u10e3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d4\u10dc \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d4\u10d1\u10d8", "answerD": "\u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d2\u10d0\u10e0\u10d0\u10dc\u10e2\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7. \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d3\u10d0\u10ec\u10d4\u10e1\u10d3\u10d4\u10e1 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e1\u10ec\u10d0\u10e0\u10d8 \u10d2\u10d0\u10e4\u10e0\u10d7\u10ee\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10da\u10dd\u10d1\u10d0, \u10d7\u10e3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10ee\u10d0\u10da\u10ee\u10d8\u10e1 \u10e1\u10d0\u10db\u10dd\u10eb\u10e0\u10d0\u10dd \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1 \u10d8\u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10d0", "correctanswer": "C"}, {"questionid": 72, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10ea\u10d3\u10d0\u10e0\u10d8?", "answerA": "\u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10d8\u10e1\u10d4\u10d7\u10d8 \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10e2\u10d8\u10d8\u10e1 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10db\u10d8\u10d6\u10d0\u10dc\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d 10d4\u10d1\u10d0 \u10d0\u10dc \u10d3\u10d0\u10de\u10d0\u10e2\u10d8\u10db\u10e0\u10d4\u10d1\u10d0, \u10db\u10d8\u10e1\u10d8 \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10dc \u10e1\u10d0\u10db\u10e3\u10e8\u10d0\u10dd \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1, \u10db\u10d0\u10dc\u10e5\u10d0\u10dc\u10d8\u10e1 \u10d0\u10dc \u10de\u10d8\u10e0\u10d0\u10d3\u10d8 \u10d2\u10d0\u10e9\u10ee\u10e0\u10d4\u10d9\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0:", "answerA": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7", "answerC": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7", "correctanswer": "A"}, {"questionid": 75, "questiontext": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d2\u10d0\u10e1\u10ee\u10d5\u10d8\u10e1\u10d4\u10d1\u10d0?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10d2\u10d0\u10db\u10dd\u10dc\u10d0\u10d9\u10da\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8; \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d2\u10d0\u10e1\u10ee\u10d5\u10d8\u10e1\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd \u10e1\u10e3\u10d5\u10d4\u10e0\u10d4\u10dc\u10e3\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10d0. \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d2\u10d0\u10e1\u10ee\u10d5\u10d8\u10e1\u10d4\u10d1\u10d0 \u10d0\u10d9\u10e0\u10eb\u10d0\u10da\u10e3\u10da\u10d8\u10d0", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d2\u10d0\u10e1\u10ee\u10d5\u10d8\u10e1\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10d4\u10d6\u10dd\u10d1\u10d4\u10da \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1\u10d7\u10d0\u10dc \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d8\u10d7", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd \u10e1\u10e3\u10d5\u10d4\u10e0\u10d4\u10dc\u10e3\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10d0. \u10db\u10d8\u10e1\u10d8 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d2\u10d0\u10e1\u10ee\u10d5\u10d8\u10e1\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "correctanswer": "B"}, {"questionid": 76, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \ 8\u10dd\u10d1\u10d8\u10e1, \u10d4\u10d7\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d9\u10e3\u10d7\u10d5\u10dc\u10d8\u10da\u10d4\u10d1\u10d8\u10e1, \u10d4\u10dc\u10d8\u10e1, \u10e0\u10d4\u10da\u10d8\u10d2\u10d8\u10d8\u10e1, \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d0\u10dc \u10e1\u10ee\u10d5\u10d0 \u10e8\u10d4\u10ee\u10d4\u10d3\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1, \u10e1\u10dd\u10ea\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10d9\u10e3\u10d7\u10d5\u10dc\u10d8\u10da\u10d4\u10d1\u10d8\u10e1, \u10e5\u10dd\u10dc\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10d0\u10dc \u10ec\u10dd\u10d3\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1, \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d0\u10dc \u10e1\u10ee\u10d5\u10d0 \u10dc\u10d8\u10e8\u10dc\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10ea\u10d3\u10d0\u10e0\u10d8? \u10d0) \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e5\u10db\u10dc\u10d8\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da \u10de\u10d8\u10e0\u10dd\u10d1\u10d4\u10d1\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10e3\u10da\u10d8 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d7\u10d0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10d4\u10d1\u10d8\u10e1 \u10e0\u10d4\u10d0\u10da\u10d8\u10d6\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerB": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e7\u10dd\u10e4\u10e1 \u10d7\u10d0\u10dc\u10d0\u10d1\u10d0\u10e0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10e1\u10d0 \u10d3\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10da\u10dd\u10d1\u10d4\u10d1\u10e1 \u10db\u10d0\u10db\u10d0\u10d9\u10d0\u10ea\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e5\u10d0\u10da\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1; 28 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d4\u10d1\u10e8\u10d8", "answerC": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d8\u10e6\u10d4\u10d1\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da \u10d6\u10dd\u10db\u10d4\u10d1\u10e1 \u10db\u10d0\u10db\u10d0\u10d9\u10d0\u10ea\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e5\u10d0\u10da\u10d4\u10d1\u10d8\u10e1 \u10e3\u10d7\u10d0\u10dc\u10d0\u10e1\u10ec\u10dd\u10e0\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e6\u10db\u10dd\u10e1\u10d0\u10e4\u10ee\u10d5\u10e0\u10d4\u10da\u10d0\u10d3", "answerD": "\u10e1\u10d0\u10ee\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e5\u10db\u10dc\u10d8\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da \u10de\u10d8\u10e0\u10dd\u10d1\u10d4\u10d1\u10e1 \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d0\u10dc \u10e1\u10ee\u10d5\u10d0 \u10e8\u10d4\u10ee\u10d4\u10d3\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d7\u10d0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10e0\u10d4\u10d0\u10da\u10d8\u10d6\u10d4\u10d1\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1", "correctanswer": "D"}, {"questionid": 83, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10de\u10d8\u10e0\u10e1 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4 \u10e3\u10dc\u10d3\u10d0 \u10d2\u10d0\u10dc\u10d4\u10db\u10d0\u10e0\u10e2\u10dd\u10e1 \u10db\u10d8\u10e1\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d8", "answerB": "\u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10e1 \u10de\u10d0\u10e2\u10d8\u10db\u10e0\u10dd\u10d1\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d0 \u10d0\u10e0 \u10e3\u10dc\u10d3\u10d0 \u10d0\u10e6\u10d4\u10db\u10d0\u10e2\u10d4\u10d1\u10dd\u10d3\u10d4\u10e1 12 \u10d7\u10d5\u10d4\u10e1", "answerC": "\u10e3\u10d9\u10d0\u10dc\u10dd\u10dc\u10dd\u10d3 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10e3\u10da \u10de\u10d8\u10e0\u10e1 \u10d0\u10e0 \u10d0\u10e5\u10d5\u10e1 \u10d9\u10dd\u10db\u10de\u10d4\u10dc\u10e1\u10d0\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10e6\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerD": "\u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10e3\u10da\u10d8 \u10de\u10d8\u10e0\u10d8 \u10e3\u10dc\u10d3\u10d0 \u10ec\u10d0\u10e0\u10d4\u10d3\u10d2\u10d8\u10dc\u10dd\u10e1 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d0\u10e0\u10d0\u10e3\u10d2\u10d5\u10d8\u10d0\u10dc\u10d4\u10e1 72 \u10e1\u10d0\u10d0\u10d7\u10d8\u10e1\u10d0", "correctanswer": "A"}, {"questionid": 84, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10d2\u10d0\u10e0\u10d0\u10dc\u10e2\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10e1 \u10e1\u10d0\u10de\u10e0\u10dd\u10ea\u10d4\u10e1\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8. \u10e0\u10dd\u10db\u10d4\u10da \u10e1\u10d0\u10de\u10e0\u10dd\u10ea\u10d4\u10e1\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1 \u10d0\u10e0 \u10d8\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0?", "answerA": "\u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1, \u10d0\u10e0 \u10d3\u10d0\u10d4\u10d3\u10dd\u10e1 \u10d2\u10d0\u10dc\u10db\u10d4\u10dd\u10e0\u10d4\u10d1\u10d8\u10d7 \u10db\u10e1\u10ef\u10d0\u10d5\u10e0\u10d8 \u10d4\u10e0\u10d7\u10d8 \u10d3\u10d0 \u10d8\u10db\u10d0\u10d5\u10d4 \u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerB": "\u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1, \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10dd\u10e1, \u10e0\u10dd\u10db \u10d0\u10e0 \u10d2\u10d0\u10dc\u10e1\u10d0\u10ef\u10dd\u10e1 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10db", "answerC": "\u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1, \u10d0\u10e0 \u10db\u10d8\u10e1\u10ea\u10d4\u10e1 \u10e9\u10d5\u10d4\u10dc\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10d0\u10e6\u10db\u10d3\u10d4\u10d2", "answerD": "\u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1, \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e8\u10d8 \u10d3\u10d0\u10d8\u10ea\u10d5\u10d0\u10e1 \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7", "correctanswer": "B"}, {"questionid": 85, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0 \u10d0\u10dc\u10d2\u10d0\u10e0\u10d8\u10e8\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e8\u10d4", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0 \u10d0\u10dc\u10d2\u10d0\u10e0\u10d8\u10e8\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e8\u10d4", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0 \u10d0\u10dc\u10d2\u10d0\u10e0\u10d8\u10e8\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e8\u10d4", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0 \u10d0\u10dc\u10d2\u10d0\u10e0\u10d8\u10e8\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e8\u10d4", "correctanswer": "B"}, {"questionid": 86, "questiontext": "\u10e0\u10dd\u10d2\u10dd\u10e0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8, \u10d7\u10e3 \u10de\u10d8\u10e0\u10db\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0?", "answerA": "\u10de\u10d8\u10e0\u10e1, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1, \u10db\u10d8\u10d4\u10e9\u10d8\u10dc\u10d4\u10d1\u10d0 \u10d7\u10d0\u10e0\u10ef\u10d8\u10db\u10d0\u10dc\u10d8", "answerB": "\u10de\u10d8\u10e0\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1, \u10d5\u10d4\u10e0 \u10db\u10d8\u10d8\u10e6\u10d4\u10d1\u10e1 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8", "answerC": "\u10de\u10d8\u10e0\u10e1, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1, \u10d3\u10d0\u10d4\u10dc\u10d8\u10e8\u10dc\u10d4\u10d1\u10d0 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8", "answerD": "\u10de\u10d8\u10e0\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1, \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0, \u10d7\u10d0\u10d5\u10d0\u10d3 \u10db\u10dd\u10d8\u10ec\u10d5\u10d8\u10dd\u10e1 \u10d7\u10d0\u10e0\u10ef\u10d8\u10db\u10d0\u10dc\u10d8", "correctanswer": "A"}, {"questionid": 87, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8? \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4 c\u10d4\u10e1\u10d8\u10d7 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d8\u10d7 \u10d8\u10e0\u10e9\u10d4\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "answerC": "1 \u10ec\u10da\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10d7 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10dd\u10e0\u10d2\u10d0\u10dc\u10e3\u10da\u10d8 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d8\u10d7 \u10d8\u10e0\u10e9\u10d4\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "answerD": "3 \u10ec\u10da\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10d7 \u10e1\u10d0\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10dd\u10e0\u10d2\u10d0\u10dc\u10e3\u10da\u10d8 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d8\u10d7 \u10d8\u10e0\u10e9\u10d4\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "correctanswer": "A"}, {"questionid": 89, "questiontext": "\u10e0\u10d0 \u10d3\u10e0\u10dd\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10e3\u10da \u10de\u10d8\u10e0\u10e1, \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10dd\u10e1 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d0?", "answerA": "\u10d3\u10d0\u10d9\u10d8\u10d7\u10ee\u10d5\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "answerB": "\u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "answerC": "\u10e1\u10d8\u10e1\u10ee\u10da\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10e1 \u10d0\u10e6\u10eb\u10d5\u10e0\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "answerD": "\u10d2\u10d0\u10db\u10dd\u10eb\u10d8\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ec\u10e7\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "correctanswer": "B"}, {"questionid": 90, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d0\u10d3\u10d8 \u10d3\u10d0 \u10dd\u10ef\u10d0\u10ee\u10e3\u10e0\u10d8 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0?", "answerA": "\u10d0\u10e0\u10d0, \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d0\u10d3\u10d8 \u10d3\u10d0 \u10dd\u10ef\u10d0\u10ee\u10e3\u10e0\u10d8 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10d0\u10e6\u10dc\u10d8\u10e8\u10dc\u10e3\u10da\u10d8 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d0\u10e0\u10e6\u10d5\u10d4\u10d5\u10e1 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10e1", "answerB": "\u10d3\u10d8\u10d0\u10ee, \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d0\u10d3\u10d8 \u10d3\u10d0 \u10dd\u10ef\u10d0\u10ee\u10e3\u10e0\u10d8 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10d0\u10e6\u10dc\u10d8\u10e8\u10dc\u10e3\u10da\u10d8 \u10d0\u10e0 \u10ec\u10d0\u10e0\u10db\u10dd\u10d0\u10d3\u10d2\u10d4\u10dc\u10e1 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1", "answerC": "\u10d3\u10d8\u10d0\u10ee, \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d8\u10e1\u10d0\u10d3, \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d0\u10dc \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e3\u10e1\u10d0\u10e4\u10e0\u10d7\u10ee\u10dd\u10d4\u10d1\u10d8\u10e1 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e7\u10dd\u10e4\u10d8\u10e1 \u10d0\u10dc \u10e1\u10ee\u10d5\u10d0\u10d7\u10d0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10d6\u10dc\u10d8\u10d7", "answerD": "\u10d0\u10e0\u10d0, \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d0\u10d3\u10d8 \u10d3\u10d0 \u10dd\u10ef\u10d0\u10ee\u10e3\u10e0\u10d8 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d2\u10db\u10dd\u10dc\u10d0\u10d9\u10da\u10d8\u10e1\u10e1 \u10d0\u10d3\u10d2\u10d4\u10dc\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d8\u10e1\u10ee\u10da\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10d9\u10dd\u10d3\u10d4\u10e5\u10e1\u10d8", "correctanswer": "C"}, {"questionid": 91, "questiontext": "\u10d5\u10d8\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0?", "answerA": "\u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0 \u10de\u10d8\u10e0\u10e1", "answerB": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da \u10de\u10d8\u10e0\u10e1", "answerC": "\u10e8\u10d8\u10dc\u10d0\u10d2\u10d0\u10dc \u10e1\u10d0\u10e5\u10db\u10d4\u10d7\u10d0 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1", "answerD": "\u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10e1", "correctanswer": "B"}, {"questionid": 92, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10e7\u10d5\u10d4\u10da\u10d0\u10e1, \u10d5\u10d8\u10dc\u10ea \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d4\u10e0\u10d0\u10d3 \u10d8\u10db\u10e7\u10dd\u10e4\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8, \u10d0\u10e5\u10d5\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8 \u10db\u10d8\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1, \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d2\u10d0\u10e1\u10d5\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8 \u10db\u10d8\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1, \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d2\u10d0\u10e1\u10d5\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10d7 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1", "answerC": "\u10e7\u10d5\u10d4\u10da\u10d0\u10e1, \u10d2\u10d0\u10e0\u10d3\u10d0 \u10dc\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4\u10d5\u10d8 \u10de\u10d8\u10e0\u10d8\u10e1\u10d0, \u10d0\u10e5\u10d5\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8 \u10db\u10d8\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1, \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d2\u10d0\u10e1\u10d5\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8 \u10db\u10d8\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1, \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d2\u10d0\u10e1\u10d5\u10da\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10d7 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e3\u10ea\u10ee\u10dd \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1", "correctanswer": "A"}, {"questionid": 93, "questiontext": "\u10e0\u10d0 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10d3\u10d0\u10d8\u10e8\u10d5\u10d4\u10d1\u10d0 \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0?", "answerA": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d8\u10e1\u10d0\u10d3, \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10e1\u10d8\u10e2\u10e7\u10d5\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e1\u10d0\u10e7\u10dd\u10e4\u10d0\u10d3", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d8\u10e1\u10d0\u10d3, \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10d2\u10d0\u10db\u10dd\u10ee\u10d0\u10e2\u10d5\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e1\u10d0\u10e7\u10dd\u10e4\u10d0\u10d3", "answerC": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d8\u10e1\u10d0\u10d3, \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e3\u10e1\u10d0\u10e4\u10e0\u10d7\u10ee\u10dd\u10d4\u10d1\u10d8\u10e1 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e7\u10dd\u10e4\u10d8\u10e1, \u10ef\u10d0\u10dc\u10db\u10e0\u10d7\u10d4\u10da\u10dd\u10d1\u10d8\u10e1 \u10d0\u10dc \u10e1\u10ee\u10d5\u10d0\u10d7\u10d0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10d6\u10dc\u10d8\u10d7", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d8\u10e1\u10d0\u10d3, \u10d3\u10d4\u10db\u10dd\u10d9\u10e0\u10d0\u10e2\u10d8\u10e3\u10da \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10e0\u10e1\u10d4\u10d1\u10e3\u10da\u10d8 \u10e3\u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d4\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10d3\u10d0\u10dc \u10d0\u10e1\u10d0\u10ea\u10d8\u10da\u10d4\u10d1\u10da\u10d0\u10d3", "correctanswer": "C"}, {"questionid": 94, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0?", "answerA": "\u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0", "answerB": "\u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0", "answerC": "\u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d2\u10d0\u10db\u10dd\u10dc\u10d0\u10d9\u10da\u10d8\u10e1\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d8\u10d7", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d3\u10d0\u10d1\u10d0\u10d3\u10d4\u10d1\u10d8\u10d7 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10e3\u10da\u10d8 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8", "correctanswer": "A"}, {"questionid": 95, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d0\u10d8\u10e0\u10e9\u10d4\u10e1 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4 25 \u10ec\u10da\u10d8\u10e1 \u10d0\u10e1\u10d0\u10d9\u10d8\u10d3\u10d0\u10dc, \u10e0\u10dd\u10db\u10d4\u10da\u10e1\u10d0\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e3\u10ea\u10ee\u10dd\u10d5\u10e0\u10d8\u10d0 10 \u10ec\u10d4\u10da\u10e1 \u10db\u10d0\u10d8\u10dc\u10ea", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d0\u10d8\u10e0\u10e9\u10d4\u10e1 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4 20 \u10ec\u10da\u10d8\u10e1 \u10d0\u10e1\u10d0\u10d9\u10d8\u10d3\u10d0\u10dc, \u10e0\u10dd\u10db\u10d4\u10da\u10e1\u10d0\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e3\u10ea\u10ee\u10dd\u10d5\u10e0\u10d8\u10d0 15 \u10ec\u10d4\u10da\u10e1 \u10db\u10d0\u10d8\u10dc\u10ea", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d0\u10d8\u10e0\u10e9\u10d4\u10e1 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4 18 \u10ec\u10da\u10d8\u10e1 \u10d0\u10e1\u10d0\u10d9\u10d8\u10d3\u10d0\u10dc, \u10e0\u10dd\u10db\u10d4\u10da\u10e1\u10d0\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e3\u10ea\u10ee\u10dd\u10d5\u10e0\u10d8\u10d0 10 \u10ec\u10d4\u10da\u10e1 \u10db\u10d0\u10d8\u10dc\u10ea", "answerD": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d0\u10d8\u10e0\u10e9\u10d4\u10e1 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4 28 \u10ec\u10da\u10d8\u10e1 \u10d0\u10e1\u10d0\u10d9\u10d8\u10d3\u10d0\u10dc, \u10e0\u10dd\u10db\u10d4\u10da\u10e1\u10d0\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e3\u10ea\u10ee\u10dd\u10d5\u10e0\u10d8\u10d0 5 \u10ec\u10d4\u10da\u10e1 \u10db\u10d0\u10d8\u10dc\u10ea", "correctanswer": "A"}, {"questionid": 96, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10e1 \u10de\u10d8\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10d3\u10d0\u10dc \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d8\u10db\u10de\u10d8\u10e9\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10e1\u10d8\u10d7?", "answerA": "\u10d2\u10d4\u10dc\u10d4\u10e0\u10d0\u10da\u10e3\u10e0\u10d8 \u10de\u10e0\u10dd\u10d9\u10e3\u10e0\u10dd\u10e0\u10d8\u10e1", "answerB": "\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8\u10e1", "answerC": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1", "answerD": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8\u10e1", "correctanswer": "A"}, {"questionid": 97, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d4\u10db\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0\u10e1?", "answerA": "\u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d0\u10e1 \u10e3\u10de\u10d8\u10e0\u10d0\u10e2\u10d4\u10e1\u10d8 \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da\u10d8 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10e3\u10e0\u10d8 \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7; \u10eb\u10d0\u10da\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1", "answerB": "\u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d0\u10e1 \u10e3\u10de\u10d8\u10e0\u10d0\u10e2\u10d4\u10e1\u10d8 \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da\u10d8 \u10eb\u10d0\u10da\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10e7\u10d5\u10d4\u10da\u10d0 \u10e8\u10d8\u10d3\u10d0\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10dc\u10dd\u10e0\u10db\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10d0\u10e5\u10e2\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7, \u10d7\u10e3 \u10d8\u10d2\u10d8 \u10d4\u10ec\u10d8\u10dc\u10d0\u10d0\u10e6\u10db\u10d3\u10d4\u10d2\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10db\u10d3\u10d4\u10d1\u10da\u10dd\u10d1\u10d0\u10e1", "answerC": "\u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d0\u10e1 \u10d0\u10e0 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10de\u10d8\u10e0\u10d0\u10e2\u10d4\u10e1\u10d8 \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da\u10d8 \u10eb\u10d0\u10da\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d8 \u10e8\u10d8\u10d3\u10d0\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10dc\u10dd\u10e0\u10db\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10d0\u10e5\u10e2\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7", "answerD": "\u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d0\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10de\u10d8\u10e0\u10d0\u10e2\u10d4\u10e1\u10d8 \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da\u10d8 \u10eb\u10d0\u10da\u10d0 \u10e8\u10d8\u10d3\u10d0\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10dc\u10dd\u10e0\u10db\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10d0\u10e5\u10e2\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7, \u10d7\u10e3 \u10d8\u10d2\u10d8 \u10d0\u10e0 \u10d4\u10ec\u10d8\u10dc\u10d0\u10d0\u10e6\u10db\u10d3\u10d4\u10d2\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0\u10e1 \u10d0\u10dc \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10e3\u10e0 \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d0\u10e1", "correctanswer": "D"}, {"questionid": 98, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0\u10e1?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e3\u10db\u10d0\u10e6\u10da\u10d4\u10e1\u10d8 \u10d2\u10d0\u10dc\u10d0\u10d7\u10da\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10dd\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d3\u10d0\u10ec\u10e7\u10d4\u10d1\u10d8\u10d7\u10d8 \u10d3\u10d0 \u10e1\u10d0\u10d1\u10d0\u10d6\u10dd \u10d2\u10d0\u10dc\u10d0\u10d7\u10da\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10dd\u10d0", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e1\u10d9\u10dd\u10da\u10d0\u10db\u10d3\u10d4\u10da\u10d8 \u10d2\u10d0\u10dc\u10d0\u10d7\u10da\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10dd\u10d0", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d2\u10d0\u10dc\u10d0\u10d7\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10e6\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10dd \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1", "correctanswer": "B"}, {"questionid": 99, "questiontext": "\u10e0\u10d0\u10e1 \u10dc\u10d8\u10e8\u10dc\u10d0\u10d5\u10e1 \u10e3\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10dd\u10d1\u10d8\u10e1 \u10de\u10e0\u10d4\u10d6\u10e3\u10db\u10e4\u10ea\u10d8\u10d0?", "answerA": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8 \u10e3\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10dd\u10d3 \u10d8\u10d7\u10d5\u10da\u10d4\u10d1\u10d0, \u10d5\u10d8\u10d3\u10e0\u10d4 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10e3\u10da\u10d8 \u10de\u10d8\u10e0\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d0\u10e0 \u10ec\u10d0\u10e0\u10d4\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d0 \u10d3\u10d0 \u10d3\u10d0\u10d8\u10ec\u10e7\u10d4\u10d1\u10d0 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10db\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7", "answerB": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8 \u10e3\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10dd\u10d3 \u10d8\u10d7\u10d5\u10da\u10d4\u10d1\u10d0, \u10d5\u10d8\u10d3\u10e0\u10d4 \u10db\u10d8\u10e1\u10d8 \u10d3\u10d0\u10db\u10dc\u10d0\u10e8\u10d0\u10d5\u10d4\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10d3\u10d0\u10d3\u10d0\u10e1\u10e2\u10e3\u10e0\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7 \u10d3\u10d0 \u10db\u10d0\u10e1\u10dd\u10d1\u10e0\u10d8\u10d5\u10d8 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d8\u10e1 \u10e1\u10d0\u10e8\u10e3\u10d0\u10da\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8 \u10e3\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10dd\u10d3 \u10d8\u10d7\u10d5\u10da\u10d4\u10d1\u10d0, \u10d5\u10d8\u10d3\u10e0\u10d4 \u10db\u10d8\u10e1\u10d8 \u10d3\u10d0\u10db\u10dc\u10d0\u10e8\u10d0\u10d5\u10d4\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10d3\u10d0\u10db\u10e2\u10d9\u10d8\u10ea\u10d3\u10d4\u10d1\u10d0 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7, \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d4\u10e0 \u10eb\u10d0\u10da\u10d0\u10e8\u10d8 \u10e8\u10d4\u10e1\u10e3\u10da\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10db\u10d0\u10db\u10e2\u10e7\u10e3\u10dc\u10d4\u10d1\u10d4\u10da\u10d8 \u10d2\u10d0\u10dc\u10d0\u10e9\u10d4\u10dc\u10d8\u10d7", "answerD": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8 \u10e3\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10dd\u10d3 \u10d8\u10d7\u10d5\u10da\u10d4\u10d1\u10d0, \u10d5\u10d8\u10d3\u10e0\u10d4 \u10db\u10d8\u10e1\u10d8 \u10d3\u10d0\u10db\u10dc\u10d0\u10e8\u10d0\u10d5\u10d4\u10dd\u10d1\u10d0 \u10d0\u10e0 \u1 da\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7, \u10d0\u10d2\u10e0\u10d4\u10d7\u10d5\u10d4, \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d4\u10d1\u10e8\u10d8 \u10d0\u10e0\u10d0\u10e1\u10d0\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10dd \u10dd\u10e0\u10d2\u10d0\u10dc\u10d8\u10d6\u10d0\u10ea\u10d8\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7", "answerC": "\u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7, \u10d0\u10d2\u10e0\u10d4\u10d7\u10d5\u10d4, \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da \u10ec\u10d0\u10e0\u10db\u10dd\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7; \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d4\u10d1\u10e8\u10d8 -", "answerD": "\u10de\u10d8\u10e0\u10d0\u10d3\u10d0\u10d3 \u10d0\u10dc \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7, \u10d0\u10d2\u10e0\u10d4\u10d7\u10d5\u10d4, \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d4\u10d1\u10e8\u10d8 \u10ec\u10d0\u10e0\u10db\u10dd\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10d8\u10e1 \u10db\u10d4\u10e8\u10d5\u10d4\u10dd\u10d1\u10d8\u10d7", "correctanswer": "D"}, {"questionid": 102, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10de\u10d8\u10e0\u10e1 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10dd\u10e1 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d0", "answerB": "\u10de\u10d8\u10e0\u10e1 \u10db\u10e1\u10ef\u10d0\u10d5\u10e0\u10d3\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10dd\u10e1 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d0", "answerC": "\u10de\u10d8\u10e0\u10db\u10d0 \u10d3\u10d0\u10de\u10d0\u10e2\u10d8\u10db\u10e0\u10d4\u10d1\u10d8\u10d3\u10d0\u10dc 24 \u10e1\u10d0\u10d0\u10d7\u10e8\u10d8 \u10e3\u10dc\u10d3\u10d0 \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10dd\u10e1 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d0", "answerD": "\u10de\u10d8\u10e0\u10db\u10d0 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10d3\u10d0\u10dc 24 \u10e1\u10d0\u10d0\u10d7\u10e8\u10d8 \u10e3\u10dc\u10d3\u10d0 \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10dd\u10e1 \u10d0\u10d3\u10d5\u10dd\u10d9\u10d0\u10e2\u10d8\u10e1 \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d0", "correctanswer": "A"}, {"questionid": 103, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10ee\u10d4\u10da\u10db\u10d8\u10e1\u10d0\u10ec\u10d5\u10d3\u10dd\u10db\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10d2\u10d0\u10e0\u10d4\u10db\u10dd\u10e1 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1?", "answerA": "\u10d3\u10d8\u10d0\u10ee, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10d0\u10e5\u10d5\u10d7 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10dc \u10e1\u10e0\u10e3\u10da\u10d8 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10d2\u10d0\u10e0\u10d4\u10db\u10dd\u10e1 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1", "answerB": "\u10d3\u10d8\u10d0\u10ee, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10e7\u10d5\u10d4\u10da\u10d0\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10d2\u10d0\u10e0\u10d4\u10db\u10dd\u10e1 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1", "answerC": "\u10d0\u10e0\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10d2\u10d0\u10e0\u10d4\u10db\u10dd\u10e1 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1 \u10ea\u10d0\u10da\u10d9\u10d4\u10e3\u10da \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d4\u10d1\u10e8\u10d8 \u10ec\u10d0\u10e0\u10db\u10dd\u10d0\u10d3\u10d2\u10d4\u10dc\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e1\u10d0\u10d8\u10d3\u10e3\u10db\u10da\u10dd\u10d4\u10d1\u10d0\u10e1", "answerD": "\u10d0\u10e0\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10d2\u10d0\u10e0\u10d4\u10db\u10dd\u10e1 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1 \u10ea\u10d0\u10da\u10d9\u10d4\u10e3\u10da \u10ec\u10d0\u10e0\u10db\u10dd\u10d0\u10d3\u10d2\u10d4\u10dc\u10e1 \u10de\u10e0\u10dd\u10e4\u10d4\u10e1\u10d8\u10e3\u10da \u10e1\u10d0\u10d8\u10d3\u10e3\u10db\u10da\u10dd\u10d4\u10d1\u10d0\u10e1. \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d4\u10d1\u10e8\u10d8", "correctanswer": "B"}, {"questionid": 104, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3, \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8 \u10e3\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10dd\u10d3 \u10d8\u10d7\u10d5\u10da\u10d4\u10d1\u10d0, \u10d5\u10d8\u10d3\u10e0\u10d4 \u10db\u10d8\u10e1\u10d8 \u10d3\u10d0\u10db\u10dc\u10d0\u10e8\u10d0\u10d5\u10d4\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10d3\u10d0\u10db\u10e2\u10d9\u10d8\u10ea\u10d3\u10d4\u10d1\u10d0:", "answerA": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d4\u10e0 \u10eb\u10d0\u10da\u10d0\u10e8\u10d8 \u10e8\u10d4\u10e1\u10e3\u10da\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10db\u10d0\u10db\u10e2\u10e7\u10e3\u10dc\u10d4\u10d1\u10d4\u10da\u10d8 \u10d2\u10d0\u10dc\u10d0\u10e9\u10d4\u10dc\u10d8\u10d7", "answerB": "\u10de\u10e0\u10dd\u10d9\u10e3\u10e0\u10dd\u10e0\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10e1\u10d0\u10d1\u10e0\u10d0\u10da\u10d3\u10d4\u10d1\u10dd \u10d3\u10d0\u10e1\u10d9\u10d5\u10dc\u10d8\u10d7", "answerC": "\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d8\u10e1 \u10db\u10d4\u10d3\u10d8\u10d0\u10e8\u10d8 \u10d2\u10d0\u10e8\u10e3\u10e5\u10d4\u10d1\u10d8\u10d7", "answerD": "\u10dd\u10db\u10d1\u10e3\u10d3\u10e1\u10db\u10d4\u10dc\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10db\u10d0\u10db\u10ee\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10d3\u10d0\u10e1\u10d9\u10d5\u10dc\u10d8\u10d7", "correctanswer": "A"}, {"questionid": 105, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3, \u10db\u10e2\u10d9\u10d8\u10ea\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0\u10e1 \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da\u10d8 \u10eb\u10d0\u10da\u10d0 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1, \u10d7\u10e3 \u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10e3\u10da\u10d8\u10d0:", "answerA": "\u10de\u10e0\u10dd\u10d9\u10e3\u10e0\u10dd\u10e0\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0", "answerB": "\u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0", "answerC": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e0\u10e6\u10d5\u10d4\u10d5\u10d8\u10d7", "answerD": "\u10d2\u10d0\u10db\u10dd\u10db\u10eb\u10d8\u10d4\u10d1\u10da\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0", "correctanswer": "C"}, {"questionid": 106, "questiontext": "\u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10d8\u10e1 \u10dc\u10d8\u10e8\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e0\u10e1\u10d4\u10d1\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d8\u10d7 \u10d2\u10d4\u10dc\u10d4\u10e0\u10d0\u10da\u10e3\u10e0\u10d8 \u10de\u10e0\u10dd\u10d9\u10e3\u10e0\u10dd\u10e0\u10d8\u10e1 \u10d8\u10db\u10de\u10d8\u10e9\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10e1\u10d8\u10d7 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10d3\u10d0\u10dc \u10d2\u10d0\u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10d9\u10d8\u10d7\u10ee\u10d8\u10e1 \u10d0\u10e6\u10eb\u10d5\u10e0\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10e1:", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10e1", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1", "correctanswer": "A"}, {"questionid": 107, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10e3\u10ec\u10e7\u10d4\u10d1\u10d0 \u10ec\u10d0\u10e0\u10e3\u10d3\u10d2\u10d4\u10dc\u10e1 \u10d3\u10d0\u10e1\u10d9\u10d5\u10dc\u10d0\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d8\u10db\u10de\u10d8\u10e9\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10e1\u10d8\u10d7 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10d3\u10d0\u10dc \u10d2\u10d0\u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10d9\u10d8\u10d7\u10ee\u10d7\u10d0\u10dc \u10d3\u10d0\u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d4\u10d1\u10d8\u10d7?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d8\u10e3\u10e1\u10e2\u10d8\u10ea\u10d8\u10d8\u10e1 \u10e3\u10db\u10d0\u10e6\u10da\u10d4
