b\u10d2\u10d6\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10e6\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 \u10e1\u10e2\u10e3\u10d3\u10d4\u10dc\u10e2\u10d4\u10d1\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10e8\u10d4\u10d3\u10d0\u10e0\u10d4\u10d1\u10d8\u10d7 \u10d3\u10d0\u10d1\u10d0\u10da\u10d8\u10d0", "answerB": "\u10db\u10d4\u10e2\u10e0\u10dd\u10de\u10dd\u10da\u10d8\u10e2\u10d4\u10dc\u10d8\u10e1 23 \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8 \u10d4\u10e0\u10d7 \u10ee\u10d0\u10d6\u10d6\u10d4\u10d0 \u10d2\u10d0\u10dc\u10da\u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8", "answerC": "\u10db\u10d4\u10e2\u10e0\u10dd\u10de\u10dd\u10da\u10d8\u10e2\u10d4\u10dc\u10d8\u10e1 \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d4\u10d1\u10d8\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10ea\u10d8\u10e0\u10d4 \u10dc\u10d0\u10ec\u10d8\u10da\u10d8\u10d0 \u10db\u10d8\u10ec\u10d8\u10e1 \u10e5\u10d5\u10d4\u10e8", "answerD": "\u10db\u10d4\u10e2\u10e0\u10dd\u10e1 \u10db\u10d0\u10e2\u10d0\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10de\u10d8\u10d9\u10d8\u10e1 \u10e1\u10d0\u10d0\u10d7\u10d4\u10d1\u10e8\u10d8 4-\u10ec\u10e3\u10d7\u10d8\u10d0\u10dc\u10d8 \u10d8\u10dc\u10e2\u10d4\u10e0\u10d5\u10d0\u10da\u10d8\u10d7 \u10d3\u10d0\u10d3\u10d8\u10e1", "correctanswer": "B"}, {"questionid": 183, "questiontext": "- \u10d0) 36 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.3.4. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u201e\u10d1\u10dd\u10e0\u10ef\u10dd\u10db\u10d8\u201c \u10d5\u10e3\u10da\u10d9\u10d0\u10dc\u10e3\u10e0\u10d8 \u10ec\u10d0\u10e0\u10db\u10dd\u10e8\u10dd\u10d1\u10d8\u10e1 \u10db\u10d8\u10dc\u10d4\u10e0\u10d0\u10da\u10e3\u10e0\u10d8 \u10ec\u10e7\u10d0\u10da\u10d8\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10de\u10dd\u10de\u10e3\u10da\u10d0\u10e0\u10e3\u10da\u10d8\u10d0 \u10db\u10d7\u10d4\u10da \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e8\u10d8. \u10d8\u10e1 \u10d3\u10d4\u10d3\u10d0\u10db\u10d8\u10ec\u10d8\u10e1 \u10d6\u10d4\u10d3\u10d0\u10de\u10d8\u10e0\u10d6\u10d4 10 \u10d9\u10db \u10e1\u10d8\u10e6\u10e0\u10db\u10d8\u10d3\u10d0\u10dc \u10d7\u10d1\u10d8\u10da\u10d8 \u10e1\u10d0\u10ee\u10d8\u10d7 \u10d0\u10db\u10dd\u10d3\u10d8\u10e1, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc, \u10d1\u10d4\u10d5\u10e0\u10d8 \u10e1\u10ee\u10d5\u10d0 \u10db\u10d8\u10dc\u10d4\u10e0\u10d0\u10da\u10e3\u10e0\u10d8 \u10ec\u10e7\u10da\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10d2\u10d0\u10dc\u10e1\u10ee\u10d5\u10d0\u10d5\u10d4\u10d1\u10d8\u10d7, \u10db\u10d8\u10ec\u10d0\u10e8\u10d8 \u10d2\u10d0\u10ea\u10d8\u10d5\u10d4\u10d1\u10d0\u10e1 \u10d5\u10d4\u10e0 \u10d0\u10e1\u10ec\u10e0\u10d4\u10d1\u10e1. \u10d0\u10e0\u10e5\u10d4\u10dd\u10da\u10dd\u10d2\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10e6\u10db\u10dd\u10e9\u10d4\u10dc\u10d8\u10da\u10d8 \u10e5\u10d5\u10d8\u10e1 \u10d0\u10d1\u10d0\u10d6\u10d0\u10dc\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10d7\u10d8\u10ee\u10d8\u10e1 \u10db\u10d8\u10da\u10d4\u10d1\u10d8 \u10d0\u10d3\u10d0\u10e1\u10e2\u10e3\u10e0\u10d4\u10d1\u10e1, \u10e0\u10dd\u10db \u10eb\u10d5\u10d4\u10da\u10d0\u10d3 \u201e\u10d1\u10dd\u10e0\u10ef\u10dd\u10db\u10d8\u201c \u10d0\u10e0\u10d0 \u10db\u10d0\u10e0\u10e2\u10dd \u10e1\u10d0\u10e1\u10db\u10d4\u10da\u10d0\u10d3, \u10d0\u10e0\u10d0\u10db\u10d4\u10d3 \u10d0\u10d1\u10d0\u10d6\u10d0\u10dc\u10d8\u10e1 \u10db\u10d8\u10e1\u10d0\u10e6\u10d4\u10d1\u10d0\u10d3\u10d0\u10ea \u10d2\u10d0\u10db\u10dd\u10d8\u10e7\u10d4\u10dc\u10d4\u10d1\u10dd\u10d3\u10d0. \u10d2\u10d4\u10dd\u10da\u10dd\u10d2\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10e5\u10d8\u10db\u10d8\u10d9\u10dd\u10e1\u10d4\u10d1\u10d8 \u10db\u10d8\u10dc\u10d4\u10e0\u10d0\u10da\u10e3\u10e0 \u10ec\u10e7\u10d0\u10da\u10e1 \u10db\u10e3\u10d3\u10db\u10d8\u10d5\u10d0\u10d3 \u10d0\u10db\u10dd\u10ec\u10db\u10d4\u10d1\u10d4\u10dc. \u10d0\u10db \u10d9\u10d5\u10da\u10d4\u10d5\u10d4\u10d1\u10d8\u10d3\u10d0\u10dc \u10e9\u10d0\u10dc\u10e1, \u10e0\u10dd\u10db \u10db\u10d8\u10e1\u10d8 \u10e2\u10d4\u10db\u10de\u10d4\u10e0\u10d0\u10e2\u10e3\u10e0\u10d0, \u10e5\u10d8\u10db\u10d8\u10e3\u10e0\u10d8 \u10d7\u10d5\u10d8\u10e1\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d5\u10da\u10d4\u10d1\u10d0. \u10d3\u10e6\u10d4\u10e1 \u10ec\u10e7\u10d0\u10da\u10d8 9 \u10ed\u10d0\u10d1\u10e3\u10e0\u10e6\u10d8\u10da\u10d8\u10d3\u10d0\u10dc 25-\u10d9\u10d8\u10da\u10dd\u10db\u10d4\u10e2\u10e0\u10d8\u10d0\u10dc\u10d8 \u10db\u10d8\u10da\u10d8\u10d7 \u10db\u10d8\u10d4\u10ec\u10dd\u10d3\u10d4\u10d1\u10d0 \u10e9\u10d0\u10db\u10dd\u10db\u10e1\u10ee\u10db\u10d4\u10da \u10e5\u10d0\u10e0\u10ee\u10dc\u10d4\u10d1\u10e1", "answerA": "\u201e\u10d1\u10dd\u10e0\u10ef\u10dd\u10db\u10d8\u10e1\u201c \u10e5\u10d8\u10db\u10d8\u10e3\u10e0\u10d8 \u10d7\u10d5\u10d8\u10e1\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0 \u10db\u10e3\u10d3\u10db\u10d8\u10d5\u10d0\u10d3 \u10d8\u10ea\u10d5\u10da\u10d4\u10d1\u10d0", "answerB": "\u201e\u10d1\u10dd\u10e0\u10ef\u10dd\u10db\u10d8\u201c \u10e1\u10ee\u10d5\u10d0 \u10db\u10d8\u10dc\u10d4\u10e0\u10d0\u10da\u10e3\u10e0\u10d8 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10d0\u10e0\u10d0\u10e4\u10e0\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10ee\u10d5\u10d0\u10d5\u10d3\u10d4\u10d1\u10d0", "answerC": "\u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10d7\u10d0 \u10d0\u10d6\u10e0\u10d8\u10d7, \u10eb\u10d5\u10d4\u10da\u10d0\u10d3 \u201e\u10d1\u10dd\u10e0\u10ef\u10dd\u10db\u10e1\u201c \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e1\u10db\u10d4\u10da\u10d0\u10d3 \u10d8\u10e7\u10d4\u10dc\u10d4\u10d1\u10d3\u10dc\u10d4\u10dc", "answerD": "\u10e5\u10d8\u10db\u10d8\u10d9\u10dd\u10e1\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10d2\u10d4\u10dd\u10da\u10dd\u10d2\u10d4\u10d1\u10d8 \u201e\u10d1\u10dd\u10e0\u10ef\u10dd\u10db\u10e1\u201c \u10e1\u10d8\u10e1\u10e2\u10d4\u10db\u10d0\u10e2\u10e3\u10e0\u10d0\u10d3 \u10d8\u10d9\u10d5\u10da\u10d4\u10d5\u10d4\u10dc", "correctanswer": "A"}, {"questionid": 184, "questiontext": "- \u10d3) III.3.5. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10d0\u10e0\u10d8 \u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10e1\u10d0\u10d7\u10d0\u10d5\u10d4\u10e1 \u10d7\u10e3\u10e0\u10e5\u10d4\u10d7\u10e8\u10d8 \u10d8\u10e6\u10d4\u10d1\u10e1. \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d2\u10d0\u10e0\u10d3\u10d0 \u10d8\u10e1 \u10d9\u10d5\u10d4\u10d7\u10e1 \u10e1\u10d0\u10db \u10e5\u10d5\u10d4\u10e7\u10d0\u10dc\u10d0\u10e1 \u10d3\u10d0 \u10d1\u10dd\u10da\u10dd\u10e1 \u10d9\u10d0\u10e1\u10de\u10d8\u10d8\u10e1 \u10d6\u10e6\u10d5\u10d0\u10e1 \u10d4\u10e0\u10d7\u10d5\u10d8\u10e1 \u10d0\u10d6\u10d4\u10e0\u10d1\u10d0\u10d8\u10ef\u10d0\u10dc\u10d8\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4. \u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10d7\u10dd\u10d5\u10da\u10d8\u10d7, \u10ec\u10d5\u10d8\u10db\u10d8\u10d7\u10d0 \u10d3\u10d0 \u10db\u10d8\u10ec\u10d8\u10e1\u10e5\u10d5\u10d4\u10e8\u10d0 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8\u10d7 \u10e1\u10d0\u10d6\u10e0\u10d3\u10dd\u10dd\u10d1\u10e1. \u10d2\u10d0\u10d6\u10d0\u10e4\u10ee\u10e3\u10da\u10d6\u10d4 \u10db\u10d0\u10e1 \u10ec\u10e7\u10da\u10d8\u10e1 \u10e1\u10d8\u10e3\u10ee\u10d5\u10d4 \u10d0\u10ee\u10d0\u10e1\u10d8\u10d0\u10d7\u10d4\u10d1\u10e1, \u10d6\u10d0\u10e4\u10ee\u10e3\u10da\u10e1\u10d0 \u10d3\u10d0 \u10d6\u10d0\u10db\u10d7\u10d0\u10e0\u10e8\u10d8 \u2013 \u10ec\u10e7\u10da\u10d8\u10e1 \u10e1\u10d8\u10db\u10ea\u10d8\u10e0\u10d4. \u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10db\u10d3\u10d8\u10d3\u10d0\u10e0\u10d8\u10d0 \u10d7\u10d4\u10d5\u10d6\u10d8\u10d7. \u10d8\u10d2\u10d8 \u10e9\u10d5\u10d4\u10dc\u10d8 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10d7 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10d4\u10dc\u10d4\u10e0\u10d2\u10d4\u10e2\u10d8\u10d9\u10e3\u10da\u10d8 \u10e0\u10d4\u10e1\u10e3\u10e0\u10e1\u10d8\u10d0. \u10db\u10d0\u10e1\u10d6\u10d4 \u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8\u10db\u10d4 \u10f0\u10d4\u10e1\u10d8. \u10db\u10e2\u10d9\u10d5\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d8\u10e1\u10d8 \u10e8\u10d4\u10dc\u10d0\u10d9\u10d0\u10d3\u10d4\u10d1\u10d8\u10e1 \u10ec\u10e7\u10d0\u10da\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e4\u10d0\u10e0\u10d2\u10da\u10d4\u10d1\u10e8\u10d8 \u10e0\u10ec\u10e7\u10d0\u10d5\u10e1 315 \u10d0\u10d7\u10d0\u10e1 \u10f0\u10d4\u10e5\u10e2\u10e0\u10d0\u10db\u10d3\u10d4 \u10e4\u10d0\u10e0\u10d7\u10dd\u10d1\u10e1. \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 \u10db\u10e2\u10d9\u10d5\u10e0\u10d8\u10e1 \u10ec\u10e7\u10d0\u10da\u10e1 \u10e2\u10d4\u10e5\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d3\u10d0\u10dc\u10d8\u10e8\u10dc\u10e3\u10da\u10d4\u10d1\u10d8\u10d7 \u10d8\u10e7\u10d4\u10dc\u10d4\u10d1\u10d4\u10dc", "answerA": "\u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10e1\u10d0\u10d7\u10d0\u10d5\u10d4\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d8\u10e6\u10d4\u10d1\u10e1", "answerB": "\u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10e2\u10d4\u10e5\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10ec\u10e7\u10da\u10d8\u10d7 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e7\u10dd\u10e4\u10e1 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e1", "answerC": "\u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d0\u10d3 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d8 \u10e8\u10d4\u10dc\u10d0\u10d9\u10d0\u10d3\u10d4\u10d1\u10d8\u10d7 \u10e1\u10d0\u10d6\u10e0\u10d3\u10dd\u10dd\u10d1\u10e1", "answerD": "\u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10d8 \u10ec\u10e7\u10d0\u10da\u10e3\u10ee\u10d5\u10d8\u10d0 \u10ec\u10da\u10d8\u10e1 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0 \u10d3\u10e0\u10dd\u10e1", "correctanswer": "D"}, {"questionid": 185, "questiontext": "- \u10d1) III.3.6. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10d1\u10d0\u10d7\u10e3\u10db\u10d8\u10e1 \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d1\u10d0\u10e6\u10d8\u10e1 \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10d0 1912 \u10ec\u10da\u10d8\u10d3\u10d0\u10dc \u10d8\u10ec\u10e7\u10d4\u10d1\u10d0, \u10e0\u10dd\u10d3\u10d4\u10e1\u10d0\u10ea \u10de\u10e0\u10dd\u10e4\u10d4\u10e1\u10dd\u10e0\u10d8 \u10d0\u10dc\u10d3\u10e0\u10d8\u10d0 \u10d9\u10e0\u10d0\u10e1\u10dc\u10dd\u10d5\u10d8 \u10e1\u10d0\u10d7\u10d0\u10d5\u10d4\u10e8\u10d8 \u10e9\u10d0\u10e3\u10d3\u10d2\u10d0 \u10d1\u10d0\u10e6\u10d8\u10e1 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10d0\u10e1. \u10d0\u10db \u10e1\u10d0\u10e5\u10db\u10d4\u10e8\u10d8 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10ec\u10d5\u10da\u10d8\u10da\u10d8 \u10e8\u10d4\u10d8\u10e2\u10d0\u10dc\u10d0 \u10d0\u10d2\u10e0\u10dd\u10dc\u10dd\u10db-\u10d3\u10d4\u10d9\u10dd\u10e0\u10d0\u10e2\u10dd\u10e0\u10db\u10d0 \u10d8\u10d0\u10e1\u10dd\u10dc \u10d2\u10dd\u10e0\u10d3\u10d4\u10d6\u10d8\u10d0\u10dc\u10db\u10d0. \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0 \u10d1\u10d0\u10e6\u10e8\u10d8 \u10dd\u10e0\u10d8 \u10d0\u10d7\u10d0\u10e1\u10d6\u10d4 \u10db\u10d4\u10e2\u10d8 \u10e1\u10d0\u10ee\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4 \u10ee\u10d0\u10e0\u10dd\u10d1\u10e1. \u10db\u10d0\u10d7 \u10e8\u10dd\u10e0\u10d8\u10e1 104 \u10d9\u10d0\u10d5\u10d9\u10d0\u10e1\u10d8\u10e3\u10e0\u10d8 \u10ec\u10d0\u10e0\u10db\u10dd\u10e8\u10dd\u10d1\u10d8\u10e1\u10d0\u10d0, \u10d3\u10d0\u10dc\u10d0\u10e0\u10e9\u10d4\u10dc\u10d8 \u10d9\u10d8 \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e1 \u10e1\u10ee\u10d5\u10d0\u10d3\u10d0\u10e1\u10ee\u10d5\u10d0 \u10d9\u10e3\u10d7\u10ee\u10d8\u10d3\u10d0\u10dc \u10d0\u10e0\u10d8\u10e1 \u10e8\u10d4\u10db\u10dd\u10e2\u10d0\u10dc\u10d8\u10da\u10d8. \u10d1\u10d0\u10d7\u10e3\u10db\u10d8\u10e1 \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0 \u10d1\u10d0\u10e6\u10e8\u10d8 \u10d0\u10e0\u10d0\u10d4\u10e0\u10d7\u10d8 \u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10de\u10e0\u10dd\u10d2\u10e0\u10d0\u10db\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10d3\u10d4\u10d9\u10dd\u10e0\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10db\u10d4\u10d1\u10d0\u10e6\u10d4\u10dd\u10d1\u10d8\u10e1, \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d7\u10d0 \u10d3\u10d0\u10ea\u10d5\u10d8\u10e1, \u10d4\u10d9\u10dd\u10d2\u10d0\u10dc\u10d0\u10d7\u10da\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d7\u10e3 \u10e2\u10e3\u10e0\u10d8\u10d6\u10db\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7\u10e3\u10da\u10d4\u10d1\u10d8\u10d7. 2012 \u10ec\u10d4\u10da\u10e1 \u10d1\u10d0\u10e6\u10d8\u10e1 \u10d0\u10e1\u10d8 \u10ec\u10da\u10d8\u10e1 \u10d8\u10e3\u10d1\u10d8\u10da\u10d4 \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8\u10db\u10d4 \u10e6\u10dd\u10dc\u10d8\u10e1\u10eb\u10d8\u10d4\u10d1\u10d8\u10d7 \u10d0\u10e6\u10d8\u10dc\u10d8\u10e8\u10dc\u10d0, \u10db\u10d0\u10d7 \u10e8\u10dd\u10e0\u10d8\u10e1, \u10e9\u10d0\u10e2\u10d0\u10e0\u10d3\u10d0 \u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10e1\u10d0\u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10dd \u10d9\u10dd\u10dc\u10e4\u10d4\u10e0\u10d4\u10dc\u10ea\u10d8\u10d0", "answerA": "\u10d1\u10d0\u10d7\u10e3\u10db\u10d8\u10e1 \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0 \u10d1\u10d0\u10e6\u10e8\u10d8 \u10d1\u10d4\u10d5\u10e0\u10d8 \u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10de\u10e0\u10dd\u10d2\u10e0\u10d0\u10db\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0", "answerB": "\u10d1\u10d0\u10d7\u10e3\u10db\u10d8\u10e1 \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d1\u10d0\u10e6\u10d8\u10e1 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10d0\u10e1 \u10e1\u10d0\u10d7\u10d0\u10d5\u10d4\u10e8\u10d8 \u10d8\u10d0\u10e1\u10dd\u10dc \u10d2\u10dd\u10e0\u10d3\u10d4\u10d6\u10d8\u10d0\u10dc\u10d8 \u10e9\u10d0\u10e3\u10d3\u10d2\u10d0", "answerC": "\u10d1\u10d0\u10d7\u10e3\u10db\u10d8\u10e1 \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d1\u10d0\u10e6\u10d8\u10e1 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d7\u10d0 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d0 \u10d9\u10d0\u10d5\u10d9\u10d0\u10e1\u10d8\u10e3\u10e0\u10d8 \u10ec\u10d0\u10e0\u10db\u10dd\u10e8\u10dd\u10d1\u10d8\u10e1\u10d0\u10d0", "answerD": "\u10d1\u10d0\u10d7\u10e3\u10db\u10d8\u10e1 \u10d1\u10dd\u10e2\u10d0\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10d1\u10d0\u10e6\u10d8\u10e1 \u10e3\u10db\u10d7\u10d0\u10d5\u10e0\u10d4\u10e1\u10d8 \u10e4\u10e3\u10dc\u10e5\u10ea\u10d8\u10d0 \u10e2\u10e3\u10e0\u10d8\u10d6\u10db\u10d8\u10e1 \u10ee\u10d4\u10da\u10e8\u10d4\u10ec\u10e7\u10dd\u10d1\u10d0\u10d0", "correctanswer": "B"}, {"questionid": 186, "questiontext": "- \u10d0) 37 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.3.7. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d3\u10d4\u10d3\u10d0\u10e5\u10d0\u10da\u10d0\u10e5\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10d9\u10d0\u10d5\u10d9\u10d0\u10e1\u10d8\u10d8\u10e1 \u10e0\u10d4\u10d2\u10d8\u10dd\u10dc\u10d8\u10e1 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10d8\u10dc\u10d3\u10e3\u10e1\u10e2\u10e0\u10d8\u10e3\u10da\u10d8 \u10d3\u10d0 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10e3\u10da\u10d8 \u10ea\u10d4\u10dc\u10e2\u10e0\u10d8\u10d0. \u10d8\u10d2\u10d8 \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10e3\u10da \u10d0\u10d1\u10e0\u10d4\u10e8\u10e3\u10db\u10d8\u10e1 \u10d2\u10d6\u10d0\u10d6\u10d4 \u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10d3\u10d0, \u10e0\u10dd\u10d2\u10dd\u10e0\u10ea \u10eb\u10d5\u10d4\u10da\u10d0\u10d3, \u10d0\u10ee\u10da\u10d0\u10ea \u10db\u10d0\u10e1 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10e1\u10d0\u10e2\u10e0\u10d0\u10dc\u10d6\u10d8\u10e2\u10dd \u10e4\u10e3\u10dc\u10e5\u10ea\u10d8\u10d0 \u10d0\u10e5\u10d5\u10e1. \u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d0 \u10dd\u10d3\u10d8\u10d7\u10d2\u10d0\u10dc\u10d5\u10d4 \u10db\u10e0\u10d0\u10d5\u10d0\u10da\u10d4\u10e0\u10dd\u10d5\u10d0\u10dc\u10d8 \u10d8\u10e7\u10dd. \u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d5\u10d4\u10e0\u10d3\u10d8\u10d7 \u10d0\u10e5 \u10ea\u10ee\u10dd\u10d5\u10e0\u10dd\u10d1\u10d3\u10dc\u10d4\u10dc: \u10e5\u10e3\u10e0\u10d7\u10d4\u10d1\u10d8, \u10e1\u10dd\u10db\u10ee\u10d4\u10d1\u10d8, \u10d0\u10d6\u10d4\u10e0\u10d1\u10d0\u10d8\u10ef\u10d0\u10dc\u10d4\u10da\u10d4\u10d1\u10d8, \u10e0\u10e3\u10e1\u10d4\u10d1\u10d8, \u10d1\u10d4\u10e0\u10eb\u10dc\u10d4\u10d1\u10d8. \u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10d8 \u10db\u10d4\u10e4\u10d4\u10d4\u10d1\u10d8 \u10da\u10dd\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10d8\u10d7 \u10ee\u10d4\u10da\u10e1 \u10e3\u10ec\u10e7\u10dd\u10d1\u10d3\u10dc\u10d4\u10dc \u10e1\u10ee\u10d5\u10d0\u10d3\u10d0\u10e1\u10ee\u10d5\u10d0 \u10ee\u10d0\u10da\u10ee\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10e0\u10ec\u10db\u10e3\u10dc\u10dd\u10d4\u10d1\u10d8\u10e1 \u10ec\u10d0\u10e0\u10db\u10dd\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10d4\u10da\u10d7\u10d0 \u10d7\u10d0\u10dc\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d0\u10e1. \u10e1\u10ec\u10dd\u10e0\u10d4\u10d3 \u10d0\u10db\u10d8\u10e1 \u10d3\u10d0\u10e1\u10e2\u10e3\u10e0\u10d8\u10d0 \u10d8\u10e1 \u10e4\u10d0\u10e5\u10e2\u10d8, \u10e0\u10dd\u10db \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8\u10e1 \u10d4\u10e0\u10d7-\u10d4\u10e0\u10d7 \u10eb\u10d5\u10d4\u10da \u10e3\u10d1\u10d0\u10dc\u10e8\u10d8 \u10db\u10d4\u10e9\u10d4\u10d7\u10d8, \u10e1\u10d8\u10dc\u10d0\u10d2\u10dd\u10d2\u10d0, \u10d2\u10e0\u10d8\u10d2\u10dd\u10e0\u10d8\u10d0\u10dc\u10e3\u10da\u10d8 \u10d3\u10d0 \u10db\u10d0\u10e0\u10d7\u10da\u10db\u10d0\u10d3\u10d8\u10d3\u10d4\u10d1\u10da\u10e3\u10e0\u10d8 \u10e2\u10d0\u10eb\u10e0\u10d4\u10d1\u10d8 \u10d4\u10e0\u10d7\u10db\u10d0\u10dc\u10d4\u10d7\u10d8\u10e1 \u10d2\u10d5\u10d4\u10e0\u10d3\u10d8\u10d7 \u10d3\u10d2\u10d0\u10e1", "answerA": "\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc \u10e1\u10d0\u10e2\u10e0\u10d0\u10dc\u10d6\u10d8\u10e2\u10dd \u10e4\u10e3\u10dc\u10e5\u10ea\u10d8\u10d0\u10e1 \u10d1\u10dd\u10da\u10dd \u10d3\u10e0\u10dd\u10d8\u10d3\u10d0\u10dc \u10d0\u10e1\u10e0\u10e3\u10da\u10d4\u10d1\u10e1", "answerB": "\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10dd\u10d3\u10d8\u10d7\u10d2\u10d0\u10dc\u10d5\u10d4 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10db\u10e0\u10d0\u10d5\u10d0\u10da\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10dd\u10d1\u10d8\u10d7 \u10d2\u10d0\u10db\u10dd\u10d8\u10e0\u10e9\u10d4\u10dd\u10d3\u10d0", "answerC": "\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10e1\u10ee\u10d5\u10d0 \u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d8\u10d7 \u10d2\u10d0\u10db\u10dd\u10d8\u10e0\u10e9\u10d4\u10d5\u10d0", "answerD": "\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 \u10e7\u10d5\u10d4\u10da\u10d0 \u10e2\u10d0\u10eb\u10d0\u10e0\u10d8 \u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10d8 \u10db\u10d4\u10e4\u10d4\u10d4\u10d1\u10d8\u10e1 \u10d8\u10dc\u10d8\u10ea\u10d8\u10d0\u10e2\u10d8\u10d5\u10d8\u10d7 \u10e8\u10d4\u10dc\u10d3\u10d4\u10d1\u10dd\u10d3\u10d0", "correctanswer": "A"}, {"questionid": 187, "questiontext": "- \u10d1) III.3.8. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10e8\u10d0\u10d5\u10d8 \u10d6\u10e6\u10d5\u10d0 \u10d0\u10e2\u10da\u10d0\u10dc\u10e2\u10d8\u10e1 \u10dd\u10d9\u10d4\u10d0\u10dc\u10d8\u10e1 \u10d0\u10e3\u10d6\u10e1 \u10db\u10d8\u10d4\u10d9\u10e3\u10d7\u10d5\u10dc\u10d4\u10d1\u10d0. \u10db\u10d8\u10e1\u10d8 \u10e4\u10d0\u10e0\u10d7\u10dd\u10d1\u10d8 422 000 \u10d9\u10db\u00b2-\u10d8\u10d0. \u10d8\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d3\u10d0\u10e1\u10d0\u10d5\u10da\u10d4\u10d7\u10d8\u10d7 \u10d4\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d4\u10d1\u10d0. \u10db\u10d8\u10e1 \u10dc\u10d0\u10de\u10d8\u10e0\u10d4\u10d1\u10d7\u10d0\u10dc \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10d0\u10e0\u10d0\u10d4\u10e0\u10d7\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d8 \u10d3\u10d0 \u10d9\u10e3\u10e0\u10dd\u10e0\u10e2\u10d8. \u10e8\u10d0\u10d5\u10d8 \u10d6\u10e6\u10d5\u10d8\u10e1 \u10e4\u10da\u10dd\u10e0\u10d0 \u10d3\u10d0 \u10e4\u10d0\u10e3\u10dc\u10d0 \u10db\u10e0\u10d0\u10d5\u10d0\u10da\u10e4\u10d4\u10e0\u10dd\u10d5\u10d0\u10dc\u10d8\u10d0. \u10db\u10d0\u10e1\u10e8\u10d8 \u10d2\u10d0\u10d5\u10e0\u10ea\u10d4\u10da\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10ec\u10e7\u10d0\u10da\u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d7\u10d0 350 \u10d3\u10d0 \u10e4\u10d0\u10e3\u10dc\u10d8\u10e1 2500 \u10e1\u10d0\u10ee\u10d4\u10dd\u10d1\u10d0. \u10d6\u10e6\u10d5\u10d0\u10e8\u10d8 \u10d1\u10d8\u10dc\u10d0\u10d3\u10e0\u10dd\u10d1\u10d4\u10dc \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10ef\u10d8\u10e8\u10d8\u10e1 \u10d7\u10d4\u10d5\u10d6\u10d4\u10d1\u10d8: \u10dd\u10e0\u10d0\u10d2\u10e3\u10da\u10d8, \u10d9\u10d4\u10e4\u10d0\u10da\u10d8 \u10d3\u10d0 \u10e1\u10ee\u10d5. \u10e8\u10d0\u10d5 \u10d6\u10e6\u10d5\u10d0\u10e1 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10d3\u10d8\u10d3\u10d8 \u10d3\u10d0 \u10db\u10ea\u10d8\u10e0\u10d4 \u10db\u10d8\u10db\u10dd\u10e5\u10ea\u10d4\u10d5\u10d4\u10d1\u10d8. \u10db\u10d8\u10e1\u10d8 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10db\u10d0\u10ee\u10d0\u10e1\u10d8\u10d0\u10d7\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10ec\u10e7\u10da\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10d1\u10d0\u10e0\u10d8 \u10d3\u10dd\u10dc\u10d4. \u10d0\u10e5 \u10ec\u10e7\u10da\u10d8\u10e1 \u10d6\u10d4\u10d3\u10d0\u10de\u10d8\u10e0\u10d8 \u10e3\u10db\u10d4\u10e2\u10d4\u10e1\u10d0\u10d3 \u10ec\u10e7\u10dc\u10d0\u10e0\u10d8\u10d0. \u10d6\u10e6\u10d5\u10d8\u10e1 \u10d2\u10d0\u10d5\u10da\u10d4\u10dc\u10d8\u10d7 \u10d3\u10d0\u10e1\u10d0\u10d5\u10da\u10d4\u10d7 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10d9\u10db\u10d0\u10dd\u10d3 \u10d3\u10d8\u10d3 \u10dc\u10d0\u10ec\u10d8\u10da\u10e8\u10d8 \u10d6\u10d0\u10db\u10d7\u10d0\u10e0\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10d0, \u10d6\u10d0\u10e4\u10ee\u10e3\u10da\u10d8 \u10d9\u10d8 \u2013 \u10d2\u10e0\u10d8\u10da\u10d8. \u10d0\u10e1\u10d4\u10d7\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d4\u10d1\u10e3\u10e0\u10d8 \u10d9\u10da\u10d8\u10db\u10d0\u10e2\u10d8 \u10ee\u10d4\u10da\u10e1 \u10e3\u10ec\u10e7\u10dd\u10d1\u10e1 \u10d0\u10db \u10e0\u10d4\u10d2\u10d8\u10dd\u10dc\u10e8\u10d8 \u10e1\u10e3\u10d1\u10e2\u10e0\u10dd\u10de\u10d8\u10d9\u10e3\u10da\u10d8 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10d0\u10e1", "answerA": "\u10e8\u10d0\u10d5\u10d8 \u10d6\u10e6\u10d5\u10d8\u10e1 \u10d2\u10d0\u10d5\u10da\u10d4\u10dc\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd \u10d3\u10d0\u10e1\u10d0\u10d5\u10da\u10d4\u10d7 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d4\u10d1\u10e3\u10e0\u10d8 \u10d9\u10da\u10d8\u10db\u10d0\u10e2\u10d8\u10d0", "answerB": "\u10e8\u10d0\u10d5\u10d8 \u10d6\u10e6\u10d5\u10d8\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10db\u10d0\u10ee\u10d0\u10e1\u10d8\u10d0\u10d7\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10db\u10ea\u10d8\u10e0\u10d4 \u10d3\u10d0 \u10d3\u10d8\u10d3\u10d8 \u10db\u10d8\u10db\u10dd\u10e5\u10ea\u10d4\u10d5\u10d4\u10d1\u10d8", "answerC": "\u10e8\u10d0\u10d5\u10d8 \u10d6\u10e6\u10d5\u10d8\u10e1 \u10d9\u10da\u10d8\u10db\u10d0\u10e2\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd \u10e1\u10e3\u10d1\u10e2\u10e0\u10dd\u10de\u10d8\u10d9\u10e3\u10da\u10d8 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10ee\u10d0\u10e0\u10d4\u10d1\u10d0 \u10e0\u10d7\u10e3\u10da\u10d8\u10d0", "answerD": "\u10e8\u10d0\u10d5\u10d8 \u10d6\u10e6\u10d5\u10d8\u10e1 \u10e1\u10d0\u10dc\u10d0\u10de\u10d8\u10e0\u10dd \u10d6\u10dd\u10da\u10e8\u10d8 \u10d6\u10d0\u10db\u10d7\u10d0\u10e0\u10e8\u10d8 \u10e1\u10d0\u10d2\u10e0\u10eb\u10dc\u10dd\u10d1\u10da\u10d0\u10d3 \u10ea\u10d8\u10d5\u10d0, \u10d6\u10d0\u10e4\u10ee\u10e3\u10da\u10e8\u10d8 \u2013 \u10ea\u10ee\u10d4\u10da\u10d0", "correctanswer": "B"}, {"questionid": 188, "questiontext": "- \u10d0) III.3.9. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10e5\u10d5\u10d4\u10d5\u10e0\u10d8 \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e1\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d4\u10da\u10d8 \u10d3\u10d0 \u10e8\u10d4\u10e1\u10d0\u10dc\u10d0\u10ee\u10d8 \u10d7\u10d8\u10ee\u10d8\u10e1 \u10d3\u10d8\u10d3\u10d8 \u10ed\u10e3\u10e0\u10ed\u10d4\u10da\u10d8\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10db\u10d8\u10ec\u10d0\u10e8\u10d8\u10d0 \u10e9\u10d0\u10e4\u10da\u10e3\u10da\u10d8. \u10db\u10d8\u10e1\u10d8 \u10d3\u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e0\u10d7\u10e3\u10da\u10d8 \u10d3\u10d0 \u10ee\u10d0\u10dc\u10d2\u10e0\u10eb\u10da\u10d8\u10d5\u10d8 \u10de\u10e0\u10dd\u10ea\u10d4\u10e1\u10d8\u10d0. \u10d7\u10d8\u10ee\u10d0, \u10e0\u10dd\u10db\u10da\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10e5\u10d5\u10d4\u10d5\u10e0\u10e1 \u10d0\u10d9\u10d4\u10d7\u10d4\u10d1\u10d4\u10dc, \u10e8\u10d4\u10d8\u10ea\u10d0\u10d5\u10e1 \u10d9\u10d8\u10e0\u10e5\u10d5\u10d0\u10e1\u10d0 \u10d3\u10d0 \u10db\u10ea\u10d8\u10e0\u10d4 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d8\u10d7 \u10eb\u10d5\u10d8\u10e0\u10e4\u10d0\u10e1 \u10da\u10d8\u10d7\u10dd\u10dc\u10d4\u10d1\u10e1. \u10d4\u10e1 \u10d0\u10db\u10d0\u10d2\u10e0\u10d4\u10d1\u10e1 \u10e5\u10d5\u10d4\u10d5\u10e0\u10d8\u10e1 \u10d9\u10d4\u10d3\u10da\u10d4\u10d1\u10e1 \u10d3\u10d0 \u10ee\u10d4\u10da\u10e1 \u10e3\u10e8\u10da\u10d8\u10e1 \u10d1\u10d0\u10e5\u10e2\u10d4\u10e0\u10d8\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10d1\u10d0\u10e1. \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e5\u10d5\u10d4\u10d5\u10e0\u10e8\u10d8 \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d0 8 \u10d0\u10d7\u10d0\u10e1\u10d8 \u10ec\u10da\u10d8\u10e1 \u10ec\u10d8\u10dc \u10d3\u10d0\u10d8\u10ec\u10e7\u10d4\u10e1. \u10d0\u10db \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1 \u10e2\u10e0\u10d0\u10d3\u10d8\u10ea\u10d8\u10d0\u10e1 \u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10d4\u10d1\u10d8 \u10d3\u10e6\u10d4\u10db\u10d3\u10d4 \u10d8\u10dc\u10d0\u10e0\u10e9\u10e3\u10dc\u10d4\u10d1\u10d4\u10dc. 2013 \u10ec\u10d4\u10da\u10e1 \u10d8\u10e3\u10dc\u10d4\u10e1\u10d9\u10dd\u10db \u10e5\u10d5\u10d4\u10d5\u10e0\u10e8\u10d8 \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10db\u10d4\u10d7\u10dd\u10d3\u10d8 \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1\u10d0\u10d3 \u10d0\u10e6\u10d8\u10d0\u10e0\u10d0 \u10d3\u10d0 \u10db\u10d0\u10e1 \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10e3\u10da\u10d8 \u10db\u10d4\u10db\u10d9\u10d5\u10d8\u10d3\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10eb\u10d4\u10d2\u10da\u10d8\u10e1 \u10e1\u10e2\u10d0\u10e2\u10e3\u10e1\u10d8 \u10db\u10d8\u10d0\u10dc\u10d8\u10ed\u10d0, \u10e0\u10d0\u10db\u10d0\u10ea \u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10de\u10dd\u10de\u10e3\u10da\u10d0\u10e0\u10d8\u10d6\u10d0\u10ea\u10d8\u10d0\u10e1 \u10d9\u10d8\u10d3\u10d4\u10d5 \u10e3\u10e4\u10e0\u10dd \u10db\u10d4\u10e2\u10d0\u10d3 \u10e8\u10d4\u10e3\u10ec\u10e7\u10dd \u10ee\u10d4\u10da\u10d8", "answerA": "\u10d3\u10e6\u10d4\u10db\u10d3\u10d4 \u10d3\u10d0\u10e3\u10d3\u10d2\u10d4\u10dc\u10d4\u10da\u10d8\u10d0, \u10e0\u10dd\u10d3\u10d8\u10e1 \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e5\u10d5\u10d4\u10d5\u10e0\u10d8\u10e1 \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d0", "answerB": "\u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10ef\u10d4\u10e0 \u10d9\u10d8\u10d3\u10d4\u10d5 \u10e3\u10ea\u10dc\u10dd\u10d1\u10d8\u10d0 \u10e5\u10d5\u10d4\u10d5\u10e0\u10e8\u10d8 \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e7\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1 \u10db\u10d4\u10d7\u10dd\u10d3\u10d8", "answerC": "\u10e5\u10d5\u10d4\u10d5\u10e0\u10d8\u10e1 \u10d3\u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10d0 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10d0\u10d3\u10d5\u10d8\u10da\u10d8\u10d0 \u10d3\u10d0 \u10d0\u10e0\u10ea \u10d8\u10e1\u10d4 \u10d3\u10d8\u10d3 \u10d3\u10e0\u10dd\u10e1 \u10db\u10dd\u10d8\u10d7\u10ee\u10dd\u10d5\u10e1", "answerD": "\u10e5\u10d5\u10d4\u10d5\u10e0\u10d8\u10e1 \u10d3\u10d0\u10e1\u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10d4\u10da\u10d8 \u10d7\u10d8\u10ee\u10d0 \u10d9\u10d8\u10e0\u10e5\u10d5\u10d0\u10e1\u10d0 \u10d3\u10d0 \u10eb\u10d5\u10d8\u10e0\u10e4\u10d0\u10e1 \u10da\u10d8\u10d7\u10dd\u10dc\u10d4\u10d1\u10e1 \u10e8\u10d4\u10d8\u10ea\u10d0\u10d5\u10e1", "correctanswer": "A"}, {"questionid": 189, "questiontext": "- \u10d3) 38 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.3.10. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10e3\u10d7\u10ee\u10d4\u10d4\u10d1\u10e1 \u10d4\u10e0\u10d7\u10db\u10d0\u10dc\u10d4\u10d7\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10d2\u10d0\u10dc\u10e1\u10ee\u10d5\u10d0\u10d5\u10d4\u10d1\u10e3\u10da\u10d8 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1 \u10ec\u10d4\u10e1\u10d8 \u10d3\u10d0 \u10e1\u10d0\u10db\u10d6\u10d0\u10e0\u10d4\u10e3\u10da\u10dd \u10d2\u10d0\u10db\u10dd\u10d0\u10e0\u10e9\u10d4\u10d5\u10e1. \u10db\u10d0\u10d2\u10d0\u10da\u10d8\u10d7\u10d0\u10d3, \u10d0\u10e6\u10db\u10dd\u10e1\u10d0\u10d5\u10da\u10d4\u10d7 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10e3\u10e7\u10d5\u10d0\u10e0\u10d7 \u10ee\u10dd\u10e0\u10ea\u10d8, \u10ea\u10ee\u10d8\u10db\u10d8\u10d0\u10dc\u10d8 \u10e1\u10d0\u10d9\u10d5\u10d4\u10d1\u10d8. \u10d3\u10d0\u10e1\u10d0\u10d5\u10da\u10d4\u10d7 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10de\u10dd\u10de\u10e3\u10da\u10d0\u10e0\u10e3\u10da\u10d8\u10d0 \u10dc\u10d8\u10d2\u10d5\u10d6\u10d8\u10d7\u10d0 \u10d3\u10d0 \u10ec\u10d8\u10ec\u10d0\u10d9\u10d8\u10d7 \u10e8\u10d4\u10d6\u10d0\u10d5\u10d4\u10d1\u10e3\u10da\u10d8 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10e3\u10da\u10d8 \u10e1\u10d0\u10ed\u10db\u10d4\u10da\u10d8 \u2013 \u10e4\u10ee\u10d0\u10da\u10d4\u10e3\u10da\u10d8 \u10d3\u10d0 \u10e0\u10eb\u10d8\u10e1 \u10de\u10e0\u10dd\u10d3\u10e3\u10e5\u10e2\u10d4\u10d1\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10d3\u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10e3\u10da\u10d8 \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10d8. \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10e1\u10d0\u10db\u10e8\u10dd\u10d1\u10da\u10dd\u10e8\u10d8 \u10d5\u10d0\u10d6\u10d8 \u10d7\u10d8\u10d7\u10e5\u10db\u10d8\u10e1 \u10e7\u10d5\u10d4\u10da\u10d2\u10d0\u10dc \u10ee\u10d0\u10e0\u10dd\u10d1\u10e1, \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10d7 \u2013 \u10d9\u10d0\u10ee\u10d4\u10d7\u10e8\u10d8. \u10d0\u10e5\u10d0\u10e3\u10e0\u10d8 \u10e2\u10e0\u10d0\u10d3\u10d8\u10ea\u10d8\u10e3\u10da\u10d8 \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10d8\u10d0: \u10db\u10ec\u10d5\u10d0\u10d3\u10d8, \u10ee\u10d0\u10e8\u10da\u10d0\u10db\u10d0, \u10e9\u10d0\u10e5\u10d0\u10e4\u10e3\u10da\u10d8. \u10d0\u10ed\u10d0\u10e0\u10e3\u10da\u10d8 \u10e1\u10d0\u10db\u10d6\u10d0\u10e0\u10d4\u10e3\u10da\u10dd \u10d2\u10d0\u10db\u10dd\u10d8\u10e0\u10e9\u10d4\u10d5\u10d0 \u10e0\u10eb\u10d8\u10e1 \u10de\u10e0\u10dd\u10d3\u10e3\u10e5\u10e2\u10d4\u10d1\u10d8\u10e1\u10d2\u10d0\u10dc \u10d3\u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10e3\u10da\u10d8 \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10d8\u10d7, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10db\u10d8\u10e1\u10d8 \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d0 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d0\u10d3 \u10db\u10d4\u10e1\u10d0\u10e5\u10dd\u10dc\u10da\u10d4\u10dd\u10d1\u10d0\u10e1 \u10db\u10d8\u10e1\u10d3\u10d4\u10d5\u10e1", "answerA": "\u10d0\u10ed\u10d0\u10e0\u10d8\u10e1 \u10d0\u10d3\u10d2\u10d8\u10da\u10dd\u10d1\u10e0\u10d8\u10d5\u10d8 \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e2\u10e0\u10d0\u10d3\u10d8\u10ea\u10d8\u10e3\u10da\u10d8 \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10d8\u10d0 \u10ee\u10d0\u10e8\u10da\u10d0\u10db\u10d0 \u10d3\u10d0 \u10e9\u10d0\u10e5\u10d0\u10e4\u10e3\u10da\u10d8", "answerB": "\u10d9\u10d0\u10ee\u10e3\u10e0 \u10e1\u10d0\u10db\u10d6\u10d0\u10e0\u10d4\u10e3\u10da\u10dd\u10e8\u10d8 \u10e0\u10eb\u10d8\u10e1 \u10de\u10e0\u10dd\u10d3\u10e3\u10e5\u10e2\u10d4\u10d1\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10d3\u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10e3\u10da\u10d8 \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10d8 \u10ed\u10d0\u10e0\u10d1\u10dd\u10d1\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d7\u10d8\u10d7\u10dd\u10d4\u10e3\u10da \u10d9\u10e3\u10d7\u10ee\u10d4\u10e8\u10d8 \u10d2\u10d0\u10dc\u10e1\u10ee\u10d5\u10d0\u10d5\u10d4\u10d1\u10e3\u10da \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10e1 \u10d0\u10db\u10d6\u10d0\u10d3\u10d4\u10d1\u10d4\u10dc", "answerD": "\u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10e1\u10d0\u10db\u10d6\u10d0\u10e0\u10d4\u10e3\u10da\u10dd \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d0\u10d3 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10e3\u10da\u10d8 \u10d9\u10d4\u10e0\u10eb\u10d4\u10d1\u10d8\u10d7 \u10d2\u10d0\u10db\u10dd\u10d8\u10e0\u10e9\u10d4\u10d5\u10d0", "correctanswer": "D"}, {"questionid": 190, "questiontext": "- \u10d2) III.3.11. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10d8 \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10d0 \u10e5\u10d5\u10d4\u10db\u10dd \u10e5\u10d0\u10e0\u10d7\u10da\u10e8\u10d8. \u10d0\u10e0\u10e5\u10d4\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10d2\u10d0\u10d7\u10ee\u10e0\u10d4\u10d1\u10d8 \u10d0\u10e5 1936 \u10ec\u10da\u10d8\u10d3\u10d0\u10dc \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1. \u10d7\u10d0\u10d5\u10d3\u10d0\u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d0\u10d3 \u10d0\u10e6\u10db\u10dd\u10d0\u10e9\u10d8\u10dc\u10d4\u10e1 \u10e8\u10e3\u10d0 \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d4\u10d4\u10d1\u10d8\u10e1 \u10ea\u10d8\u10ee\u10d4\u10e1\u10d8\u10db\u10d0\u10d2\u10e0\u10d8\u10e1 \u10dc\u10d0\u10dc\u10d2\u10e0\u10d4\u10d5\u10d4\u10d1\u10d8, \u10e8\u10d4\u10dc\u10dd\u10d1\u10d4\u10d1\u10d8\u10e1 \u10dc\u10d0\u10e8\u10d7\u10d4\u10d1\u10d8, \u10ea\u10ee\u10dd\u10d5\u10d4\u10da\u10d7\u10d0 \u10eb\u10d5\u10da\u10d4\u10d1\u10d8, \u10e5\u10d5\u10d8\u10e1 \u10d8\u10d0\u10e0\u10d0\u10e6\u10d4\u10d1\u10d8, \u10db\u10dd\u10d2\u10d5\u10d8\u10d0\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d9\u10d8 \u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10d8\u10e1 \u10db\u10d0\u10ee\u10da\u10dd\u10d1\u10da\u10d0\u10d3 \u10d8\u10de\u10dd\u10d5\u10d4\u10e1 \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1 \u10e5\u10d0\u10da\u10d4\u10d1\u10d8. \u10d3\u10d0\u10d3\u10d2\u10d8\u10dc\u10d3\u10d0 \u10db\u10d0\u10d7\u10d8 \u10d0\u10e1\u10d0\u10d9\u10d8\u10ea \u2013 1,8 \u10db\u10d8\u10da\u10d8\u10dd\u10dc\u10d8 \u10ec\u10d4\u10da\u10d8. \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10db\u10d0 \u10d0\u10e6\u10db\u10dd\u10e9\u10d4\u10dc\u10d0\u10db \u10e8\u10d4\u10ea\u10d5\u10d0\u10da\u10d0 \u10db\u10d0\u10dc\u10d0\u10db\u10d3\u10d4 \u10d0\u10e0\u10e1\u10d4\u10d1\u10e3\u10da\u10d8 \u10db\u10dd\u10e1\u10d0\u10d6\u10e0\u10d4\u10d1\u10d0, \u10e0\u10dd\u10db \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d4\u10d1\u10d8 \u10d4\u10d5\u10e0\u10d0\u10d6\u10d8\u10d0\u10e8\u10d8 \u10d0\u10e4\u10e0\u10d8\u10d9\u10d8\u10d3\u10d0\u10dc \u10db\u10dd\u10d5\u10d8\u10d3\u10dc\u10d4\u10dc. \u10d3\u10e6\u10d4\u10e1 \u10e3\u10d9\u10d5\u10d4 \u10d0\u10e6\u10d8\u10d0\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0, \u10e0\u10dd\u10db \u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10d4\u10d5\u10e0\u10dd\u10de\u10d4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10db\u10e8\u10dd\u10d1\u10da\u10dd\u10d0. \u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10e8\u10d8 \u10d0\u10e6\u10db\u10dd\u10e9\u10d4\u10dc\u10d8\u10da\u10d8 \u10dd\u10e0\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1 \u10e5\u10d0\u10da\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7 \u10d0\u10e6\u10d0\u10d3\u10d2\u10d8\u10dc\u10d4\u10e1 \u10d0\u10db \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10d4\u10d1\u10d8. \u10db\u10d0\u10d7 \u10e1\u10d0\u10ee\u10d4\u10da\u10d4\u10d1\u10d8\u10ea \u10e8\u10d4\u10e3\u10e0\u10e9\u10d8\u10d4\u10e1: \u10d4\u10e0\u10d7\u10e1 \u10db\u10d6\u10d8\u10d0 \u10d3\u10d0\u10d0\u10e0\u10e5\u10d5\u10d4\u10e1, \u10db\u10d4\u10dd\u10e0\u10d4\u10e1 \u2013 \u10d6\u10d4\u10d6\u10d5\u10d0", "answerA": "\u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10d8\u10e1 \u10db\u10d0\u10ee\u10da\u10dd\u10d1\u10da\u10d0\u10d3 \u10d0\u10e6\u10db\u10dd\u10e9\u10d4\u10dc\u10d8\u10da\u10d8\u10d0 \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d4\u10d1\u10d8\u10e1 \u10dc\u10d0\u10e8\u10d7\u10d4\u10d1\u10d8", "answerB": "\u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10e8\u10d8 \u10d0\u10e6\u10db\u10dd\u10e9\u10d4\u10dc\u10d8\u10da\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d4\u10d1\u10d8\u10e1 \u10dc\u10d0\u10e8\u10d7\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e1\u10d0\u10d9\u10d8 \u10d3\u10d0\u10e3\u10d3\u10d2\u10d4\u10dc\u10d4\u10da\u10d8\u10d0", "answerC": "\u10d3\u10e6\u10d4\u10db\u10d3\u10d4 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10d4\u10d5\u10e0\u10dd\u10de\u10d4\u10da\u10d4\u10d1\u10d0\u10d3 \u10d0\u10e4\u10e0\u10d8\u10d9\u10d8\u10d3\u10d0\u10dc \u10d4\u10d5\u10e0\u10d0\u10d6\u10d8\u10d0\u10e8\u10d8 \u10d2\u10d0\u10d3\u10d0\u10e1\u10d0\u10ee\u10da\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d8 \u10d8\u10d7\u10d5\u10da\u10d4\u10d1\u10d8\u10d0\u10dc", "answerD": "\u10e5\u10d0\u10da\u10d0\u10e5 \u10d3\u10db\u10d0\u10dc\u10d8\u10e1\u10e8\u10d8 \u10d0\u10e0\u10e5\u10d4\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10e1\u10d0\u10db\u10e3\u10e8\u10d0\u10dd\u10d4\u10d1\u10d8 \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8\u10db\u10d4 \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10ec\u10d8\u10dc \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd", "correctanswer": "C"}, {"questionid": 191, "questiontext": "- \u10d0) III.3.12. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10d3\u10d4\u10dc\u10d3\u10e0\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10d9\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10d0, \u10e1\u10d0\u10d3\u10d0\u10ea \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d4\u10d1\u10d8 \u10d2\u10d4\u10dd\u10d2\u10e0\u10d0\u10e4\u10d8\u10e3\u10da\u10d8, \u10d3\u10d4\u10d9\u10dd\u10e0\u10d0\u10e2\u10d8\u10e3\u10da\u10d8 \u10d3\u10d0 \u10e1\u10ee\u10d5\u10d0 \u10dc\u10d8\u10e8\u10dc\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7. \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e8\u10d8 \u10e0\u10d5\u10d0 \u10d0\u10e1\u10d4\u10d7\u10d8 \u10d2\u10d0\u10db\u10dd\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10de\u10d0\u10e0\u10d9\u10d8\u10d0, \u10db\u10d0\u10d7 \u10e8\u10dd\u10e0\u10d8\u10e1 \u10d4\u10e0\u10d7-\u10d4\u10e0\u10d7\u10d8 \u10d2\u10e3\u10e0\u10d8\u10d0\u10e8\u10d8\u10d0, \u10d9\u10e3\u10e0\u10dd\u10e0\u10e2 \u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d8\u10da\u10e8\u10d8. \u10d8\u10d2\u10d8 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d8 \u10db\u10d0\u10e1\u10e8\u10e2\u10d0\u10d1\u10d8\u10d7\u10d0 \u10d3\u10d0 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d7\u10d0 \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10d9\u10dd\u10da\u10d4\u10e5\u10ea\u10d8\u10d8\u10d7. \u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d8\u10da\u10d8\u10e1 \u10d3\u10d4\u10dc\u10d3\u10e0\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10d9\u10d8 \u10d2\u10d0\u10d8\u10ee\u10e1\u10dc\u10d0 2020 \u10ec\u10da\u10d8\u10e1 15 \u10d8\u10d5\u10da\u10d8\u10e1\u10e1. \u10de\u10d0\u10e0\u10d9\u10d8\u10e1 18 \u10f0\u10d4\u10e5\u10e2\u10d0\u10e0\u10d6\u10d4 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10e3\u10d7\u10ee\u10d4\u10d4\u10d1\u10e8\u10d8 \u10db\u10dd\u10eb\u10d8\u10d4\u10d1\u10e3\u10da\u10d8 \u10d4\u10dc\u10d3\u10d4\u10db\u10e3\u10e0\u10d8 \u10ef\u10d8\u10e8\u10d8\u10e1 \u10ee\u10d4\u10d4\u10d1\u10d8. \u10d9\u10dd\u10da\u10d4\u10e5\u10ea\u10d8\u10d0 29 \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10d0\u10ee\u10d4\u10dd\u10d1\u10d8\u10e1 200-\u10d6\u10d4 \u10db\u10d4\u10e2\u10d8 \u10d2\u10d8\u10d2\u10d0\u10dc\u10e2\u10e3\u10e0\u10d8 \u10dc\u10d8\u10db\u10e3\u10e8\u10d8\u10e1\u10d0\u10d2\u10d0\u10dc \u10e8\u10d4\u10d3\u10d2\u10d4\u10d1\u10d0. \u10d3\u10d0\u10dc\u10d0\u10e0\u10e9\u10d4\u10dc 42 \u10f0\u10d4\u10e5\u10e2\u10d0\u10e0\u10d6\u10d4 \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e1 \u10ee\u10e3\u10d7\u10d8\u10d5\u10d4 \u10d9\u10dd\u10dc\u10e2\u10d8\u10dc\u10d4\u10dc\u10e2\u10d8\u10d3\u10d0\u10dc \u10e8\u10d4\u10db\u10dd\u10e2\u10d0\u10dc\u10d8\u10da\u10d8 \u10d0\u10d7\u10d0\u10e1\u10ec\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10d4\u10d2\u10d6\u10dd\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d4\u10d1\u10d8\u10d0 \u10ec\u10d0\u10e0\u10db\u10dd\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8", "answerA": "\u10d3\u10d4\u10dc\u10d3\u10e0\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10d9\u10d8 \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e8\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d0\u10d3 \u10d9\u10e3\u10e0\u10dd\u10e0\u10e2 \u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d8\u10da\u10e8\u10d8 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d3\u10d0", "answerB": "\u10d3\u10d4\u10dc\u10d3\u10e0\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0 \u10de\u10d0\u10e0\u10d9\u10e1 \u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d8\u10da\u10d8\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 42 \u10f0\u10d4\u10e5\u10e2\u10d0\u10e0\u10d8 \u10e3\u10ed\u10d8\u10e0\u10d0\u10d5\u10e1", "answerC": "\u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d8\u10da\u10d8\u10e1 \u10de\u10d0\u10e0\u10d9\u10d8\u10e1 \u10d0\u10d7\u10d0\u10e1\u10ec\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10ee\u10d4\u10d4\u10d1\u10d8 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d8\u10e5\u10dc\u10d0 \u10db\u10dd\u10eb\u10d8\u10d4\u10d1\u10e3\u10da\u10d8", "answerD": "\u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d8\u10da\u10d8\u10e1 \u10de\u10d0\u10e0\u10d9\u10e8\u10d8 \u10d2\u10d8\u10d2\u10d0\u10dc\u10e2\u10e3\u10e0\u10d8 \u10db\u10ea\u10d4\u10dc\u10d0\u10e0\u10d4\u10d4\u10d1\u10d8\u10e1 \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10d9\u10dd\u10da\u10d4\u10e5\u10ea\u10d8\u10d0\u10d0 \u10ec\u10d0\u10e0\u10db\u10dd\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8", "correctanswer": "A"}, {"questionid": 192, "questiontext": "- \u10d3) 39 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.3.13. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10d7-\u10d4\u10e0\u10d7\u10d8 \u10de\u10dd\u10de\u10e3\u10da\u10d0\u10e0\u10e3\u10da\u10d8 \u10e2\u10e3\u10e0\u10d8\u10e1\u10e2\u10e3\u10da\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10d0. \u10d4\u10e1 \u10d2\u10d0\u10dc\u10d0\u10de\u10d8\u10e0\u10dd\u10d1\u10d0 \u10db\u10d8\u10e1\u10db\u10d0 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e3\u10da\u10db\u10d0 \u10d0\u10e0\u10e5\u10d8\u10e2\u10d4\u10e5\u10e2\u10e3\u10e0\u10d0\u10db \u10d3\u10d0 \u10d1\u10e3\u10dc\u10d4\u10d1\u10e0\u10d8\u10d5\u10db\u10d0 \u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0\u10db. \u10d9\u10d0\u10ee\u10d4\u10d7\u10d8\u10e1 \u10e3\u10da\u10d0\u10db\u10d0\u10d6\u10d4\u10e1\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d8 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10db\u10d0\u10e6\u10d0\u10da\u10d1\u10dd\u10e0\u10ea\u10d5\u10d8\u10d0\u10dc \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1, \u10e1\u10d0\u10d8\u10d3\u10d0\u10dc\u10d0\u10ea \u10e9\u10d0\u10dc\u10e1 \u10e0\u10dd\u10d2\u10dd\u10e0\u10ea \u10d0\u10da\u10d0\u10d6\u10dc\u10d8\u10e1 \u10d5\u10d4\u10da\u10d8, \u10d8\u10e1\u10d4 \u2013 \u10d9\u10d0\u10d5\u10d9\u10d0\u10e1\u10d8\u10dd\u10dc\u10d8\u10e1 \u10db\u10d7\u10d4\u10d1\u10d8. \u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d0\u10d3 \u10db\u10d4\u10e4\u10d4 \u10d4\u10e0\u10d4\u10d9\u10da\u10d4 II-\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10e9\u10d0\u10db\u10dd\u10e7\u10d0\u10da\u10d8\u10d1\u10d3\u10d0. \u10d8\u10d2\u10d8 \u10e8\u10d4\u10db\u10dd\u10e0\u10e9\u10d4\u10dc\u10d8\u10da\u10d8\u10d0 \u10d7\u10d8\u10d7\u10e5\u10db\u10d8\u10e1 \u10d8\u10db\u10d0\u10d5\u10d4 \u10e1\u10d0\u10ee\u10d8\u10d7, \u10e0\u10dd\u10d2\u10dd\u10e0\u10d8\u10ea 200 \u10ec\u10da\u10d8\u10e1 \u10ec\u10d8\u10dc \u10d8\u10e7\u10dd. \u10db\u10d0\u10e1 \u10d2\u10d0\u10e0\u10e1 \u10d0\u10d9\u10e0\u10d0\u10d5\u10e1 \u10d2\u10d0\u10da\u10d0\u10d5\u10d0\u10dc\u10d8 28 \u10d9\u10dd\u10e8\u10d9\u10d8\u10d7. \u10d3\u10e6\u10d4\u10e1 \u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10e1 \u10e5\u10d0\u10da\u10d0\u10e5-\u10db\u10e3\u10d6\u10d4\u10e3\u10db\u10e1 \u10e3\u10ec\u10dd\u10d3\u10d4\u10d1\u10d4\u10dc. 2007 \u10ec\u10d4\u10da\u10e1 \u10e9\u10d0\u10e2\u10d0\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10e1\u10d0\u10e0\u10d4\u10e1\u10e2\u10d0\u10d5\u10e0\u10d0\u10ea\u10d8\u10dd \u10e1\u10d0\u10db\u10e3\u10e8\u10d0\u10dd\u10d4\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10d0\u10e5 \u10d2\u10d0\u10d8\u10ee\u10e1\u10dc\u10d0 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10db\u10e3\u10d6\u10d4\u10e3\u10db\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10e8\u10d8\u10ea \u10e3\u10d0\u10db\u10e0\u10d0\u10d5\u10d8 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10d4\u10e5\u10e1\u10de\u10dd\u10dc\u10d0\u10e2\u10d8\u10d0 \u10d2\u10d0\u10db\u10dd\u10e4\u10d4\u10dc\u10d8\u10da\u10d8, \u10db\u10d0\u10d7 \u10e8\u10dd\u10e0\u10d8\u10e1 \u10e4\u10d8\u10e0\u10dd\u10e1\u10db\u10d0\u10dc\u10d8\u10e1 \u10dc\u10d0\u10db\u10e3\u10e8\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8\u10ea\u10d0\u10d0", "answerA": "\u10d0\u10db\u10df\u10d0\u10db\u10d0\u10d3 \u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10d8\u10e1 \u10d2\u10d0\u10da\u10d0\u10d5\u10dc\u10d8\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10ea\u10d8\u10e0\u10d4 \u10dc\u10d0\u10ec\u10d8\u10da\u10d8\u10d0 \u10e8\u10d4\u10db\u10dd\u10e0\u10e9\u10d4\u10dc\u10d8\u10da\u10d8", "answerB": "\u10d3\u10e6\u10d4\u10e1 \u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10e1 \u10d3\u10d0\u10d9\u10d0\u10e0\u10d2\u10e3\u10da\u10d8 \u10d0\u10e5\u10d5\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d8 \u10eb\u10d5\u10d4\u10da\u10d8 \u10d8\u10d4\u10e0\u10e1\u10d0\u10ee\u10d4", "answerC": "\u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10d8 \u10d2\u10d0\u10db\u10dd\u10d8\u10e0\u10e9\u10d4\u10d5\u10d0 \u10d7\u10d0\u10d5\u10d8\u10e1\u10d8 \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10d0\u10e0\u10e5\u10d8\u10e2\u10d4\u10e5\u10e2\u10e3\u10e0\u10d8\u10d7", "answerD": "\u10e5\u10d0\u10da\u10d0\u10e5\u10e1 \u10e1\u10d8\u10e6\u10dc\u10d0\u10e6\u10d8 \u10db\u10d4\u10e4\u10d4 \u10d4\u10e0\u10d4\u10d9\u10da\u10d4 II-\u10d8\u10e1 \u10db\u10d4\u10e4\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10e3\u10ec\u10dd\u10d3\u10d4\u10e1", "correctanswer": "D"}, {"questionid": 193, "questiontext": "- \u10d2) III.3.14. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10d2\u10d0\u10db\u10d6\u10d8\u10e0\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e1\u10d0\u10e7\u10d5\u10d0\u10e0\u10da\u10d4\u10e1\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10d0. \u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10d8 \u10db\u10d0\u10e1 1918 \u10ec\u10d4\u10da\u10e1 \u2013 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d3\u10d0\u10db\u10dd\u10e3\u10d9\u10d8\u10d3\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2 \u2013 \u10d4\u10ec\u10dd\u10d3\u10d0, \u10db\u10d0\u10dc\u10d0\u10db\u10d3\u10d4 \u10d9\u10d8 \u10d2\u10dd\u10da\u10dd\u10d5\u10d8\u10dc\u10d8\u10e1 \u10de\u10e0\u10dd\u10e1\u10de\u10d4\u10e5\u10e2\u10d8 \u10d4\u10e0\u10e5\u10d5\u10d0. \u10d8\u10d2\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10d4\u10d3\u10dc\u10d8\u10d3\u10d0\u10dc \u10d8\u10ec\u10e7\u10d4\u10d1\u10d0 \u10d3\u10d0 \u10d9\u10dd\u10e1\u10e2\u10d0\u10d5\u10d0\u10e1 \u10e5\u10e3\u10e9\u10d0\u10e1 \u10db\u10d4\u10e2\u10e0\u10dd \u201e\u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d7\u10d0\u10dc\u201c \u10e3\u10d4\u10e0\u10d7\u10d3\u10d4\u10d1\u10d0. \u10d0\u10e5 \u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd, \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10e3\u10da\u10d8 \u10d3\u10d0 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10d3\u10d0\u10ec\u10d4\u10e1\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d8\u10db\u10e0\u10d0\u10d5\u10da\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd \u10d4\u10e1 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10ea\u10d4\u10dc\u10e2\u10e0\u10d0\u10d3 \u10db\u10d8\u10d8\u10e9\u10dc\u10d4\u10d5\u10d0. \u10db\u10d8\u10e1\u10d8 \u10d8\u10dc\u10e2\u10d4\u10dc\u10e1\u10d8\u10e3\u10e0\u10d8 \u10d2\u10d0\u10dc\u10d0\u10e8\u10d4\u10dc\u10d8\u10d0\u10dc\u10d4\u10d1\u10d0 1860 \u10ec\u10da\u10d8\u10d3\u10d0\u10dc \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd. \u10d7\u10d0\u10dc\u10d3\u10d0\u10d7\u10d0\u10dc \u10de\u10e0\u10dd\u10e1\u10de\u10d4\u10e5\u10e2\u10e1 \u10e8\u10d4\u10d4\u10db\u10d0\u10e2\u10d0 \u10d0\u10e0\u10d0\u10d4\u10e0\u10d7\u10d8 \u10e8\u10d4\u10dc\u10dd\u10d1\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d7\u10d0 \u10dc\u10d0\u10ec\u10d8\u10da\u10d8 \u10d3\u10e6\u10d4\u10db\u10d3\u10d4 \u10d0\u10db\u10e8\u10d5\u10d4\u10dc\u10d4\u10d1\u10e1 \u10e5\u10d0\u10da\u10d0\u10e5\u10e1. \u10d4\u10e1 \u10dc\u10d0\u10d2\u10d4\u10d1\u10dd\u10d1\u10d4\u10d1\u10d8\u10d0: \u10db\u10dd\u10e1\u10ec\u10d0\u10d5\u10da\u10d4\u10d0\u10ee\u10d0\u10da\u10d2\u10d0\u10d6\u10e0\u10d3\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e1\u10d0\u10ee\u10da\u10d4, \u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10d7\u10d4\u10d0\u10e2\u10e0\u10d8, \u10e1\u10d0\u10db\u10ee\u10d0\u10e2\u10d5\u10e0\u10dd \u10d2\u10d0\u10da\u10d4\u10e0\u10d4\u10d0, \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd \u201e\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10db\u10d4\u10e0\u10d8\u10dd\u10e2\u10d8\u201c \u10d3\u10d0 \u10e1\u10ee\u10d5", "answerA": "\u10de\u10e0\u10dd\u10e1\u10de\u10d4\u10e5\u10e2\u10e1 \u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10d8 \u10d3\u10d0\u10db\u10dd\u10e3\u10d9\u10d8\u10d3\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2 \u10db\u10d8\u10d4\u10dc\u10d8\u10ed\u10d0", "answerB": "\u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10de\u10e0\u10dd\u10e1\u10de\u10d4\u10e5\u10e2\u10d6\u10d4 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10e3\u10da\u10d8 \u10d3\u10d0\u10ec\u10d4\u10e1\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10d0 \u10d2\u10d0\u10dc\u10da\u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8", "answerC": "\u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10de\u10e0\u10dd\u10e1\u10de\u10d4\u10e5\u10e2\u10d6\u10d4 \u10e7\u10d5\u10d4\u10da\u10d0 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10e8\u10d4\u10dc\u10dd\u10d1\u10d0 1860-\u10d8\u10d0\u10dc \u10ec\u10da\u10d4\u10d1\u10e8\u10d8\u10d0 \u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8", "answerD": "\u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10de\u10e0\u10dd\u10e1\u10de\u10d4\u10e5\u10e2\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10d8\u10dc\u10e2\u10d4\u10dc\u10e1\u10d8\u10e3\u10e0\u10d8 \u10d2\u10d0\u10dc\u10d0\u10e8\u10d4\u10dc\u10d8\u10d0\u10dc\u10d4\u10d1\u10d0 1918 \u10ec\u10da\u10d8\u10d3\u10d0\u10dc \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd", "correctanswer": "C"}, {"questionid": 194, "questiontext": "- \u10d0) III.3.15. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10db\u10dd\u10ea\u10d4\u10db\u10e3\u10da\u10d8 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8\u10e1 \u10db\u10d7\u10d0\u10d5\u10d0\u10e0 \u10db\u10dd\u10d4\u10d3\u10d0\u10dc\u10e1 (\u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10d4\u10d3\u10d0\u10dc\u10e1) \u10d3\u10d0\u10d0\u10ee\u10da\u10dd\u10d4\u10d1\u10d8\u10d7 \u10dd\u10e0\u10d0\u10e1\u10d8 \u10ec\u10da\u10d8\u10e1 \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10d0 \u10d0\u10e5\u10d5\u10e1. \u10ef\u10d4\u10e0 \u10d9\u10d8\u10d3\u10d4\u10d5 XVIII \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10d1\u10dd\u10da\u10dd\u10e1 \u10d8\u10d2\u10d8 \u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d4\u10e3\u10d1\u10d0\u10dc\u10e1 \u10ec\u10d0\u10e0\u10db\u10dd\u10d0\u10d3\u10d2\u10d4\u10dc\u10d3\u10d0 \u10d3\u10d0 \u10d2\u10d0\u10e0\u10d4\u10d7\u10e3\u10d1\u10d0\u10dc\u10d8 \u10d4\u10e0\u10e5\u10d5\u10d0. \u10d5\u10d0\u10ee\u10e3\u10e8\u10e2\u10d8 \u10d1\u10d0\u10e2\u10dd\u10dc\u10d8\u10e8\u10d5\u10d8\u10da\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10e8\u10d4\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10d2\u10d4\u10d2\u10db\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d0\u10db \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1 \u10d1\u10d0\u10e6\u10d4\u10d1\u10d8 \u10e7\u10dd\u10e4\u10d8\u10da\u10d0 \u10d2\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10e3\u10da\u10d8 \u10d3\u10d0 \u10d4\u10e0\u10d7\u10d0\u10d3\u10d4\u10e0\u10d7\u10d8 \u10e8\u10d4\u10dc\u10dd\u10d1\u10d0 \u10db\u10d3\u10d2\u10d0\u10e0\u10d0. \u10d2\u10d0\u10e0\u10d4\u10d7\u10e3\u10d1\u10dc\u10d8\u10e1 \u10d8\u10dc\u10e2\u10d4\u10dc\u10e1\u10d8\u10e3\u10e0\u10d8 \u10d2\u10d0\u10dc\u10d0\u10e8\u10d4\u10dc\u10d8\u10d0\u10dc\u10d4\u10d1\u10d0 XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10db\u10d4\u10dd\u10d7\u10ee\u10d4\u10d3\u10e8\u10d8 \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd. \u10d0\u10db \u10de\u10d4\u10e0\u10d8\u10dd\u10d3\u10d8\u10e1 \u10d4\u10e0\u10d7-\u10d4\u10e0\u10d7\u10d8 \u10dc\u10d0\u10d2\u10d4\u10d1\u10dd\u10d1\u10d0\u10d0 \u10ee\u10d4\u10da\u10dd\u10d5\u10dc\u10d4\u10d1\u10d8\u10e1 \u10db\u10e3\u10d6\u10d4\u10e3\u10db\u10d8. 1847-1851 \u10ec\u10da\u10d4\u10d1\u10e8\u10d8 \u10d0\u10e0\u10e5\u10d8\u10e2\u10d4\u10e5\u10e2\u10dd\u10e0 \u10ef\u10dd\u10d5\u10d0\u10dc\u10d8 \u10e1\u10d9\u10e3\u10d3\u10d8\u10d4\u10e0\u10d8\u10e1 \u10de\u10e0\u10dd\u10d4\u10e5\u10e2\u10d8\u10d7 \u10d0\u10d8\u10d2\u10dd \u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e5\u10d0\u10e0\u10d5\u10d0\u10e1\u10da\u10d8\u10e1 \u10db\u10dd\u10dc\u10e3\u10db\u10d4\u10dc\u10e2\u10e3\u10e0\u10d8 \u10e8\u10d4\u10dc\u10dd\u10d1\u10d4\u10d1\u10d8, \u10e0\u10dd\u10db\u10da\u10d4\u10d1\u10d8\u10ea 1874 \u10ec\u10d4\u10da\u10e1 \u10d2\u10d0\u10e9\u10d4\u10dc\u10d8\u10da\u10d8 \u10ee\u10d0\u10dc\u10eb\u10e0\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd \u10d3\u10d0\u10d8\u10ec\u10d5\u10d0. XX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 30-\u10d8\u10d0\u10dc \u10ec\u10da\u10d4\u10d1\u10e8\u10d8 \u10d1\u10d4\u10d5\u10e0\u10d8 \u10eb\u10d5\u10d4\u10da\u10d8 \u10e8\u10d4\u10dc\u10dd\u10d1\u10d0 \u10db\u10dd\u10d4\u10d3\u10dc\u10d8\u10e1 \u10e0\u10d4\u10d9\u10dd\u10dc\u10e1\u10e2\u10e0\u10e3\u10e5\u10ea\u10d8\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd \u10d3\u10d0\u10d0\u10dc\u10d2\u10e0\u10d8\u10d4\u10e1", "answerA": "\u10d3\u10e6\u10d4\u10d5\u10d0\u10dc\u10d3\u10d4\u10da\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10d4\u10d3\u10dc\u10d8\u10e1 \u10d2\u10d0\u10dc\u10d0\u10e8\u10d4\u10dc\u10d8\u10d0\u10dc\u10d4\u10d1\u10d0 XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d4\u10e8\u10d8 \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd", "answerB": "\u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10d4\u10d3\u10d0\u10dc\u10d6\u10d4 \u10e8\u10d4\u10db\u10dd\u10e0\u10e9\u10d4\u10dc\u10d8\u10da \u10e8\u10d4\u10dc\u10dd\u10d1\u10d0\u10d7\u10d0 \u10e3\u10db\u10d4\u10e2\u10d4\u10e1\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10e5\u10d8\u10e2\u10d4\u10e5\u10e2\u10dd\u10e0\u10d8 \u10e1\u10d9\u10e3\u10d3\u10d8\u10d4\u10e0\u10d8\u10d0", "answerC": "\u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10d4\u10d3\u10d0\u10dc\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d0\u10d3 XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d4\u10e8\u10d8 \u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8 \u10e8\u10d4\u10dc\u10dd\u10d1\u10d4\u10d1\u10d8 \u10d0\u10db\u10e8\u10d5\u10d4\u10dc\u10d4\u10d1\u10e1", "answerD": "\u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10d4\u10d3\u10dc\u10d8\u10e1 \u10d2\u10d0\u10dc\u10d0\u10e8\u10d u10e3\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4, \u10d0\u10e8\u10d4\u10dc\u10d3\u10d0 \u10d0\u10d1\u10d0\u10dc\u10dd\u10d4\u10d1\u10d8, \u10d2\u10d0\u10dc\u10d5\u10d8\u10d7\u10d0\u10e0\u10d3\u10d0 \u10ee\u10d4\u10da\u10dd\u10e1\u10dc\u10dd\u10d1\u10d0... \u10ea\u10dc\u10dd\u10d1\u10d8\u10da\u10d8\u10d0, \u10e0\u10dd\u10db \u10ef\u10d4\u10e0 \u10d9\u10d8\u10d3\u10d4\u10d5 XIII \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d4\u10e8\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 65 \u10d2\u10dd\u10d2\u10d8\u10e0\u10d3\u10d8\u10e1 \u10d0\u10d1\u10d0\u10dc\u10dd \u10e7\u10dd\u10e4\u10d8\u10da\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d7\u10d0 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d0 \u10d3\u10e6\u10d4\u10db\u10d3\u10d4\u10d0 \u10e8\u10d4\u10db\u10dd\u10e0\u10e9\u10d4\u10dc\u10d8\u10da\u10d8. \u10d2\u10dd\u10d2\u10d8\u10e0\u10d3\u10d8\u10e1 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8 \u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10d7\u10d0 \u10e7\u10e3\u10e0\u10d0\u10d3\u10e6\u10d4\u10d1\u10d8\u10e1 \u10ea\u10d4\u10dc\u10e2\u10e0\u10e8\u10d8 XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 60-\u10d8\u10d0\u10dc \u10ec\u10da\u10d4\u10d1\u10e8\u10d8 \u10db\u10dd\u10d4\u10e5\u10ea\u10d0. \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10e5\u10d8\u10db\u10d8\u10e3\u10e0\u10d8 \u10d0\u10dc\u10d0\u10da\u10d8\u10d6\u10d8 \u10e4\u10d4\u10e0\u10d3\u10d8\u10dc\u10d0\u10dc\u10d3 \u10dd\u10e2\u10d4\u10dc\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10e1 \u10e3\u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d3\u10d4\u10d1\u10d0. \u10e8\u10d4\u10db\u10d3\u10d2\u10dd\u10db\u10d8 \u10d9\u10d5\u10da\u10d4\u10d5\u10d4\u10d1\u10d8\u10d7 \u10ec\u10e7\u10da\u10d8\u10e1 \u10e3\u10dc\u10d8\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10d0\u10db\u10d9\u10e3\u10e0\u10dc\u10d0\u10da\u10dd \u10d7\u10d5\u10d8\u10e1\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10d0\u10d3\u10d2\u10d8\u10dc\u10d3\u10d0. \u10d0\u10db\u10d0\u10dc \u10d9\u10d8\u10d3\u10d4\u10d5 \u10e3\u10e4\u10e0\u10dd \u10d2\u10d0\u10d6\u10d0\u10e0\u10d3\u10d0 \u10db\u10d8\u10e1\u10d8 \u10de\u10dd\u10de\u10e3\u10da\u10d0\u10e0\u10dd\u10d1\u10d0", "answerA": "\u10d2\u10dd\u10d2\u10d8\u10e0\u10d3\u10d8\u10e1 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8\u10e1 \u10d9\u10d5\u10da\u10d4\u10d5\u10d0 \u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10d4\u10d1\u10db\u10d0 XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d4\u10e8\u10d8 \u10d3\u10d0\u10d8\u10ec\u10e7\u10d4\u10e1", "answerB": "\u10d2\u10dd\u10d2\u10d8\u10e0\u10d3\u10d8\u10e1 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10db\u10d9\u10e3\u10e0\u10dc\u10d0\u10da\u10dd \u10d7\u10d5\u10d8\u10e1\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10e6\u10d4\u10db\u10d3\u10d4 \u10d3\u10d0\u10e3\u10d3\u10d2\u10d4\u10dc\u10d4\u10da\u10d8\u10d0", "answerC": "\u10d2\u10dd\u10d2\u10d8\u10e0\u10d3\u10d8\u10e1 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1 \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10e3\u10da\u10d8 \u10ea\u10dc\u10dd\u10d1\u10d4\u10d1\u10d8 \u10dc\u10d0\u10d9\u10da\u10d4\u10d1\u10d0\u10d3\u10d0\u10d0 \u10e8\u10d4\u10db\u10dd\u10dc\u10d0\u10ee\u10e3\u10da\u10d8", "answerD": "\u10d2\u10dd\u10d2\u10d8\u10e0\u10d3\u10d8\u10e1 \u10ec\u10e7\u10da\u10d4\u10d1\u10d8\u10e1 \u10eb\u10d5\u10d4\u10da\u10d8 \u10d0\u10d1\u10d0\u10dc\u10dd\u10d4\u10d1\u10d8 \u10d7\u10d8\u10d7\u10e5\u10db\u10d8\u10e1 \u10d2\u10d0\u10dc\u10d0\u10d3\u10d2\u10e3\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0", "correctanswer": "A"}, {"questionid": 196, "questiontext": "- \u10d0) III.3.17. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10db\u10dd\u10ea\u10d4\u10db\u10e3\u10da\u10d8 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10d8 \u10d0\u10da\u10d4\u10e5\u10e1\u10d0\u10dc\u10d3\u10e0\u10d4 \u10d1\u10d4\u10da\u10db\u10d0 1876 \u10ec\u10d4\u10da\u10e1 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0 \u10d0\u10db\u10d4\u10e0\u10d8\u10d9\u10d0\u10e8\u10d8. \u10db\u10d0\u10da\u10d4 \u10d8\u10d2\u10d8 \u10db\u10d7\u10d4\u10da \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd\u10e8\u10d8 \u10d2\u10d0\u10d5\u10e0\u10ea\u10d4\u10da\u10d3\u10d0. \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 \u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10d8 1882 \u10ec\u10d4\u10da\u10e1 \u10d0\u10db\u10e3\u10e8\u10d0\u10d5\u10d3\u10d0. \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d8 \u10d3\u10d0\u10db\u10e7\u10d0\u10e0\u10d3\u10d0 \u201e\u10d9\u10d0\u10d5\u10d9\u10d0\u10d6\u10d8\u10e1\u201c \u10e0\u10d4\u10d3\u10d0\u10e5\u10ea\u10d8\u10d0\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10e2\u10d0\u10db\u10d1\u10d0\u10e1 \u10e8\u10dd\u10e0\u10d8\u10e1, \u10d7\u10d0\u10d5\u10d0\u10d3\u10d8 \u10ef\u10dd\u10e0\u10ef\u10d0\u10eb\u10d4 \u10d9\u10d8 \u10d8\u10e7\u10dd \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10db\u10d4\u10ec\u10d0\u10e0\u10db\u10d4, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10dd \u10ee\u10d0\u10d6\u10d8 \u10d2\u10d0\u10d8\u10e7\u10d5\u10d0\u10dc\u10d0 \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10d9\u10d0\u10dc\u10e2\u10dd\u10e0\u10d8\u10d3\u10d0\u10dc \u10e6\u10d5\u10d8\u10dc\u10d8\u10e1 \u10e1\u10d0\u10ec\u10e7\u10dd\u10d1\u10d0\u10db\u10d3\u10d4. 1893 \u10ec\u10d4\u10da\u10e1 \u10e1\u10d0\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10dd \u10e5\u10e1\u10d4\u10da\u10d8\u10d7 \u10d0\u10e0\u10d0\u10d4\u10e0\u10d7\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d4\u10da\u10d8 \u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10d1\u10d3\u10d0. \u10e0\u10dd\u10d2\u10dd\u10e0\u10ea \u10de\u10e0\u10d4\u10e1\u10d0 \u10ec\u10d4\u10e0\u10d3\u10d0, \u10d0\u10d1\u10dd\u10dc\u10d4\u10dc\u10e2\u10d7\u10d0 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d8\u10d7 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10e0\u10e3\u10e1\u10d4\u10d7\u10d8\u10e1 \u10d8\u10db\u10de\u10d4\u10e0\u10d8\u10d0\u10e8\u10d8 \u10db\u10d4\u10ee\u10e3\u10d7\u10d4 \u10d0\u10d3\u10d2\u10d8\u10da\u10d6\u10d4 \u10d8\u10e7\u10dd. 1935 \u10ec\u10d4\u10da\u10e1 \u10d0\u10db\u10e3\u10e8\u10d0\u10d5\u10d3\u10d0 \u10d0\u10d5\u10e2\u10dd\u10db\u10d0\u10e2\u10e3\u10e0\u10d8 \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10e4\u10d8\u10e0\u10db\u10d0 \u201e\u10d4\u10e0\u10d8\u10e5\u10e1\u10dd\u10dc\u10db\u10d0\u201c \u10d3\u10d0\u10d0\u10db\u10dd\u10dc\u10e2\u10d0\u10df\u10d0. \u10ec\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10db\u10d0\u10d5\u10da\u10dd\u10d1\u10d0\u10e8\u10d8 \u10e1\u10d0\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10dd \u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d4\u10d1\u10d8 \u10d7\u10d0\u10dc\u10d3\u10d0\u10d7\u10d0\u10dc \u10d3\u10d0\u10d8\u10ee\u10d5\u10d4\u10ec\u10d0", "answerA": "\u10d0\u10d1\u10dd\u10dc\u10d4\u10dc\u10e2\u10d7\u10d0 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d8\u10d7 \u10e0\u10e3\u10e1\u10d4\u10d7\u10d8\u10e1 \u10d8\u10db\u10de\u10d4\u10e0\u10d8\u10d0\u10e8\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10d0\u10d3\u10d2\u10d8\u10da\u10d6\u10d4 \u10d8\u10e7\u10dd", "answerB": "\u10d0\u10d5\u10e2\u10dd\u10db\u10d0\u10e2\u10e3\u10e0\u10d8 \u10e1\u10d0\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10dd \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 \u201e\u10d4\u10e0\u10d8\u10e5\u10e1\u10dd\u10dc\u10db\u10d0\u201c \u10d3\u10d0\u10d0\u10db\u10dd\u10dc\u10e2\u10d0\u10df\u10d0", "answerC": "\u10e1\u10d0\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10dd \u10d0\u10d5\u10e2\u10dd\u10db\u10d0\u10e2\u10e3\u10e0\u10d8 \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8 \u10d7\u10d0\u10d5\u10d0\u10d3\u10db\u10d0 \u10ef\u10dd\u10e0\u10ef\u10d0\u10eb\u10d4\u10db \u10d0\u10d0\u10db\u10e3\u10e8\u10d0\u10d5\u10d0", "answerD": "\u10e1\u10d0\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10d u10e1\u10e1? 1903 \u10ec\u10da\u10d8\u10e1 17 \u10d3\u10d4\u10d9\u10d4\u10db\u10d1\u10d4\u10e0\u10e1 \u10ea\u10d0\u10d6\u10d4 \u10d2\u10d0\u10db\u10dd\u10e9\u10dc\u10d3\u10d0 \u10d0\u10db\u10d4\u10e0\u10d8\u10d9\u10d4\u10da\u10d8 \u10eb\u10db\u10d4\u10d1\u10d8\u10e1, \u10dd\u10e0\u10d5\u10d8\u10da \u10d3\u10d0 \u10e3\u10d8\u10da\u10d1\u10e3\u10e0 \u10e0\u10d0\u10d8\u10e2\u10d4\u10d1\u10d8\u10e1, \u10db\u10d8\u10d4\u10e0 \u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10eb\u10e0\u10d0\u10d5\u10d8\u10d0\u10dc\u10d8 \u10e1\u10d0\u10e4\u10e0\u10d4\u10dc\u10d8 \u10d0\u10de\u10d0\u10e0\u10d0\u10e2\u10d8. \u10db\u10d0\u10dc \u10f0\u10d0\u10d4\u10e0\u10e8\u10d8 12 \u10ec\u10d0\u10db\u10e1 \u10d3\u10d0\u10f0\u10e7\u10dd \u10d3\u10d0 \u10db\u10e8\u10d5\u10d8\u10d3\u10dd\u10d1\u10d8\u10d0\u10dc\u10d0\u10d3 \u10d3\u10d0\u10d4\u10e8\u10d5\u10d0 \u10db\u10d8\u10ec\u10d0\u10d6\u10d4. \u10eb\u10db\u10d4\u10d1\u10db\u10d0 \u10db\u10d0\u10db\u10d0\u10e1 \u10d3\u10d4\u10de\u10d4\u10e8\u10d8\u10d7 \u10d0\u10ea\u10dc\u10dd\u10d1\u10d4\u10e1 \u10dc\u10d0\u10db\u10d3\u10d5\u10d8\u10da\u10d8 \u10d7\u10d5\u10d8\u10d7\u10db\u10e4\u10e0\u10d8\u10dc\u10d0\u10d5\u10d8\u10e1 \u10d3\u10d0\u10d1\u10d0\u10d3\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1. \u10d0\u10db \u10d3\u10e6\u10d8\u10d3\u10d0\u10dc \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd \u10d0\u10d5\u10d8\u10d0\u10ea\u10d8\u10d8\u10e1 \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10d0. \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d0\u10dc\u10d0\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10e1\u10d0\u10e4\u10e0\u10d4\u10dc\u10d8 \u10d0\u10de\u10d0\u10e0\u10d0\u10e2\u10d8 \u10e8\u10d0\u10da\u10d5\u10d0 \u10d4\u10e0\u10d8\u10e1\u10d7\u10d0\u10d5\u10db\u10d0 \u10d0\u10d0\u10d2\u10dd 1835 \u10ec\u10d4\u10da\u10e1, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10d2\u10d0\u10e4\u10e0\u10d4\u10dc\u10d0 \u10d5\u10d4\u10e0 \u10db\u10dd\u10d0\u10ee\u10d4\u10e0\u10ee\u10d0. 1911 \u10ec\u10d4\u10da\u10e1 ,,\u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d2\u10d0\u10d6\u10d4\u10d7\u10e8\u10d8\u201c \u10d2\u10d0\u10db\u10dd\u10e5\u10d5\u10d4\u10e7\u10dc\u10d3\u10d0 \u10d0\u10dc\u10e2\u10dd\u10dc \u10d9\u10da\u10d3\u10d8\u10d0\u10e8\u10d5\u10d8\u10da\u10d8\u10e1 \u10ea\u10dc\u10dd\u10d1\u10d0 \u10e1\u10d0\u10e4\u10e0\u10d4\u10dc\u10d8 \u10d0\u10de\u10d0\u10e0\u10d0\u10e2\u10d8\u10e1 \u10db\u10dd\u10d3\u10d4\u10da\u10d8\u10e1 \u10e8\u10d4\u10e5\u10db\u10dc\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1. \u10d8\u10d2\u10d8 \u10db\u10dd\u10e3\u10ec\u10dd\u10d3\u10d4\u10d1\u10d3\u10d0 \u10db\u10d9\u10d8\u10d7\u10ee\u10d5\u10d4\u10da\u10e1, \u10d4\u10e0\u10d7\u10dd\u10d1\u10da\u10d8\u10d5\u10d8 \u10eb\u10d0\u10da\u10d4\u10d1\u10d8\u10d7 \u10d0\u10d4\u10d2\u10dd\u10d7 \u10d7\u10d5\u10d8\u10d7\u10db\u10e4\u10e0\u10d8\u10dc\u10d0\u10d5\u10d8, \u10d7\u10e3\u10db\u10ea\u10d0 \u10db\u10d0\u10e8\u10d8\u10dc \u10e4\u10d0\u10e0\u10d7\u10dd \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0 \u10e4\u10e0\u10d4\u10dc\u10dd\u10e1\u10dc\u10dd\u10d1\u10d8\u10d7 \u10dc\u10d0\u10d9\u10da\u10d4\u10d1\u10d0\u10d3 \u10d8\u10e7\u10dd \u10d3\u10d0\u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10d4\u10d1\u10e3\u10da\u10d8", "answerA": "\u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10eb\u10e0\u10d0\u10d5\u10d8\u10d0\u10dc\u10d8 \u10d7\u10d5\u10d8\u10d7\u10db\u10e4\u10e0\u10d8\u10dc\u10d0\u10d5\u10d8 \u10eb\u10db\u10d4\u10d1\u10db\u10d0 \u10e0\u10d0\u10d8\u10e2\u10d4\u10d1\u10db\u10d0 \u10d0\u10d0\u10d2\u10d4\u10e1 \u10d3\u10d0 \u10d2\u10d0\u10db\u10dd\u10e1\u10ea\u10d0\u10d3\u10d4\u10e1", "answerB": "\u10e1\u10d0\u10e4\u10e0\u10d4\u10dc\u10d8 \u10d0\u10de\u10d0\u10e0\u10d0\u10e2\u10d8 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d8\u10d7 \u10d0\u10dc\u10e2\u10dd\u10dc \u10d9\u10da\u10d3\u10d8\u10d0\u10e8\u10d5\u10d8\u10da\u10db\u10d0 \u10d0\u10d0\u10d2\u10dd", "answerC": "\u10
