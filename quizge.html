answerA": "\u10e1\u10d0\u10d1\u10ed\u10dd\u10d7\u10d0 \u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d8\u10e1", "answerB": "\u10e1\u10d4\u10e4\u10d8\u10d0\u10dc\u10d7\u10d0 \u10d8\u10e0\u10d0\u10dc\u10d8\u10e1", "answerC": "\u10dd\u10e1\u10db\u10d0\u10da\u10d4\u10d7\u10d8\u10e1 \u10e1\u10d0\u10e1\u10e3\u10da\u10d7\u10dc\u10dd\u10e1", "answerD": "\u10e0\u10e3\u10e1\u10d4\u10d7\u10d8\u10e1 \u10d8\u10db\u10de\u10d4\u10e0\u10d8\u10d8\u10e1", "correctanswer": "D"}, {"questionid": 155, "questiontext": "\u10d5\u10d8\u10dc \u10d8\u10e7\u10d5\u10dc\u10d4\u10dc, \u10e1\u10ee\u10d5\u10d4\u10d1\u10d7\u10d0\u10dc \u10d4\u10e0\u10d7\u10d0\u10d3, 1832 \u10ec\u10da\u10d8\u10e1 \u10e8\u10d4\u10d7\u10e5\u10db\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10d4\u10d1\u10d8, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10db\u10d8\u10d6\u10d0\u10dc\u10d8\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d3\u10d0\u10db\u10dd\u10e3\u10d9\u10d8\u10d3\u10d4\u10d1\u10d4\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10d0\u10e6\u10d3\u10d2\u10d4\u10dc\u10d0 \u10d8\u10e7\u10dd?", "answerA": "\u10e1\u10dd\u10da\u10dd\u10db\u10dd\u10dc \u10d3\u10dd\u10d3\u10d0\u10e8\u10d5\u10d8\u10da\u10d8, \u10d0\u10da\u10d4\u10e5\u10e1\u10d0\u10dc\u10d3\u10e0\u10d4 \u10ed\u10d0\u10d5\u10ed\u10d0\u10d5\u10d0\u10eb\u10d4, \u10d2\u10e0\u10d8\u10d2\u10dd\u10da \u10dd\u10e0\u10d1\u10d4\u10da\u10d8\u10d0\u10dc\u10d8", "answerB": "\u10dc\u10dd\u10d4 \u10df\u10dd\u10e0\u10d3\u10d0\u10dc\u10d8\u10d0, \u10d4\u10d5\u10d2\u10d4\u10dc\u10d8 \u10d2\u10d4\u10d2\u10ed\u10d9\u10dd\u10e0\u10d8, \u10d0\u10d9\u10d0\u10d9\u10d8 \u10e9\u10ee\u10d4\u10dc\u10d9\u10d4\u10da\u10d8", "answerC": "\u10d0\u10d9\u10d0\u10d9\u10d8 \u10ec\u10d4\u10e0\u10d4\u10d7\u10d4\u10da\u10d8, \u10dc\u10d8\u10d9\u10dd \u10dc\u10d8\u10d9\u10dd\u10da\u10d0\u10eb\u10d4, \u10e1\u10d4\u10e0\u10d2\u10d4\u10d8 \u10db\u10d4\u10e1\u10ee\u10d8", "answerD": "\u10d1\u10d8\u10eb\u10d8\u10dc\u10d0 \u10e9\u10dd\u10da\u10dd\u10e7\u10d0\u10e8\u10d5\u10d8\u10da\u10d8, \u10d4\u10da\u10d8\u10d6\u10d1\u10d0\u10e0 \u10d4\u10e0\u10d8\u10e1\u10d7\u10d0\u10d5\u10d8, \u10d6\u10d4\u10d6\u10d5\u10d0 \u10d2\u10d0\u10e4\u10e0\u10d8\u10dc\u10d3\u10d0\u10e3\u10da\u10d8", "correctanswer": "A"}, {"questionid": 156, "questiontext": "\u10d5\u10d8\u10dc \u10d8\u10e7\u10dd XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10dc\u10d0\u10ee\u10d4\u10d5\u10d0\u10e0\u10e8\u10d8 \u10db\u10dd\u10e6\u10d5\u10d0\u10ec\u10d4, \u10ea\u10dc\u10dd\u10d1\u10d8\u10da\u10d8 \u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10d8 \u10e0\u10dd\u10db\u10d0\u10dc\u10e2\u10d8\u10d9\u10dd\u10e1\u10d8 \u10de\u10dd\u10d4\u10e2\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d0\u10ee\u10d0\u10da\u10d2\u10d0\u10d6\u10e0\u10d3\u10d0 \u10d2\u10d0\u10e0\u10d3\u10d0\u10d8\u10ea\u10d5\u10d0\u10da\u10d0 \u10d3\u10d0 \u10db\u10d7\u10d0\u10ec\u10db\u10d8\u10dc\u10d3\u10d0\u10d6\u10d4\u10d0 \u10d3\u10d0\u10d9\u10e0\u10eb\u10d0\u10da\u10e3\u10da\u10d8?", "answerA": "\u10d3\u10d0\u10d5\u10d8\u10d7 \u10d2\u10e3\u10e0\u10d0\u10db\u10d8\u10e8\u10d5\u10d8\u10da\u10d8", "answerB": "\u10d1\u10d4\u10e1\u10d0\u10e0\u10d8\u10dd\u10dc \u10d2\u10d0\u10d1\u10d0\u10e8\u10d5\u10d8\u10da\u10d8", "answerC": "\u10dc\u10d8\u10d9\u10dd\u10da\u10dd\u10d6 \u10d1\u10d0\u10e0\u10d0\u10d7\u10d0\u10e8\u10d5\u10d8\u10da\u10d8", "answerD": "\u10d8\u10dd\u10e1\u10d4\u10d1 \u10d2\u10e0\u10d8\u10e8\u10d0\u10e8\u10d5\u10d8\u10da\u10d8", "correctanswer": "C"}, {"questionid": 157, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d0\u10e0\u10e1\u10d4\u10d1\u10e3\u10da\u10d8 \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10e1\u10d0\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d4\u10d1\u10d8 \u10d2\u10d0\u10d0\u10e3\u10e5\u10db\u10d0 \u10e0\u10e3\u10e1\u10d4\u10d7\u10d8\u10e1 \u10d8\u10db\u10de\u10d4\u10e0\u10d8\u10d0\u10db XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10db\u10d4\u10dd\u10e0\u10d4 \u10dc\u10d0\u10ee\u10d4\u10d5\u10d0\u10e0\u10e8\u10d8?", "answerA": "\u10dd\u10d3\u10d8\u10e8\u10d8\u10e1, \u10e1\u10d5\u10d0\u10dc\u10d4\u10d7\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e4\u10ee\u10d0\u10d6\u10d4\u10d7\u10d8\u10e1", "answerB": "\u10d9\u10d0\u10ee\u10d4\u10d7\u10d8\u10e1, \u10e1\u10d0\u10db\u10ea\u10ee\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e0\u10d0\u10ed\u10d8\u10e1", "answerC": "\u10e5\u10d0\u10e0\u10d7\u10da\u10d8\u10e1, \u10f0\u10d4\u10e0\u10d4\u10d7\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10ef\u10d0\u10d5\u10d0\u10ee\u10d4\u10d7\u10d8\u10e1", "answerD": "\u10d8\u10db\u10d4\u10e0\u10d4\u10d7\u10d8\u10e1, \u10d2\u10e3\u10e0\u10d8\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10ed\u10d0\u10e0\u10d8\u10e1", "correctanswer": "A"}, {"questionid": 158, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10db\u10d4\u10dd\u10e0\u10d4 \u10dc\u10d0\u10ee\u10d4\u10d5\u10d0\u10e0\u10e8\u10d8 \u10d0\u10e1\u10de\u10d0\u10e0\u10d4\u10d6\u10d6\u10d4 \u10d2\u10d0\u10db\u10dd\u10d3\u10d8\u10e1 \u10d7\u10d0\u10dd\u10d1\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10e1\u10d0\u10ea \u10d7\u10d4\u10e0\u10d2\u10d3\u10d0\u10da\u10d4\u10e3\u10da\u10d4\u10d1\u10e1 \u10e3\u10ec\u10dd\u10d3\u10d4\u10d1\u10d4\u10dc. \u10d5\u10d8\u10dc \u10d8\u10e7\u10d5\u10dc\u10d4\u10dc \u10d0\u10db \u10d7\u10d0\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d5\u10d0\u10da\u10e1\u10d0\u10e9\u10d8\u10dc\u10dd \u10ec\u10d0\u10e0\u10db\u10dd\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10d4\u10d1\u10d8?", "answerA": "\u10e4\u10d8\u10da\u10d0\u10d3\u10d4\u10da\u10e4\u10dd\u10e1 \u10d9\u10d8\u10d9\u10dc\u10d0\u10eb\u10d4, \u10d0\u10da\u10d4\u10e5\u10e1\u10d0\u10dc\u10d3\u10e0\u10d4 \u10ed\u10d0\u10d5\u10ed\u10d0\u10d5\u10d0\u10eb\u10d4, \u10d3\u10d8\u10db\u10d8\u10e2\u10e0\u10d8 \u10e7\u10d8\u10e4\u10d8\u10d0\u10dc\u10d8", "answerB": "\u10d8\u10da\u10d8\u10d0 \u10ed\u10d0\u10d5\u10ed\u10d0\u10d5\u10d0\u10eb\u10d4, \u10d0\u10d9\u10d0\u10d9\u10d8 \u10ec\u10d4\u10e0\u10d4\u10d7\u10d4\u10da\u10d8, \u10dc\u10d8\u10d9\u10dd \u10dc\u10d8\u10d9\u10dd\u10da\u10d0\u10eb\u10d4", "answerC": "\u10dc\u10dd\u10d4 \u10e0\u10d0\u10db\u10d8\u10e8\u10d5\u10d8\u10da\u10d8, \u10d4\u10d2\u10dc\u10d0\u10e2\u10d4 \u10dc\u10d8\u10dc\u10dd\u10e8\u10d5\u10d8\u10da\u10d8, \u10d9\u10d0\u10e0\u10da\u10dd \u10e9\u10ee\u10d4\u10d8\u10eb\u10d4", "answerD": "\u10d9\u10dd\u10dc\u10e1\u10e2\u10d0\u10dc\u10e2\u10d8\u10dc\u10d4 \u10d2\u10d0\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10d3\u10d8\u10d0, \u10e8\u10d0\u10da\u10d5\u10d0 \u10d3\u10d0\u10d3\u10d8\u10d0\u10dc\u10d8, \u10d4\u10e5\u10d5\u10d7\u10d8\u10db\u10d4 \u10d7\u10d0\u10e7\u10d0\u10d8\u10e8\u10d5\u10d8\u10da\u10d8", "correctanswer": "B"}, {"questionid": 159, "questiontext": "XIX \u10e1\u10d0\u10e3\u10d9\u10e3\u10dc\u10d8\u10e1 \u10db\u10d4\u10dd\u10e0\u10d4 \u10dc\u10d0\u10ee\u10d4\u10d5\u10d0\u10e0\u10e8\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10e1\u10d0\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd \u10ec\u10d8\u10d0\u10e6\u10d8\u10e1\u10d4\u10e3\u10da\u10d8 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d3\u10e6\u10d4\u10db\u10d3\u10d4 \u10d2\u10e0\u10eb\u10d4\u10da\u10d3\u10d4\u10d1\u10d0. \u10d3\u10d0\u10d0\u10e1\u10d0\u10ee\u10d4\u10da\u10d4\u10d7 \u10d4\u10e1 \u10ec\u10d8\u10d0\u10e6\u10d8\u10e1\u10d4\u10e3\u10da\u10d8?", "answerA": "\u10d0\u10db\u10d1\u10e0\u10dd\u10da\u10d0\u10e3\u10e0\u10d8\u10e1 \u10d9\u10dd\u10e5\u10e1\u10d8", "answerB": "\u10d0\u10ee\u10d0\u10da\u10ea\u10d8\u10ee\u10d8\u10e1 \u10e1\u10de\u10d8\u10da\u10d4\u10dc\u10eb\u10d8", "answerC": "\u10ed\u10d8\u10d0\u10d7\u10e3\u10e0\u10d8\u10e1 \u10db\u10d0\u10e0\u10d2\u10d0\u10dc\u10d4\u10ea\u10d8", "answerD": "\u10db\u10d8\u10e0\u10 text": "\u10e0\u10d0\u10db \u10d2\u10d0\u10db\u10dd\u10d8\u10ec\u10d5\u10d8\u10d0 \u10db\u10d0\u10e1\u10dd\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e1\u10d0\u10de\u10e0\u10dd\u10e2\u10d4\u10e1\u10e2\u10dd \u10d0\u10e5\u10ea\u10d8\u10d0 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 1978 \u10ec\u10da\u10d8\u10e1 14 \u10d0\u10de\u10e0\u10d8\u10da\u10e1?", "answerA": "\u10e1\u10d0\u10d1\u10ed\u10dd\u10d7\u10d0 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10d9\u10da\u10d4\u10e1\u10d8\u10d8\u10e1 \u10d0\u10d5\u10e2\u10dd\u10d9\u10d4\u10e4\u10d0\u10da\u10d8\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d8\u10e1 \u10db\u10ea\u10d3\u10d4\u10da\u10dd\u10d1\u10d0\u10db", "answerB": "\u10d9\u10dd\u10db\u10e3\u10dc\u10d8\u10e1\u10e2\u10e3\u10e0\u10d8 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8 \u10db\u10e0\u10d0\u10d5\u10d0\u10da\u10de\u10d0\u10e0\u10e2\u10d8\u10e3\u10da\u10d8 \u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d3\u10d4\u10d2\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e3\u10e5\u10db\u10d4\u10d1\u10d0\u10db", "answerC": "\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10de\u10e0\u10dd\u10d4\u10e5\u10e2\u10d8\u10d7 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10d4\u10dc\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d8\u10e1 \u10e1\u10e2\u10d0\u10e2\u10e3\u10e1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0\u10db", "answerD": "\u10d3\u10d0\u10d5\u10d8\u10d7 \u10d2\u10d0\u10e0\u10d4\u10ef\u10d8\u10e1 \u10e1\u10d0\u10db\u10dd\u10dc\u10d0\u10e1\u10e2\u10e0\u10dd \u10d9\u10dd\u10db\u10de\u10da\u10d4\u10e5\u10e1\u10d8\u10e1 \u10db\u10d0\u10ee\u10da\u10dd\u10d1\u10da\u10d0\u10d3 \u10e1\u10d0\u10d1\u10ed\u10dd\u10d7\u10d0 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10e1\u10d0\u10db\u10ee\u10d4\u10d3\u10e0\u10dd \u10de\u10dd\u10da\u10d8\u10d2\u10dd\u10dc\u10d8\u10e1 \u10d2\u10d0\u10ee\u10e1\u10dc\u10d0\u10db", "correctanswer": "C"}, {"questionid": 187, "questiontext": "\u10e0\u10d0 \u10db\u10dd\u10ee\u10d3\u10d0 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 1989 \u10ec\u10da\u10d8\u10e1 9 \u10d0\u10de\u10e0\u10d8\u10da\u10e1?", "answerA": "\u10d9\u10dd\u10db\u10e3\u10dc\u10d8\u10e1\u10e2\u10e3\u10e0\u10db\u10d0 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db \u10eb\u10d0\u10da\u10d8\u10e1\u10db\u10d8\u10d4\u10e0\u10d8 \u10db\u10d4\u10d7\u10dd\u10d3\u10d4\u10d1\u10d8\u10d7 \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0 \u10e1\u10d0\u10de\u10e0\u10dd\u10e2\u10d4\u10e1\u10e2\u10dd \u10d3\u10d4\u10db\u10dd\u10dc\u10e1\u10e2\u10e0\u10d0\u10ea\u10d8\u10d0, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10d4\u10d1\u10d8\u10ea \u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10d4\u10dc\u10d8\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10e3\u10e0 \u10e1\u10e2\u10d0\u10e2\u10e3\u10e1\u10e1 \u10d8\u10ea\u10d0\u10d5\u10d3\u10dc\u10d4\u10dc", "answerB": "\u10e9\u10d0\u10e2\u10d0\u10e0\u10d3\u10d0 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8 \u10db\u10e0\u10d0\u10d5\u10d0\u10da\u10de\u10d0\u10e0\u10e2\u10d8\u10e3\u10da\u10d8 \u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10d8, \u10d2\u10d0\u10dc\u10db\u10d0\u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10db\u10dd\u10eb\u10e0\u10d0\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4 \u10de\u10d0\u10e0\u10e2\u10d8\u10d4\u10d1\u10db\u10d0 \u10d2\u10d0\u10d8\u10db\u10d0\u10e0\u10ef\u10d5\u10d4\u10e1; \u10e0\u10dd\u10db\u10d4\u10da\u1 e\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d7\u10d0 \u10e0\u10d0 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d8\u10e1 \u10db\u10ee\u10d0\u10e0\u10d3\u10d0\u10ed\u10d4\u10e0\u10d0\u10d0 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10db\u10d8\u10e1\u10d0\u10e6\u10d4\u10d1\u10d0\u10d3, \u10d7\u10e3 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10e1\u10ee\u10d5\u10d0 \u10e0\u10d0\u10db \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 \u10e1\u10d0\u10db\u10d8 \u10db\u10d4\u10ee\u10e3\u10d7\u10d4\u10d3\u10d8\u10e1", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10dc\u10d0\u10ee\u10d4\u10d5\u10d0\u10e0\u10d6\u10d4 \u10db\u10d4\u10e2\u10d8\u10e1", "answerC": "\u10d3\u10d0\u10db\u10e1\u10ec\u10e0\u10d4\u10d7\u10d0 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d8\u10e1, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10d4\u10e0\u10d7\u10d8 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10d8\u10e1\u10d0", "answerD": "\u10d3\u10d0\u10db\u10e1\u10ec\u10e0\u10d4\u10d7\u10d0 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d8\u10e1, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10dd\u10e0\u10d8 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10d8\u10e1\u10d0", "correctanswer": "C"}, {"questionid": 21, "questiontext": "\u10d0\u10e5\u10d5\u10e1 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10db\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10ee\u10d4\u10da\u10db\u10dd\u10e1\u10d0\u10ec\u10d4\u10e0\u10d0\u10d3 \u10d2\u10d0\u10d3\u10d0\u10ea\u10d4\u10db\u10e3\u10da\u10d8 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10d3\u10d0\u10d1\u10e0\u10e3\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0?", "answerA": "\u10d3\u10d8\u10d0\u10ee, \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10db\u10dd\u10e2\u10d8\u10d5\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10e8\u10d4\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d3\u10d0\u10e3\u10d1\u10e0\u10e3\u10dc\u10dd\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10e1", "answerB": "\u10d0\u10e0\u10d0, \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 2 \u10d9\u10d5\u10d8\u10e0\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d0\u10e8\u10d8 \u10ee\u10d4\u10da\u10d8 \u10db\u10dd\u10d0\u10ec\u10d4\u10e0\u10dd\u10e1 \u10db\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ea\u10d4\u10db\u10e3\u10da \u10d9\u10d0\u10dc\u10dd\u10dc\u10e1", "answerC": "\u10d0\u10e0\u10d0, \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 10 \u10d3\u10e6\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d0\u10e8\u10d8 \u10ee\u10d4\u10da\u10d8 \u10db\u10dd\u10d0\u10ec\u10d4\u10e0\u10dd\u10e1 \u10db\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ea\u10d4\u10db\u10e3\u10da \u10d9\u10d0\u10dc\u10dd\u10dc\u10e1", "answerD": "\u10d3\u10d8\u10d0\u10ee, \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10d3\u10d0\u10e1\u10d0\u10d1\u10e3\u10d7\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e3\u10d0\u10e0\u10d8 \u10d7\u10e5\u10d5\u10d0\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10ee\u10d4\u10da\u10db\u10dd\u10ec\u10d4\u10e0\u10d0\u10d6\u10d4", "correctanswer": "A"}, {"questionid": 22, "questiontext": "\u10e0\u10d0 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10d0\u10e5\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10e1\u10d0\u10db\u10d4\u10ec\u10d0\u10e0\u10db\u10d4\u10dd \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1?", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10e1\u10d0\u10db\u10d4\u10ec\u10d0\u10e0\u10db\u10d4\u10dd \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e0 \u10d4\u10d9\u10e0\u10eb\u10d0\u10da\u10d4\u10d1\u10d0", "answerB": "\u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10d7\u10e3 \u10d4\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0 \u10ee\u10d4\u10da\u10e1 \u10d0\u10e0 \u10e3\u10e8\u10da\u10d8\u10e1 \u10db\u10d0\u10e1 \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10e1\u10d0\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d4\u10d1\u10d0\u10e8\u10d8", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1, \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10e1\u10d0\u10db\u10d4\u10ec\u10d0\u10e0\u10db\u10d4\u10dd \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1", "answerD": "\u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10d7\u10e3 \u10d4\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0 \u10db\u10d0\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d0\u10db\u10d3\u10d4 \u10f0\u10e5\u10dd\u10dc\u10d3\u10d0 \u10d3\u10d0\u10ec\u10e7\u10d4\u10d1\u10e3\u10da\u10d8", "correctanswer": "C"}, {"questionid": 23, "questiontext": "\u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8 \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10e1\u10d0\u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10dd, \u10de\u10d4\u10d3\u10d0\u10d2\u10dd\u10d2\u10d8\u10e3\u10e0 \u10d3\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10dd\u10d5\u10dc\u10d4\u10d1\u10dd \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1?", "answerA": "\u10d3\u10d8\u10d0\u10ee, \u10d7\u10e3 \u10d4\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10d8\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10e1 \u10d0\u10d3\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d0\u10ea\u10d8\u10e3\u10da\u10d8 \u10e4\u10e3\u10dc\u10e5\u10ea\u10d8\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10e0\u10e3\u10da\u10d4\u10d1\u10d0\u10e1", "answerB": "\u10d0\u10e0\u10d0, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10e1\u10d0\u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10dd, \u10de\u10d4\u10d3\u10d0\u10d2\u10dd\u10d2\u10d8\u10e3\u10e0 \u10d0\u10dc \u10e1\u10d0\u10ee\u10d4\u10da\u10dd\u10d5\u10dc\u10d4\u10d1\u10dd \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1", "answerC": "\u10d3\u10d8\u10d0\u10ee, \u10d7\u10e3 \u10d0\u10db \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10d8\u10e1 \u10d0\u10e0 \u10d8\u10e6\u10d4\u10d1\u10e1 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0\u10e1 \u10e1\u10d0\u10d1\u10d8\u10e3\u10ef\u10d4\u10e2\u10dd \u10e1\u10d0\u10ee\u10e1\u10e0\u10d4\u10d1\u10d8\u10d3\u10d0\u10dc", "answerD": "\u10d0\u10e0\u10d0, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10d0\u10d9\u10e0\u10eb\u10d0\u10da\u10e3\u10da\u10d8 \u10d0\u10e5\u10d5\u10e1 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0\u10d8 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d7\u10d0\u10d5\u10e1\u10d4\u10d1\u10d0", "correctanswer": "A"}, {"questionid": 24, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e8\u10d4\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d3\u10d0\u10d1\u10e0\u10e3\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10ee\u10db\u10d0\u10d7\u10d0 \u10e0\u10d0 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0\u10d0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e8\u10d4\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10e1\u10d0\u10e6\u10d4\u10d1\u10d0\u10d3?", "answerA": "\u10e1\u10d0\u10d9\u10db\u10d0\u10e0\u10d8\u10e1\u10d8\u10d0 \u10ee\u10db\u10d0\u10d7\u10d0 \u10d8\u10d2\u10d8\u10d5\u10d4 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0, \u10e0\u10d0\u10ea \u10d0\u10db \u10e1\u10d0\u10ee\u10d8\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d0\u10dc\u10d3\u10d4\u10da\u10d8 \u10db\u10d8\u10e6\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10d0\u10e0\u10d8\u10e1 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8", "answerB": "\u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10ee\u10db\u10d0\u10d7\u10d0 \u10d8\u10db \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0\u10d6\u10d4 \u10db\u10d4\u10e2\u10d8, \u10e0\u10d0\u10ea \u10d0\u10db \u10e1\u10d0\u10ee\u10d8\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d0\u10dc\u10d3\u10d4\u10da\u10d8 \u10db\u10d8\u10e6\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10d0\u10e0\u10d8\u10e1 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8", "answerC": "\u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10db\u10d8 \u10db\u10d4\u10ee\u10e3\u10d7\u10d4\u10d3\u10d8\u10e1 \u10db\u10ee\u10d0\u10e0\u10d3\u10d0\u10ed\u10d4\u10e0\u10d0", "answerD": "\u10e1\u10d0\u10d9\u10db\u10d0\u10e0\u10d8\u10e1\u10d8\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10d4\u10e0\u10d7\u10d8 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10d8\u10e1 \u10db\u10ee\u10d0\u10e0\u10d3\u10d0\u10ed\u10d4\u10e0\u10d0", "correctanswer": "A"}, {"questionid": 25, "questiontext": "\u10e0\u10dd\u10d3\u10d8\u10e1 \u10d8\u10ee\u10e1\u10dc\u10d4\u10d1\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10d0\u10e8\u10d4\u10db\u10dd\u10d3\u10d2\u10dd\u10db\u10dd \u10e1\u10d4\u10e1\u10d8\u10d0?", "answerA": "\u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10e1\u10d4\u10e5\u10e2\u10d4\u10db\u10d1\u10d4\u10e0\u10e1", "answerB": "\u10e1\u10d4\u10e5\u10e2\u10d4\u10db\u10d1\u10e0\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10e1\u10d0\u10db\u10e8\u10d0\u10d1\u10d0\u10d7\u10e1", "answerC": "\u10e1\u10d4\u10e5\u10e2\u10d4\u10db\u10d1\u10e0\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10dd\u10e0\u10e8\u10d0\u10d1\u10d0\u10d7\u10e1", "answerD": "\u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10dd\u10e5\u10e2\u10dd\u10db\u10d1\u10d4\u10e0\u10e1", "correctanswer": "B"}, {"questionid": 26, "questiontext": "\u10d0\u10e5\u10d5\u10e1 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10d4\u10e1\u10d8\u10d8\u10e1 \u10db\u10dd\u10ec\u10d5\u10d4\u10d5\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10d8\u10dc\u10d8\u10ea\u10d8\u10d0\u10e2\u10d8\u10d5\u10d8\u10d7 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10d4\u10e1\u10d8\u10d8\u10e1 \u10db\u10dd\u10ec\u10d5\u10d4\u10d5\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10d4\u10e1\u10d8\u10d8\u10e1 \u10db\u10dd\u10ec\u10d5\u10d4\u10d5\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10d4\u10e1\u10d8\u10d0\u10e1 \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d7\u10d0 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 \u10d4\u10e0\u10d7\u10d8 \u10db\u10d4\u10dd\u10d7\u10ee\u10d4\u10d3\u10d8\u10e1 \u10d0\u10dc \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10d7\u10ee\u10dd\u10d5\u10dc\u10d8\u10d7", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10d4\u10e1\u10d8\u10d0\u10e1 \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d7\u10d0 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 \u10d4\u10e0\u10d7\u10d8 \u10db\u10d4\u10ee\u10e3\u10d7\u10d4\u10d3\u10d8\u10e1 \u10d0\u10dc \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10db\u10dd\u10d7\u10ee\u10dd\u10d5\u10dc\u10d8\u10d7", "correctanswer": "C"}, {"questionid": 27, "questiontext": "\u10d5\u10d8\u10dc \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d0\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10ee\u10d3\u10dd\u10db\u10d8\u10e1 \u10d3\u10e6\u10d8\u10e1 \u10ec\u10d4\u10e1\u10e0\u10d8\u10d2\u10e1?", "answerA": "\u10e0\u10d8\u10d2\u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10ee\u10d3\u10dd\u10db\u10d8\u10e1 \u10db\u10dd\u10ec\u10d5\u10d4\u10d5\u10d8\u10e1 \u10d8\u10dc\u10d8\u10ea\u10d8\u10d0\u10e2\u10dd\u10e0\u10d8", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d0\u10d6\u10d4 \u10d3\u10d0\u10db\u10e1\u10ec\u10e0\u10d4\u10d7\u10d0 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d0", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "correctanswer": "A"}, {"questionid": 28, "questiontext": "\u10d0\u10e5\u10d5\u10e1 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10e1\u10ee\u10d5\u10d0 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0\u10d3 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1?", "answerA": "\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10e1\u10ee\u10d5\u10d0 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0\u10d3 \u10d0\u10dc \u10d0\u10e0\u10d0\u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0\u10d3 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1", "answerB": "\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10d8\u10e6\u10d4\u10d1\u10d3\u10d4\u10e1 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0\u10e1 \u10e1\u10ee\u10d5\u10d0 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0\u10d8 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerC": "\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10e1, \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0 \u10e1\u10d0\u10db\u10d4\u10ea\u10dc\u10d8\u10d4\u10e0\u10dd \u10d0\u10dc \u10de\u10d4\u10d3\u10d0\u10d2\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerD": "\u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d4\u10ec\u10d4\u10dd\u10d3\u10d4\u10e1 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0 \u10e1\u10ee\u10d5\u10d0 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d0\u10d3 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e1", "correctanswer": "C"}, {"questionid": 29, "questiontext": "\u10d5\u10d8\u10dc \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d3\u10d0\u10d0\u10d9\u10d8\u10e1\u10e0\u10dd\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1 \u10d5\u10d8\u10ea\u10d4-\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0\u10d8\u10e1 \u10db\u10dd\u10d5\u10d0\u10da\u10d4\u10dd\u10d1\u10d0?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10db\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10db\u10d0", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10db\u10d0", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0\u10db", "correctanswer": "B"}, {"questionid": 30, "questiontext": "\u10d0\u10e0\u10d8\u10e1 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d8\u10e1 \u10e8\u10d4\u10ea\u10d5\u10da\u10d0?", "answerA": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d8\u10e1 \u10e8\u10d4\u10ea\u10d5\u10da\u10d0 \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d8\u10d7\u10d0\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8", "answerB": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7; \u10e8\u10d4\u10ea\u10d5\u10da\u10d0 \u10e8\u10d4\u10ea\u10d5\u10da\u10d0 \u10d4\u10e0\u10d7\u10d3\u10e0\u10dd\u10e3\u10da\u10d0\u10d3 \u10e7\u10d5\u10d4\u10da\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10d4\u10d6\u10dd\u10d1\u10d4\u10da \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1\u10d7\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1", "answerD": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d8\u10e1 \u10e8\u10d4\u10ea\u10d5\u10da\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10d4\u10d6\u10dd\u10d1\u10d4\u10da \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1\u10d7\u10d0\u10dc \u10d3\u10d0\u10d3\u10d4\u10d1\u10e3\u10da\u10d8 \u10dd\u10e0\u10db\u10ee\u10e0\u10d8\u10d5\u10d8 \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d8\u10d7", "correctanswer": "D"}, {"questionid": 31, "questiontext": "\u10d5\u10d8\u10dc \u10dc\u10d8\u10e8\u10dc\u10d0\u10d5\u10e1 \u10d0\u10ee\u10d0\u10da\u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10e1\u10ee\u10d3\u10dd\u10db\u10d0\u10e1?", "answerA": "\u10ec\u10d8\u10dc\u10d0 \u10db\u10dd\u10ec\u10d5\u10d4\u10d5\u10d8\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0", "correctanswer": "B"}, {"questionid": 32, "questiontext": "\u10d3\u10d0\u10db\u10e1\u10ec\u10e0\u10d4\u10d7\u10d0 \u10e0\u10d0 \u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0\u10d0 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8, \u10e0\u10dd\u10db \u10d0\u10ee\u10d0\u10da\u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1\u10d0 \u10d3\u10d0 \u10d8\u10db \u10e5\u10d5\u10d4\u10e7\u10d0\u10dc\u10d0\u10e1 \u10e8\u10dd\u10e0\u10d8\u10e1 \u10d0\u10e0\u10e1\u10d4\u10d1\u10e3\u10da\u10d8 \u10dd\u10e0\u10db\u10ee\u10e0\u10d8\u10d5\u10d8 \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d8\u10d7, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10ea\u10d0\u10d0 \u10de\u10d8\u10e0\u10d8", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d4\u10d9\u10d0\u10d5\u10dd\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10db\u10d0\u10d5\u10d3\u10e0\u10dd\u10e3\u10da\u10d0\u10d3 \u10e1\u10ee\u10d5\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d0", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d4\u10d9\u10d0\u10d5\u10dd\u10e1 \u10e0\u10dd\u10d2\u10dd\u10e0\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1, \u10d8\u10e1\u10d4 \u10e3\u10ea\u10ee\u10dd \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1", "answerD": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\ 0ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d4\u10e0\u10d7\u10de\u10d8\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d0\u10d3 \u10d8\u10e6\u10d4\u10d1\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d0\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d0\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d7\u10d0\u10dc \u10d0\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10e1", "correctanswer": "A"}, {"questionid": 36, "questiontext": "\u10e0\u10dd\u10d3\u10d8\u10e1 \u10d3\u10d0 \u10e0\u10d0 \u10de\u10d4\u10e0\u10d8\u10dd\u10d3\u10d8\u10d7 \u10d8\u10e5\u10db\u10dc\u10d4\u10d1\u10d0 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd?", "answerA": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd \u10d8\u10e5\u10db\u10dc\u10d4\u10d1\u10d0 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10d8\u10d3\u10d0\u10dc 14 \u10d3\u10e6\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d0\u10e8\u10d8 \u10d3\u10d0 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d4\u10d1\u10e1 \u10e3\u10d5\u10d0\u10d3\u10dd\u10d3", "answerB": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd \u10d8\u10e5\u10db\u10dc\u10d4\u10d1\u10d0 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4 \u10d3\u10d0 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d4\u10d1\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10db\u10dd\u10ec\u10e3\u10e0\u10d5\u10d0\u10db\u10d3\u10d4", "answerC": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd \u10d8\u10e5\u10db\u10dc\u10d4\u10d1\u10d0 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d3\u10d0\u10dc\u10d8\u10e8\u10d5\u10dc\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4 \u10d3\u10d0 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d4\u10d1\u10e1 \u10db\u10d8\u10e1\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10db\u10dd\u10ec\u10e3\u10e0\u10d5\u10d0\u10db\u10d3\u10d4", "answerD": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd \u10d8\u10e5\u10db\u10dc\u10d4\u10d1\u10d0 \u10e1\u10d0\u10dd\u10db\u10d0\u10e0\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10d3\u10d0 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d4\u10d1\u10e1 \u10e1\u10d0\u10dd\u10db\u10d0\u10e0\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e3\u10e5\u10db\u10d4\u10d1\u10d0\u10db\u10d3\u10d4", "correctanswer": "D"}, {"questionid": 37, "questiontext": "\u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0, \u10e0\u10dd\u10db \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8 \u10d8\u10e7\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7, \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10dd\u10ec\u10d5\u10d4\u10e3\u10da \u10d8\u10e5\u10dc\u10d4\u10dc \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7, \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10dd\u10ec\u10d5\u10d4\u10e3\u10da \u10d8\u10e5\u10dc\u10d4\u10dc \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ea\u10d0\u10da\u10d9\u10d4\u10e3\u10da\u10d8 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8", "answerC": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8 \u10d0\u10e0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d8\u10e7\u10dd\u10e1 \u10de\u10d8\u10e0\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10db\u10d4 \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10e2\u10d8\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d8\u10d0", "answerD": "\u10d7\u10d0\u10d5\u10d3\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7, \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10dd\u10ec\u10d5\u10d4\u10e3\u10da \u10d8\u10e5\u10dc\u10d4\u10dc \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ea\u10d0\u10da\u10d9\u10d4\u10e3\u10da\u10d8 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8", "correctanswer": "A"}, {"questionid": 38, "questiontext": "\u10d5\u10d8\u10e1\u10d8 \u10d1\u10e0\u10eb\u10d0\u10dc\u10d4\u10d1\u10d8\u10d7 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d4\u10d1\u10d4\u10dc \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10eb\u10d0\u10da\u10d4\u10d1\u10d8, \u10d7\u10e3 \u10e5\u10d5\u10d4\u10e7\u10d0\u10dc\u10d0\u10e8\u10d8 \u10e1\u10d0\u10dd\u10db\u10d0\u10e0\u10d8 \u10d0\u10dc \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1", "correctanswer": "C"}, {"questionid": 39, "questiontext": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10de\u10d0\u10dc\u10d3\u10d4\u10db\u10d8\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10d0?", "answerA": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0. \u10de\u10d0\u10dc\u10d3\u10d4\u10db\u10d8\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d0\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10e1 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10d0\u10dc \u10db\u10d8\u10e1 \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10db\u10d4 \u10dc\u10d0\u10ec\u10d8\u10da\u10e8\u10d8", "answerB": "\u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0. \u10de\u10d0\u10dc\u10d3\u10d4\u10db\u10d8\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d0\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10e1 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d8\u10db \u10dc\u10d0\u10ec\u10d8\u10da\u10e8\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10e8\u10d8\u10ea \u10d4\u10de\u10d8\u10d3\u10d4\u10db\u10d8\u10dd\u10da\u10dd\u10d2\u10e3\u10e0\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0 \u10e1\u10d0\u10e4\u10e0\u10d7\u10ee\u10d4\u10e1 \u10e3\u10e5\u10db\u10dc\u10d8\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d8\u10e1 \u10ef\u10d0\u10dc\u10db\u10e0\u10d7\u10d4\u10da\u10dd\u10d1\u10d0\u10e1", "answerC": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0. \u10de\u10d0\u10dc\u10d3\u10d4\u10db\u10d8\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d0\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10e1 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10d7\u10d4\u10da \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4; 13 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d4\u10d1\u10e8\u10d8", "answerD": "\u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0. \u10de\u10d0\u10dc\u10d3\u10d4\u10db\u10d8\u10d0 \u10d0\u10e0 \u10e8\u10d4\u10d3\u10d8\u10e1 \u10d8\u10db \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d7\u10d0 \u10e9\u10d0\u10db\u10dd\u10dc\u10d0\u10d7\u10d5\u10d0\u10da\u10e8\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d7\u10d0 \u10d3\u10e0\u10dd\u10e1\u10d0\u10ea \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d0\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10e1 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0\u10e1", "correctanswer": "A"}, {"questionid": 40, "questiontext": "\u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d2\u10d0\u10db\u10dd\u10ea\u10d4\u10db\u10e3\u10da\u10d8 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d0\u10e1?", "answerA": "\u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1, \u10d7\u10e3 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d4\u10d1\u10d7\u10d0\u10dc \u10d3\u10d0\u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d4\u10d1\u10d8\u10d7 \u10d2\u10d0\u10db\u10dd\u10d8\u10ea\u10d4\u10db\u10d0", "answerB": "\u10d0\u10e0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1. \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d4\u10e8\u10d4\u10ea \u10e1\u10d0\u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10dd\u10d0 \u10e8\u10d4\u10e1\u10d0\u10e1\u10e0\u10e3\u10da\u10d4\u10d1\u10da\u10d0\u10d3 \u10d2\u10d0\u10db\u10dd\u10ea\u10d4\u10db\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "answerC": "\u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1, \u10d7\u10e3 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d4\u10e8\u10d4\u10d0 \u10d2\u10d0\u10db\u10dd\u10ea\u10d4\u10db\u10e3\u10da\u10d8", "answerD": "\u10d0\u10e0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10e1, \u10d7\u10e3 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10d7\u10d0 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d7\u10d0\u10dc \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d8\u10d7 \u10d0\u10e0\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10ea\u10d4\u10db\u10e3\u10da\u10d8", "correctanswer": "A"}, {"questionid": 41, "questiontext": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10d0\u10dc \u10e1\u10d0\u10dd\u10db\u10d0\u10e0\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1\u10d0\u10e1 \u10d0\u10d6\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d8\u10e1\u10d8 \u10d2\u10d0\u10db\u10dd\u10ee\u10d0\u10e2\u10d5\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0?", "answerA": "\u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10d0\u10dc \u10e1\u10d0\u10dd\u10db\u10d0\u10e0\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8\u10d7 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10dd\u10e1 \u10d0\u10d6\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d8\u10e1\u10d8 \u10d2\u10d0\u10db\u10dd\u10ee\u10d0\u10e2\u10d5\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerB": "\u10e1\u10d0\u10d2\u10d0\u10dc\u10d2\u10d4\u10d1\u10dd \u10d0\u10dc \u10e1\u10d0\u10dd\u10db\u10d0\u10e0\u10d8 \u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10d0\u10d6\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d8\u10e1\u10d8 \u10d2\u10d0\u10db\u10dd\u10ee\u10d0\u10e2\u10d5\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u 10da\u10dd\u10d1\u10d8\u10e1 \u10dd\u10e0\u10d8 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10d8\u10d7; 16 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d4\u10d1\u10e8\u10d8", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d1\u10d8\u10e3\u10ef\u10d4\u10e2\u10d8\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10e1 \u10d8\u10e6\u10d4\u10d1\u10e1 \u10e1\u10ee\u10d3\u10dd\u10db\u10d0\u10d6\u10d4 \u10d3\u10d0\u10db\u10e1\u10ec\u10e0\u10d4\u10d7\u10d0 \u10dd\u10e0\u10d8 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10d8\u10d7", "answerD": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d1\u10d8\u10e3\u10ef\u10d4\u10e2\u10d8\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10e1 \u10d8\u10e6\u10d4\u10d1\u10e1 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10e3\u10db\u10e0\u10d0\u10d5\u10da\u10d4\u10e1\u10dd\u10d1\u10d8\u10d7", "correctanswer": "D"}, {"questionid": 48, "questiontext": "\u10e0\u10d0 \u10e1\u10d8\u10ee\u10e8\u10d8\u10e0\u10d8\u10d7 \u10d8\u10e6\u10d4\u10d1\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d1\u10d8\u10e3\u10ef\u10d4\u10e2\u10d8\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10e1?", "answerA": "\u10e7\u10dd\u10d5\u10d4\u10da \u10ec\u10d4\u10da\u10d8\u10ec\u10d0\u10d3\u10e8\u10d8 \u10d4\u10e0\u10d7\u10ee\u10d4\u10da", "answerB": "\u10e1\u10d0\u10db \u10ec\u10d4\u10da\u10d8\u10ec\u10d0\u10d3\u10e8\u10d8 \u10d4\u10e0\u10d7\u10ee\u10d4\u10da", "answerC": "\u10ee\u10e3\u10d7 \u10ec\u10d4\u10da\u10d8\u10ec\u10d0\u10d3\u10e8\u10d8 \u10d4\u10e0\u10d7\u10ee\u10d4\u10da", "answerD": "\u10d0\u10d7 \u10ec\u10d4\u10da\u10d8\u10ec\u10d0\u10d3\u10e8\u10d8 \u10d4\u10e0\u10d7\u10ee\u10d4\u10da", "correctanswer": "A"}, {"questionid": 49, "questiontext": "\u10d5\u10d8\u10e1\u10d8 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7 \u10d0\u10e5\u10d5\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10ee\u10d0\u10da\u10d8 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10e3\u10e0\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d4\u10d1\u10d0\u10e1?", "answerA": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10ee\u10d0\u10da\u10d8 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10e3\u10e0\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d4\u10d1\u10d0\u10e1, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10db\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2", "answerB": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10ee\u10d0\u10da\u10d8 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10e3\u10e0\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d4\u10d1\u10d0\u10e1, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10db\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2", "answerC": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10ee\u10d0\u10da\u10d8 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10e3\u10e0\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d4\u10d1\u10d0\u10e1, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10db\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10d7\u10d0 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2", "answerD": "\u10d9\u10d0\u10dc\u10dd\u10dc\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10ee\u10d0\u10da\u10d8 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10e3\u10e0\u10d8 \u10d5\u10d0\u10da\u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d4\u10d1\u10d0\u10e1, \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10db\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2", "correctanswer": "B"}, {"questionid": 50, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0 \u10d0\u10e0\u10d8\u10e1 \u10d0\u10e6\u10db\u10d0\u10e1\u10e0\u10e3\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e3\u10db\u10d0\u10e6\u10da\u10d4\u10e1\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10e8\u10d4\u10d3\u10d2\u10d4\u10d1\u10d0:", "answerA": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1\u10d2\u10d0\u10dc", "answerB": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1\u10d2\u10d0\u10dc", "answerC": "\u10de\u10e0\u10d4\u10db\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d4\u10d1\u10d8\u10e1\u10d2\u10d0\u10dc", "answerD": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1\u10d2\u10d0\u10dc", "correctanswer": "C"}, {"questionid": 51, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7, \u10e7\u10d5\u10d4\u10da\u10d0\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e1\u10ec\u10d0\u10e0\u10d8 \u10dc\u10d4\u10d1\u10d0\u10e0\u10d7\u10d5\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d4\u10e8\u10d4 \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3 \u10d3\u10d0 \u10e3\u10d8\u10d0\u10e0\u10d0\u10e6\u10dd\u10d3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0, \u10d2\u10d0\u10e0\u10d3\u10d0:", "answerA": "\u10d8\u10db \u10de\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0, \u10e0\u10dd\u10db\u10da\u10d4\u10d1\u10d8\u10ea \u10d0\u10e0\u10d8\u10d0\u10dc \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10eb\u10d0\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10dc \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d0\u10dc \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e3\u10e1\u10d0\u10e4\u10e0\u10d7\u10ee\u10dd\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d0\u10d6\u10d4 \u10de\u10d0\u10e1\u10e3\u10ee\u10d8\u10e1\u10db\u10d2\u10d4\u10d1\u10d4\u10da\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10e1 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0\u10e8\u10d8", "answerB": "\u10d8\u10db \u10de\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0, \u10e0\u10dd\u10db\u10da\u10d4\u10d1\u10db\u10d0\u10ea \u10e1\u10d0\u10e1\u10ef\u10d4\u10da\u10d8 \u10db\u10dd\u10d8\u10ee\u10d0\u10d3\u10d4\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10d7 \u10db\u10eb\u10d8\u10db\u10d4 \u10d0\u10dc \u10db\u10eb\u10d8\u10db\u10d4 \u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10d8\u10e1 \u10e9\u10d0\u10d3\u10d4\u10dc\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d3\u10d0 \u10dc\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10d1\u10d0 \u10d2\u10d0\u10e5\u10d0\u10e0\u10ec\u10e7\u10da\u10d4\u10d1\u10e3\u10da\u10d8 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7", "answerC": "\u10d8\u10db \u10de\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0, \u10e0\u10dd\u10db\u10da\u10d4\u10d1\u10e1\u10d0\u10ea \u10d0\u10e0 \u10db\u10d8\u10e3\u10e6\u10ec\u10d4\u10d5\u10d8\u10d0\u10d7 18 \u10ec\u10da\u10d8\u10e1 \u10d0\u10e1\u10d0\u10d9\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d0\u10dc \u10d0\u10e5\u10d5\u10d7 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d8 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10e3\u10da\u10d8 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d8\u10e1 \u10e1\u10e2\u10d0\u10e2\u10e3\u10e1\u10d8 \u10d3\u10d0 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10d4\u10dc \u10db\u10ee\u10d0\u10e0\u10d3\u10d0\u10db\u10ed\u10d4\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d0\u10e1", "answerD": "\u10d8\u10db \u10de\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0, \u10e0\u10dd\u10db\u10da\u10d4\u10d1\u10d8\u10ea \u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10dd\u10d1\u10d4\u10dc \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd \u10e1\u10d0\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10e8\u10d8 \u10d3\u10d0 \u10de\u10d0\u10e1\u10e3\u10ee\u10d8\u10e1\u10db\u10d2\u10d4\u10d1\u10d4\u10da\u10dc\u10d8 \u10d0\u10e0\u10d8\u10d0\u10dc \u10d0\u10d3\u10d2\u10d8\u10da\u10dd\u10d1\u10e0\u10d8\u10d5\u10d8 \u10d7\u10d5\u10d8\u10d7\u10db\u10db\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d4\u10d1\u10d0\u10d6\u10d4", "correctanswer": "A"}, {"questionid": 52, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1, \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10e8\u10d4\u10db\u10dd\u10d5\u10d8\u10d3\u10d4\u10e1 \u10e5\u10d5\u10d4\u10e7\u10d0\u10dc\u10d0\u10e8\u10d8?", "answerA": "\u10d3\u10d8\u10d0\u10ee, \u10d5\u10d8\u10dc\u10d0\u10d8\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d2\u10d0\u10e1\u10d5\u10da\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e8\u10d4\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1 \u10e8\u10d4\u10e3\u10d6\u10e6\u10e3\u10d3\u10d0\u10d5\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10d7 \u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10d1\u10d4\u10dc \u10d0\u10e0\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10d8, \u10d0\u10e0\u10d0\u10db\u10d4\u10d3 \u10e3\u10ea\u10ee\u10dd \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10d8\u10ea", "answerB": "\u10d0\u10e0\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d2\u10d0\u10e1\u10d5\u10da\u10d8\u10e1 \u10e8\u10d4\u10e3\u10d6\u10e6\u10e3\u10d3\u10d0\u10d5\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10e1, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e8\u10d4\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d9\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d0\u10d0 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8", "answerC": "\u10d0\u10e0\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e8\u10d4\u10db\u10dd\u10e1\u10d5\u10da\u10d8\u10e1 \u10e8\u10d4\u10e3\u10d6\u10e6\u10e3\u10d3\u10d0\u10d5\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8 \u10d5\u10e0\u10ea\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d6\u10d4, \u10d7\u10e3 \u10d8\u10e1 \u10d0\u10e0\u10d0\u10e1\u10e0\u10e3\u10da\u10ec\u10da\u10dd\u10d5\u10d0\u10dc\u10d8\u10d0; 18 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d4\u10d1\u10e8\u10d8", "answerD": "\u10d3\u10d8\u10d0\u10ee, \u10d5\u10d8\u10dc\u10d0\u10d8\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0, \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10e8\u10d4\u10db\u10dd\u10d5\u10d8\u10d3\u10d4\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8, \u10d0\u10db \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d2\u10d0\u10d5\u10e0\u10ea\u10d4\u10da\u10d3\u10d4\u10e1 \u10e3\u10ea\u10ee\u10dd \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d6\u10d4", "correctanswer": "D"}, {"questionid": 53, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d0 \u10d2\u10d0\u10db\u10dd\u10d0\u10e5\u10d5\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10d8\u10d7. \u10d5\u10d8\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e3\u10e5\u10db\u10d4\u10d1\u10d0, \u10e8\u10d4\u10ea\u10d5\u10da\u10d0 \u10d0\u10dc \u10e8\u10d4\u10e9\u10d4\u10e0\u10d4\u10d1\u10d0?", "answerA": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7", "answerC": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10e3\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d9\u10d0\u10dc\u10dd\u1
