<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizGE – Georgian Quiz App</title>
  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #7C5CFC;
  --primary-dark: #6448d6;
  --secondary: #FF6B6B;
  --bg: #0D0D1A;
  --bg2: #141428;
  --card: #1A1A35;
  --card2: #222244;
  --border: #2A2A55;
  --text: #E8E8F0;
  --muted: #8888AA;
  --success: #4ECDC4;
  --error: #FF6B6B;
  --gold: #FFD700;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Nav ── */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), #A78BFA);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: .75rem;
  flex-wrap: wrap;
}

.nav-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  object-fit: cover;
}

.nav-name {
  color: var(--muted);
  font-size: .9rem;
  display: none;
}
@media(min-width:600px){ .nav-name { display: block; } }

/* ── Buttons ── */
.btn {
  padding: .55rem 1.3rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: .9rem;
  font-weight: 600;
  transition: all .2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), #A78BFA);
  color: white;
  box-shadow: 0 4px 15px rgba(124,92,252,.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,92,252,.5); }

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-outline:hover { background: var(--primary); color: white; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 2px solid var(--border);
}
.btn-ghost:hover { border-color: var(--primary); color: var(--text); }

.btn-google {
  background: white;
  color: #333;
  border: 2px solid #e5e7eb;
  font-size: .9rem;
}
.btn-google:hover { background: #f9fafb; transform: translateY(-1px); }

.btn-gold {
  background: linear-gradient(135deg, #f59e0b, var(--gold));
  color: #1a1a00;
  box-shadow: 0 4px 15px rgba(255,215,0,.3);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,.5); }

.btn-lg { padding: .85rem 2rem; font-size: 1.05rem; border-radius: 12px; }
.btn-sm { padding: .4rem .9rem; font-size: .82rem; }

/* ── Lang switch ── */
.lang-switch {
  display: flex;
  background: var(--card);
  border-radius: 8px;
  padding: 3px;
  border: 1px solid var(--border);
}
.lang-btn {
  padding: .3rem .7rem;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  transition: all .2s;
}
.lang-btn.active { background: var(--primary); color: white; }

/* ── Hero ── */
.hero {
  text-align: center;
  padding: 5rem 2rem 3rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(124,92,252,.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  margin-bottom: 1rem;
  line-height: 1.2;
}
.hero h1 .gradient {
  background: linear-gradient(135deg, var(--primary), #A78BFA, var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p { color: var(--muted); font-size: 1.15rem; max-width: 500px; margin: 0 auto 2rem; }

/* ── Subject cards ── */
.subjects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}

.subject-card {
  background: var(--card);
  border-radius: 20px;
  padding: 2rem;
  text-align: center;
  border: 1px solid var(--border);
  transition: all .3s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
  display: block;
  position: relative;
  overflow: hidden;
}
.subject-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), #A78BFA);
  opacity: 0;
  transition: opacity .3s;
}
.subject-card:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(124,92,252,.2); }
.subject-card:hover::before { opacity: 1; }

.subject-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  display: block;
}
.subject-card h2 { font-size: 1.4rem; margin-bottom: .5rem; }
.subject-card p { color: var(--muted); font-size: .9rem; margin-bottom: 1.2rem; }

.badge {
  display: inline-block;
  padding: .3rem .9rem;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .02em;
}
.badge-free { background: rgba(78,205,196,.15); color: var(--success); border: 1px solid rgba(78,205,196,.3); }
.badge-paid { background: rgba(255,215,0,.1); color: var(--gold); border: 1px solid rgba(255,215,0,.2); }

/* ── Auth ── */
.auth-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 70px);
  padding: 2rem;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border-radius: 24px;
  padding: 2.5rem;
  border: 1px solid var(--border);
  box-shadow: 0 30px 60px rgba(0,0,0,.4);
}
.auth-card h1 { text-align: center; font-size: 1.8rem; margin-bottom: 2rem; }

.form-group { margin-bottom: 1.1rem; }
.form-group label { display: block; margin-bottom: .4rem; color: var(--muted); font-size: .88rem; font-weight: 500; }
.form-group input {
  width: 100%;
  padding: .8rem 1rem;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: .95rem;
  transition: border-color .2s;
  outline: none;
}
.form-group input:focus { border-color: var(--primary); }

.divider {
  text-align: center;
  margin: 1.2rem 0;
  color: var(--muted);
  position: relative;
  font-size: .88rem;
}
.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%; width: 40%; height: 1px;
  background: var(--border);
}
.divider::before { left: 0; }
.divider::after { right: 0; }

.auth-link { text-align: center; margin-top: 1.2rem; color: var(--muted); font-size: .9rem; }
.auth-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
.auth-link a:hover { text-decoration: underline; }

/* ── Alert ── */
.alert {
  padding: .8rem 1rem;
  border-radius: 10px;
  margin-bottom: 1rem;
  font-size: .9rem;
  font-weight: 500;
}
.alert-error { background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3); color: var(--error); }
.alert-success { background: rgba(78,205,196,.12); border: 1px solid rgba(78,205,196,.3); color: var(--success); }

/* ── Quiz page ── */
.quiz-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.quiz-header {
  margin-bottom: 2rem;
}
.back-link {
  color: var(--muted);
  text-decoration: none;
  font-size: .9rem;
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  margin-bottom: 1rem;
  transition: color .2s;
}
.back-link:hover { color: var(--primary); }

.quiz-header h1 { font-size: 1.8rem; margin-bottom: .5rem; }
.quiz-meta { color: var(--muted); font-size: .9rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }

.progress-area { margin: 1.2rem 0; }
.progress-label { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-bottom: .5rem; }
.progress-bar {
  background: var(--card2);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--primary), #A78BFA);
  transition: width .4s ease;
}

/* ── Question card ── */
.question-card {
  background: var(--card);
  border-radius: 20px;
  padding: 2rem;
  border: 1px solid var(--border);
  margin-bottom: 1.5rem;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.question-num {
  font-size: .82rem;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: .75rem;
}
.question-text {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 1.8rem;
  line-height: 1.5;
}

.answers-grid { display: grid; gap: .75rem; }

.answer-btn {
  padding: 1rem 1.4rem;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  font-size: .95rem;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: .8rem;
  width: 100%;
}
.answer-btn:not(:disabled):hover { border-color: var(--primary); background: rgba(124,92,252,.08); transform: translateX(4px); }
.answer-btn:disabled { cursor: default; }
.answer-btn.correct { border-color: var(--success) !important; background: rgba(78,205,196,.1) !important; }
.answer-btn.wrong { border-color: var(--error) !important; background: rgba(255,107,107,.08) !important; }

.answer-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: .82rem;
  flex-shrink: 0;
}
.answer-btn.correct .answer-letter { background: var(--success); color: #000; }
.answer-btn.wrong .answer-letter { background: var(--error); color: #fff; }

.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }

/* ── Paywall ── */
.paywall {
  background: var(--card);
  border: 2px dashed rgba(255,215,0,.4);
  border-radius: 24px;
  padding: 3rem 2rem;
  text-align: center;
  margin-top: 2rem;
  position: relative;
  overflow: hidden;
}
.paywall::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,215,0,.05) 0%, transparent 60%);
  pointer-events: none;
}
.paywall-icon { font-size: 4rem; margin-bottom: 1rem; }
.paywall h2 { font-size: 1.8rem; margin-bottom: .75rem; }
.paywall p { color: var(--muted); max-width: 400px; margin: 0 auto 2rem; }
.paywall-price {
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--gold);
  margin-bottom: 1.5rem;
}
.paywall-price span { font-size: 1rem; color: var(--muted); font-weight: 400; }

/* ── Score ── */
.score-card {
  background: var(--card);
  border-radius: 24px;
  padding: 3rem 2rem;
  text-align: center;
  border: 1px solid var(--border);
  animation: fadeIn .4s ease;
}
.score-big {
  font-size: 5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), #A78BFA);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin: 1rem 0;
}
.score-label { color: var(--muted); font-size: 1rem; }
.score-breakdown { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
.score-stat { text-align: center; }
.score-stat .num { font-size: 2rem; font-weight: 700; }
.score-stat .lbl { color: var(--muted); font-size: .85rem; }
.score-correct .num { color: var(--success); }
.score-wrong .num { color: var(--error); }

/* ── Loading ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem;
  gap: 1rem;
  color: var(--muted);
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Not logged in wall ── */
.login-wall {
  background: var(--card);
  border-radius: 24px;
  padding: 3rem 2rem;
  text-align: center;
  border: 1px solid var(--border);
  max-width: 500px;
  margin: 2rem auto;
}
.login-wall h2 { margin-bottom: .75rem; }
.login-wall p { color: var(--muted); margin-bottom: 2rem; }

/* ── Paid badge on nav ── */
.paid-badge {
  background: linear-gradient(135deg, #f59e0b, var(--gold));
  color: #1a1a00;
  padding: .2rem .6rem;
  border-radius: 6px;
  font-size: .75rem;
  font-weight: 800;
  letter-spacing: .05em;
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 2rem;
  color: var(--muted);
  font-size: .85rem;
  border-top: 1px solid var(--border);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  nav { padding: .75rem 1rem; }
  .quiz-wrap { padding: 1.5rem 1rem 3rem; }
  .question-card { padding: 1.5rem; }
  .question-text { font-size: 1.05rem; }
  .score-breakdown { gap: 1rem; }
}

/* ── Mistakes page ─────────────────────────────────────────── */
.mistakes-header {
  margin-bottom: 2rem;
}
.mistakes-title-row {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.mistakes-title-row h1 { font-size: 1.8rem; }

/* Subject filter tabs */
.subject-tabs {
  display: flex;
  gap: .5rem;
  flex-wrap: wrap;
  padding: .25rem 0;
}
.tab-btn {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: .55rem 1.1rem;
  border: 2px solid var(--border);
  border-radius: 50px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .88rem;
  font-weight: 600;
  transition: all .2s;
  white-space: nowrap;
}
.tab-btn:hover { border-color: var(--primary); color: var(--text); }
.tab-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 4px 12px rgba(124,92,252,.35);
}
.tab-count {
  background: rgba(255,255,255,.2);
  padding: .1rem .45rem;
  border-radius: 10px;
  font-size: .78rem;
}
.tab-btn:not(.active) .tab-count { background: var(--border); color: var(--muted); }

/* Mistakes grid */
.mistakes-grid {
  display: grid;
  gap: 1.25rem;
}

.mistake-card {
  background: var(--card);
  border-radius: 18px;
  padding: 1.75rem;
  border: 2px solid var(--border);
  transition: border-color .3s, opacity .3s;
  animation: fadeIn .3s ease;
}
.mistake-card.removed {
  border-color: var(--success);
  opacity: .6;
}

.mistake-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.mistake-subject-badge {
  font-size: .8rem;
  font-weight: 700;
  padding: .25rem .75rem;
  background: var(--card2);
  border-radius: 20px;
  color: var(--muted);
  border: 1px solid var(--border);
}
.correct-badge {
  font-size: .8rem;
  font-weight: 700;
  padding: .25rem .75rem;
  background: rgba(78,205,196,.15);
  border: 1px solid rgba(78,205,196,.4);
  border-radius: 20px;
  color: var(--success);
}

.feedback-msg {
  padding: .75rem 1rem;
  border-radius: 10px;
  font-weight: 600;
  font-size: .9rem;
  margin-bottom: .5rem;
}
.feedback-correct {
  background: rgba(78,205,196,.12);
  border: 1px solid rgba(78,205,196,.3);
  color: var(--success);
}
.feedback-wrong {
  background: rgba(255,107,107,.1);
  border: 1px solid rgba(255,107,107,.3);
  color: var(--error);
}

/* Mistakes empty state */
.mistakes-empty {
  text-align: center;
  padding: 4rem 2rem;
  background: var(--card);
  border-radius: 24px;
  border: 1px solid var(--border);
}
.mistakes-empty h2 { font-size: 1.5rem; }

/* Mistakes count pill in nav */
.mistakes-count-pill {
  background: var(--error);
  color: white;
  border-radius: 12px;
  font-size: .72rem;
  font-weight: 800;
  padding: .1rem .45rem;
  min-width: 18px;
  text-align: center;
  line-height: 1.4;
}

/* Mistakes card on home page */
.mistakes-card {
  border-color: rgba(255,107,107,.3);
  background: linear-gradient(135deg, var(--card), rgba(255,107,107,.05));
}
.mistakes-card:hover { border-color: var(--error) !important; box-shadow: 0 20px 40px rgba(255,107,107,.15) !important; }
.mistakes-card::before { background: linear-gradient(90deg, var(--error), var(--secondary)) !important; }
.badge-mistakes {
  background: rgba(255,107,107,.12);
  color: var(--error);
  border: 1px solid rgba(255,107,107,.3);
}

/* btn-secondary for mistakes */
.btn-secondary {
  background: linear-gradient(135deg, var(--error), var(--secondary));
  color: white;
  box-shadow: 0 4px 15px rgba(255,107,107,.3);
}
.btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,.4); }

/* ── Section picker ────────────────────────────────────────── */
.section-picker {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
  margin-top: 1.5rem;
}

.section-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 1.4rem 1.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: all .2s;
  position: relative;
}
.section-card:not(.section-locked):hover {
  border-color: var(--primary);
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(124,92,252,.2);
}
.section-card.section-locked {
  opacity: .55;
  cursor: default;
  border-style: dashed;
}

.section-num {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--primary);
  flex-shrink: 0;
}
.section-range {
  font-size: .85rem;
  color: var(--muted);
  flex: 1;
}
.section-go {
  font-size: 1.2rem;
  color: var(--primary);
}
.section-lock {
  font-size: .78rem;
  font-weight: 700;
  color: var(--gold);
  background: rgba(255,215,0,.1);
  border: 1px solid rgba(255,215,0,.25);
  border-radius: 6px;
  padding: .2rem .5rem;
}
.section-pill {
  font-size: .78rem;
  font-weight: 700;
  padding: .2rem .65rem;
  background: rgba(124,92,252,.15);
  border: 1px solid rgba(124,92,252,.3);
  border-radius: 20px;
  color: var(--primary);
}

/* ── Mistakes subject picker ───────────────────────────────── */
.mistakes-picker { }
.mistakes-title-row {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1.75rem;
}
.mistakes-title-row h1 { font-size: 1.8rem; }

.picker-cards {
  display: flex;
  flex-direction: column;
  gap: .85rem;
}

.picker-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 1.2rem 1.6rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  cursor: pointer;
  transition: all .2s;
}
.picker-card:hover {
  border-color: var(--secondary);
  transform: translateX(4px);
  box-shadow: 0 8px 24px rgba(255,107,107,.15);
}
.picker-all {
  border-color: rgba(124,92,252,.4);
  background: linear-gradient(135deg, var(--card), rgba(124,92,252,.06));
}

 109, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10e4\u10e0\u10d0\u10d6\u10d0\u10d0 \u10d2\u10d0\u10db\u10dd\u10e2\u10dd\u10d5\u10d4\u10d1\u10e3\u10da\u10d8? \u2013 \u10d0\u10e5 \u10e4\u10dd\u10e2\u10dd\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10e6\u10d4\u10d1\u10d0 \u10dc\u10d4\u10d1\u10d0\u10d3\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1. \u2013 ----------, \u10d8\u10e1\u10d4 \u10e1\u10d8\u10d0\u10db\u10dd\u10d5\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d2\u10d0\u10d3\u10d0\u10d5\u10d8\u10e6\u10d4\u10d1\u10d3\u10d8, \u10e1\u10d0\u10dd\u10ea\u10d0\u10e0\u10d8 \u10d4\u10e5\u10e1\u10de\u10dd\u10dc\u10d0\u10e2\u10d4\u10d1\u10d8\u10d0 \u10d2\u10d0\u10db\u10dd\u10e4\u10d4\u10dc\u10d8\u10da\u10d8", "answerA": "\u10d0\u10e0 \u10d5\u10d8\u10ea\u10dd\u10d3\u10d8", "answerB": "\u10dc\u10d4\u10d1\u10d0 \u10db\u10d8\u10d1\u10dd\u10eb\u10d4\u10d7", "answerC": "\u10e0\u10dd\u10d2\u10dd\u10e0 \u10d2\u10d4\u10d9\u10d0\u10d3\u10e0\u10d4\u10d1\u10d0\u10d7", "answerD": "\u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10d9\u10d0\u10e0\u10d2\u10d8", "correctanswer": "A"}, {"questionid": 110, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10e1\u10d8\u10e2\u10e7\u10d5\u10d0\u10d0 \u10d2\u10d0\u10db\u10dd\u10e2\u10dd\u10d5\u10d4\u10d1\u10e3\u10da\u10d8? \u2013 \u10d0\u10db\u10d8\u10ec\u10dd\u10dc\u10d4\u10d7, \u10d7\u10e3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0, \u10dd\u10e0\u10d8 \u10d9\u10d8\u10da\u10dd\u10d2\u10e0\u10d0\u10db\u10d8 \u10d9\u10d8\u10e2\u10e0\u10d8. \u2013 ----------, \u10d7\u10d0\u10dc\u10ee\u10d0 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8 \u10d2\u10d0\u10d3\u10d0\u10d8\u10ee\u10d0\u10d3\u10d4\u10d7", "answerA": "\u10d1\u10dd\u10d3\u10d8\u10e8\u10d8", "answerB": "\u10d2\u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d7", "answerC": "\u10d8\u10dc\u10d4\u10d1\u10d4\u10d7", "answerD": "\u10e3\u10d9\u10d0\u10ea\u10e0\u10d0\u10d5\u10d0\u10d3", "correctanswer": "A"}, {"questionid": 111, "questiontext": "\u10e0\u10dd\u10db\u10d 10d8 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc!", "answerA": "\u10d7\u10d0\u10dc\u10ee\u10d0 \u10d3\u10e0\u10dd\u10e3\u10da\u10d0\u10d3 \u10e8\u10d4\u10d8\u10e2\u10d0\u10dc\u10d4\u10d7 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8", "answerB": "\u10d7\u10d0\u10dc\u10ee\u10d8\u10e1 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc \u10e8\u10d4\u10d0\u10db\u10dd\u10ec\u10db\u10d4\u10d7", "answerC": "\u10d7\u10d0\u10dc\u10ee\u10d0 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10d3\u10d0\u10dc \u10d3\u10e0\u10dd\u10e3\u10da\u10d0\u10d3 \u10d2\u10d0\u10d8\u10e2\u10d0\u10dc\u10d4\u10d7", "answerD": "\u10d7\u10d0\u10dc\u10ee\u10d0 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8 \u10d2\u10d0\u10d3\u10d0\u10d0\u10ee\u10e3\u10e0\u10d3\u10d0\u10d5\u10d4\u10d7", "correctanswer": "D"}, {"questionid": 143, "questiontext": "- \u10d1) III.1.4. \u10e0\u10d0\u10e1 \u10dc\u10d8\u10e8\u10dc\u10d0\u10d5\u10e1 \u10db\u10dd\u10ea\u10d4\u10db\u10e3\u10da\u10d8 \u10d2\u10d0\u10dc\u10ea\u10ee\u10d0\u10d3\u10d4\u10d1\u10d0? \u10d9\u10d4\u10d7\u10d8\u10da\u10d8 \u10d8\u10e7\u10dd\u10e1 \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10db\u10dd\u10d1\u10e0\u10eb\u10d0\u10dc\u10d4\u10d1\u10d0!", "answerA": "\u10d2\u10d5\u10d8\u10ee\u10d0\u10e0\u10d8\u10d0 \u10d7\u10e5\u10d5\u10d4\u10dc\u10d7\u10d0\u10dc \u10e3\u10e0\u10d7\u10d8\u10d4\u10e0\u10d7\u10dd\u10d1\u10d0", "answerB": "\u10d2\u10d5\u10d8\u10ee\u10d0\u10e0\u10d8\u10d0 \u10d7\u10e5\u10d5\u10d4\u10dc\u10d7\u10d0\u10dc \u10e7\u10dd\u10e4\u10dc\u10d0", "answerC": "\u10d2\u10d5\u10d8\u10ee\u10d0\u10e0\u10d8\u10d0 \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10e1\u10d8\u10d9\u10d4\u10d7\u10d4", "answerD": "\u10d2\u10d5\u10d8\u10ee\u10d0\u10e0\u10d8\u10d0 \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10d1\u10d0", "correctanswer": "B"}, {"questionid": 144, "questiontext": "- \u10d3) 25 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\ u10d0\u10e0, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10db\u10dd\u10da\u10d0\u10e0\u10d4\u10db \u10d7\u10e5\u10d5\u10d0, 5-\u10e1\u10d0\u10d0\u10d7\u10d8\u10d0\u10dc \u10e1\u10d4\u10d0\u10dc\u10e1\u10d6\u10d4 \u10ea\u10dd\u10e2\u10d0 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8 \u10d3\u10d0\u10e0\u10e9\u10d0\u10dd. \u2013 \u10d0\u10e0\u10d0 \u10e3\u10e8\u10d0\u10d5\u10e1, \u10d3\u10d0\u10d5\u10d4\u10da\u10dd\u10d3\u10d4\u10d1\u10d8. \u2013 \u10d7\u10e5\u10d5\u10d4\u10dc \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8 \u10d2\u10dc\u10d4\u10d1\u10d0\u10d5\u10d7? \u2013 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10dd\u10e0\u10d8. \u2013 \u10db\u10d4 \u10ee\u10e3\u10d7\u10d8 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8 \u10db\u10d8\u10dc\u10d3\u10d0. \u10d7\u10e3 \u10d0\u10db\u10d3\u10d4\u10dc\u10d8 \u10d0\u10e0 \u10d8\u10e5\u10dc\u10d4\u10d1\u10d0, \u10e0\u10d8\u10d2\u10e1 \u10d7\u10e5\u10d5\u10d4\u10dc \u10d3\u10d0\u10d2\u10d8\u10d7\u10db\u10dd\u10d1\u10d7. \u10d4\u10d2\u10d4\u10d1 \u10dd\u10e0\u10d8 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8 \u10e8\u10d4\u10d2\u10ee\u10d5\u10d3\u10d4\u10d7. \u2013 \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0", "answerA": "\u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10d8\u10e1 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "answerB": "\u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8\u10e1 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "answerC": "\u10d9\u10d8\u10dc\u10dd\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "answerD": "\u10db\u10d0\u10e0\u10d9\u10d4\u10e2\u10d8\u10e1 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "correctanswer": "A"}, {"questionid": 162, "questiontext": "- \u10d2) 29 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.2.3. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10e3\u10d9\u10d0\u10ea\u10e0\u10d0\u10d5\u10d0\u10d3, \u10d4\u10e1 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8 \u10e9\u10d4\u10db\u10d8\u10d0. \u2013 \u10db\u10d4 \u10db\u10d2\u10dd\u10dc\u10d8, \u10d2\u10d4\u10e8\u10da\u10d4\u10d1\u10d0\u10d7. \u10d0\u10d8 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8. \u2013 \u10dc\u10d0\u10ee\u10d4\u10d7, \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8 \u10db\u10d4-12 \u10e0\u10d8\u10d2\u10e8\u10d8\u10d0. \u2013 \u10d0\u10d1\u10d0, \u10d4\u10e1 \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10e0\u10d8\u10d2\u10d8\u10d0? \u10dc\u10e3\u10d7\u10e3 \u10e8\u10d4\u10db\u10d4\u10e8\u10d0\u10da\u10d0? \u2013 \u10d3\u10d8\u10d0\u10ee! \u10d0\u10e5 \u10ec\u10d4\u10e0\u10d8\u10d0 \u2013 \u10db\u10d4-10 \u10e0\u10d8\u10d2\u10d8. \u2013 \u10db\u10d0\u10de\u10d0\u10e2\u10d8\u10d4\u10d7. \u10d0\u10ee\u10da\u10d0\u10d5\u10d4 \u10d2\u10d0\u10d3\u10d0\u10d5\u10d0\u10da, \u10e1\u10de\u10d4\u10e5\u10e2\u10d0\u10d9\u10da\u10d8\u10ea \u10db\u10d0\u10da\u10d4 \u10d8\u10ec\u10e7\u10d4\u10d1\u10d0. \u2013 \u10d0\u10e0\u10d0 \u10e3\u10e8\u10d0\u10d5\u10e1", "answerA": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d3\u10d4\u10e0\u10dd\u10d1\u10e8\u10d8", "answerB": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10e8\u10d8", "answerC": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10e4\u10dd\u10d8\u10d4\u10e8\u10d8", "answerD": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10e8\u10d8", "correctanswer": "C"}, {"questionid": 163, "questiontext": "- \u10d1) III.2.4. \u10d5\u10d8\u10e1\u10d7\u10d0\u10dc \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0. \u10d0\u10d3\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d0\u10e2\u10dd\u10e0\u10d8 \u10d1\u10e0\u10eb\u10d0\u10dc\u10d3\u10d4\u10d1\u10d8\u10d7? \u2013 \u10d3\u10d8\u10d0\u10ee, \u10d2\u10d8\u10e1\u10db\u10d4\u10dc\u10d7. \u2013 \u10dd\u10e0\u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10d0\u10dc\u10d8 \u10dc\u10dd\u10db\u10d4\u10e0\u10d8 \u10d2\u10d0\u10e5\u10d5\u10d7? \u2013 \u10d2\u10d5\u10d0\u10e5\u10d5\u10e1. \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8 \u10d3\u10e6\u10d8\u10d7 \u10d0\u10de\u10d8\u10e0\u10d4\u10d1\u10d7 \u10e9\u10d5\u10d4\u10dc\u10d7\u10d0\u10dc \u10d3\u10d0\u10e0\u10e9\u10d4\u10dc\u10d0\u10e1? \u2013 \u10ee\u10e3\u10d7\u10d8 \u10d3\u10e6\u10d8\u10d7. \u10db\u10d0\u10dc\u10e5\u10d0\u10dc\u10d8\u10e1 \u10d2\u10d0\u10e9\u10d4\u10e0\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d3 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0? \u2013 \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10d0\u10e5\u10d5\u10e1 \u10d9\u10d0\u10e0\u10d2\u10d0\u10d3 \u10d3\u10d0\u10ea\u10e3\u10da\u10d8 \u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8. \u2013 \u10d9\u10d0\u10e0\u10d2\u10d8\u10d0. \u10d8\u10dc\u10d4\u10d1\u10d4\u10d7 \u10e9\u10d5\u10d4\u10dc\u10d8 \u10de\u10d0\u10e1\u10de\u10dd\u10e0\u10e2\u10d4\u10d1\u10d8. \u2013 \u10d2\u10d0\u10d8\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d7, \u10e0\u10dd\u10db \u10d7\u10d0\u10dc\u10ee\u10d0\u10e8\u10d8 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e3\u10d6\u10db\u10d4 \u10e8\u10d4\u10d3\u10d8\u10e1. \u10e1\u10d0\u10d3\u10d8\u10da\u10d8\u10e1 \u10e1\u10d0\u10d9\u10d8\u10d7\u10ee\u10d8 \u10db\u10d4\u10dc\u10d4\u10ef\u10d4\u10e0\u10d7\u10d0\u10dc \u10e3\u10dc\u10d3\u10d0 \u10e8\u10d4\u10d0\u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d7. \u10e8\u10d4\u10d2\u10d8\u10eb\u10da\u10d8\u10d0\u10d7 \u10db\u10d8\u10d1\u10e0\u10eb\u10d0\u10dc\u10d3\u10d4\u10d7 \u10dc\u10dd\u10db\u10d4\u10e0\u10e8\u10d8, \u10d8\u10e5 \u10e2\u10d4\u10e5\u10dc\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d4\u10e0\u10e1\u10dd\u10dc\u10d0\u10da\u10d8 \u10d3\u10d0\u10d2\u10ee\u10d5\u10d3\u10d4\u10d1\u10d0\u10d7. \u2013 \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0", "answerA": "\u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d0\u10e1\u10d7\u10d0\u10dc", "answerB": "\u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10d0\u10d3\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d0\u10e2\u10dd\u10e0\u10d7\u10d0\u10dc", "answerC": "\u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10db\u10d4\u10dc\u10d4\u10ef\u10d4\u10e0\u10d7\u10d0\u10dc", "answerD": "\u10e2\u10d4\u10e5\u10dc\u10d8\u10d9\u10e3\u10e0 \u10de\u10d4\u10e0\u10e1\u10dd\u10dc\u10d0\u10da\u10d7\u10d0\u10dc", "correctanswer": "B"}, {"questionid": 164, "questiontext": "- \u10d1) III.2.5. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0. \u2013 \u10d2\u10d8\u10e1\u10db\u10d4\u10dc\u10d7. \u10e0\u10d8\u10d7 \u10e8\u10d4\u10db\u10d8\u10eb\u10da\u10d8\u10d0 \u10d3\u10d0\u10d2\u10d4\u10ee\u10db\u10d0\u10e0\u10dd\u10d7? \u2013 \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10d5\u10d4\u10eb\u10d4\u10d1\u10d7. \u10db\u10d4\u10e2\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc \u10d2\u10d5\u10d8\u10d7\u10ee\u10e0\u10d4\u10e1, \u10d0\u10db \u10e5\u10e3\u10e9\u10d0\u10d6\u10d4 \u10d0\u10e0\u10d8\u10e1\u10dd. \u2013 \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10d8 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10d7? \u2013 \u10e1\u10d0\u10db\u10ec\u10e3\u10ee\u10d0\u10e0\u10dd\u10d3, \u10d0\u10e0 \u10d2\u10d5\u10d0\u10ee\u10e1\u10dd\u10d5\u10e1. \u2013 \u10d4\u10e0\u10d7\u10d8 \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10d0 \u10d0\u10ee\u10da\u10dd\u10e1. \u10dd\u10e0\u10d0\u10e1\u10d8 \u10db\u10d4\u10e2\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d5\u10da\u10d0 \u10db\u10dd\u10d2\u10d8\u10ec\u10d4\u10d5\u10d7 \u10e4\u10d4\u10ee\u10d8\u10d7. \u2013 \u10de\u10d8\u10e0\u10d3\u10d0\u10de\u10d8\u10e0 \u10d5\u10d8\u10d0\u10e0\u10dd\u10d7? \u2013 \u10d3\u10d8\u10d0\u10ee, \u10db\u10d8\u10ec\u10d8\u10e1\u10e5\u10d5\u10d4\u10e8\u10d0 \u10d2\u10d0\u10d3\u10d0\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10e1 \u10d3\u10d0\u10d8\u10dc\u10d0\u10ee\u10d0\u10d5\u10d7, \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10ea \u10d8\u10e5\u10d5\u10d4\u10d0. \u2013 \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0, \u10dc\u10d0\u10ee\u10d5\u10d0\u10db\u10d3\u10d8\u10e1", "answerA": "\u10db\u10d4\u10e2\u10e0\u10dd\u10e8\u10d8", "answerB": "\u10db\u10d8\u10ec\u10d8\u10e1\u10e5\u10d5\u10d4\u10e8\u10d0 \u10d2\u10d0\u10d3\u10d0\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10d7\u10d0\u10dc", "answerC": "\u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10e8\u10d4\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10d7\u10d0\u10dc", "answerD": "\u10e5\u10e3\u10e9\u10d0\u10e8\u10d8", "correctanswer": "B"}, {"questionid": 165, "questiontext": "- \u10d3) 30 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.2.6. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0, \u10e1\u10d0\u10e9\u10e3\u10e5\u10d0\u10e0\u10d8 \u10db\u10d8\u10dc\u10d3\u10d0 \u10e8\u10d4\u10d5\u10d0\u10e0\u10e9\u10d8\u10dd \u10e3\u10ea\u10ee\u10dd\u10d4\u10da\u10d8 \u10e1\u10e2\u10e3\u10db\u10e0\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1. \u2013 \u10d0\u10e5 \u10e3\u10d0\u10db\u10e0\u10d0\u10d5\u10d8 \u10e1\u10e3\u10d5\u10d4\u10dc\u10d8\u10e0\u10d8\u10d0. \u10d1\u10d4\u10d5\u10e0\u10d8 \u10db\u10d0\u10d7\u10d2\u10d0\u10dc\u10d8 \u10ee\u10d4\u10da\u10dc\u10d0\u10d9\u10d4\u10d7\u10d8\u10d0. \u10d9\u10d4\u10e0\u10d0\u10db\u10d8\u10d9\u10e3\u10da\u10d8 \u10ed\u10e3\u10e0\u10ed\u10d4\u10da\u10d8\u10ea \u10d2\u10d5\u10d0\u10e5\u10d5\u10e1, \u10d3\u10d0\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10d4\u10e0\u10d4\u10d7. \u2013 \u10d5\u10ee\u10d4\u10d3\u10d0\u10d5, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10d8\u10ed\u10d8\u10e0\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10e6\u10d4\u10d1\u10d0. \u2013 \u10e5\u10d0\u10da\u10d1\u10d0\u10e2\u10dd\u10dc\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d7 \u10d7\u10e3 \u10db\u10d0\u10db\u10d0\u10d9\u10d0\u10ea\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1? \u2013 \u10e8\u10e3\u10d0 \u10ee\u10dc\u10d8\u10e1 \u10e5\u10d0\u10da\u10d1\u10d0\u10e2\u10dd\u10dc\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1. \u2013 \u10e8\u10d4\u10db\u10d8\u10eb\u10da\u10d8\u10d0 \u10d2\u10d8\u10e0\u10e9\u10d8\u10dd\u10d7 \u10d0\u10e0\u10e5\u10d4\u10dd\u10da\u10dd\u10d2\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10d4\u10e0 \u10d0\u10e6\u10db\u10dd\u10e9\u10d4\u10dc\u10d8\u10da\u10d8 \u10e1\u10d0\u10db\u10d9\u10d0\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e1\u10da\u10d4\u10d1\u10d8. \u10db\u10d0\u10d2\u10d0\u10da\u10d8\u10d7\u10d0\u10d3, \u10d4\u10e1. \u10d0\u10d8, \u10dc\u10d0\u10ee\u10d4\u10d7, \u10d4\u10e1\u10d4\u10ea \u10da\u10d0\u10db\u10d0\u10d6\u10d8\u10d0. \u2013 \u10dd\u10e0\u10d8\u10d5\u10d4 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10dd\u10db\u10ec\u10dd\u10dc\u10e1, \u10d0\u10d5\u10d8\u10e6\u10d4\u10d1. \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0 \u10e0\u10e9\u10d4\u10d5\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1. \u10e4\u10d0\u10e1\u10d8\u10ea \u10db\u10d8\u10e1\u10d0\u10e6\u10d4\u10d1\u10d8\u10d0. \u2013 \u10d8\u10dc\u10d4\u10d1\u10d4\u10d7, \u10dc\u10d0\u10ee\u10d5\u10d0\u10db\u10d3\u10d8\u10e1", "answerA": "\u10d0\u10e0\u10e5\u10d4\u10dd\u10da\u10dd\u10d2\u10d8\u10d8\u10e1 \u10db\u10e3\u10d6\u10d4\u10e3\u10db\u10e8\u10d8", "answerB": "\u10d9\u10d4\u10e0\u10d0\u10db\u10d8\u10d9\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10dd\u10e1\u10dc\u10dd\u10e8\u10d8", "answerC": "\u10e1\u10d0\u10db\u10d9\u10d0\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10ec\u10d0\u10e0\u10db\u10dd\u10e8\u10d8", "answerD": "\u10e1\u10e3\u10d5\u10d4\u10dc\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1 \u10db\u10d0\u10e6\u10d0\u10d6\u10d8\u10d0\u10e8\u10d8", "correctanswer": "D"}, {"questionid": 166, "questiontext": "- \u10d3) III.2.7. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0, \u10da\u10d4\u10e5\u10e1\u10d8\u10d9\u10dd\u10dc\u10d4\u10d1\u10d8 \u10d2\u10d0\u10e5\u10d5\u10d7? \u2013 \u10da\u10d4\u10e5\u10e1\u10d8\u10d9\u10dd\u10dc\u10d8 \u10d1\u10d4\u10d5\u10e0\u10dc\u10d0\u10d8\u10e0\u10d8 \u10d2\u10d5\u10d0\u10e5\u10d5\u10e1. \u10d7\u10e5\u10d5\u10d4\u10dc \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d2\u10dc\u10d4\u10d1\u10d0\u10d5\u10d7? \u2013 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10d4\u10dc\u10d8\u10e1 \u10dd\u10e0\u10d7\u10dd\u10d2\u10e0\u10d0\u10e4\u10d8\u10e3\u10da\u10d8 \u10da\u10d4\u10e5\u10e1\u10d8\u10d9\u10dd\u10dc\u10d8. \u2013 \u10d3\u10d8\u10d0\u10ee, \u10d2\u10d5\u10d0\u10e5\u10d5\u10e1, \u10d0\u10ee\u10d0\u10da\u10d8 \u10d2\u10d0\u10db\u10dd\u10ea\u10d4\u10db\u10d0\u10d0. \u10d0\u10d8, \u10d0\u10db \u10d7\u10d0\u10e0\u10dd\u10d6\u10d4 \u10d0\u10ec\u10e7\u10d5\u10d8\u10d0. \u2013 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10d9\u10d0\u10e0\u10d2\u10d8, \u10e1\u10ee\u10d5\u10d0\u10d2\u10d0\u10dc \u10d5\u10d4\u10e0\u10e1\u10d0\u10d3 \u10d5\u10dc\u10d0\u10ee\u10d4. \u10da\u10d4\u10e5\u10e1\u10d8\u10d9\u10dd\u10dc\u10e1\u10d0\u10ea \u10d0\u10d5\u10d8\u10e6\u10d4\u10d1 \u10d3\u10d0 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10ee\u10d0\u10da\u10ee\u10e3\u10e0\u10d8 \u10d6\u10e6\u10d0\u10de\u10e0\u10d4\u10d1\u10d8\u10e1 \u10d0\u10db \u10d8\u10da\u10e3\u10e1\u10e2\u10e0\u10d8\u10e0\u10d4\u10d1\u10e3\u10da \u10d9\u10e0\u10d4\u10d1\u10e3\u10da\u10e1\u10d0\u10ea. \u10e1\u10d0\u10db\u10d8 \u10ec\u10da\u10d8\u10e1 \u10e8\u10d5\u10d8\u10da\u10d8\u10e8\u10d5\u10d8\u10da\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10db\u10d8\u10dc\u10d3\u10d0. \u2013 \u10d9\u10d0\u10e0\u10d2\u10d8 \u10e1\u10d0\u10e9\u10e3\u10e5\u10d0\u10e0\u10d8\u10d0. \u10d8\u10dc\u10d4\u10d1\u10d4\u10d7, \u10d7\u10d0\u10dc\u10ee\u10d0 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8 \u10d2\u10d0\u10d3\u10d0\u10d8\u10ee\u10d0\u10d3\u10d4\u10d7", "answerA": "\u10d1\u10d8\u10d1\u10da\u10d8\u10dd\u10d7\u10d4\u10d9\u10d0\u10e8\u10d8", "answerB": "\u10d2\u10d0\u10db\u10dd\u10db\u10ea\u10d4\u10db\u10da\u10dd\u10d1\u10d0\u10e8\u10d8", "answerC": "\u10e1\u10e3\u10d5\u10d4\u10dc\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1 \u10db\u10d0\u10e6\u10d0\u10d6\u10d8\u10d0\u10e8\u10d8", "answerD": "\u10ec\u10d8\u10d2\u10dc\u10d4\u10d1\u10d8\u10e1 \u10db\u10d0\u10e6\u10d0\u10d6\u10d8\u10d0\u10e8\u10d8", "correctanswer": "D"}, {"questionid": 167, "questiontext": "- \u10d3) III.2.8. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10db\u10d0\u10d8\u10d0, \u10db\u10dd\u10d3\u10d8 \u10ec\u10d0\u10d5\u10d8\u10d9\u10d8\u10d7\u10ee\u10dd\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10e1\u10de\u10d4\u10e5\u10e2\u10d0\u10d9\u10da\u10d4\u10d1\u10d8\u10e1 \u10dc\u10d0\u10ee\u10d5\u10d0\u10e1 \u10e8\u10d4\u10d5\u10eb\u10da\u10d4\u10d1\u10d7 \u10d0\u10db \u10d3\u10e6\u10d4\u10d4\u10d1\u10e8\u10d8. \u2013 \u10d0\u10d8 \u10ee\u10d5\u10d0\u10da\u10d8\u10e1 \u10e1\u10de\u10d4\u10e5\u10e2\u10d0\u10d9\u10da\u10d4\u10d1\u10d8\u10ea. \u10e8\u10d4\u10d2\u10d5\u10d8\u10eb\u10da\u10d8\u10d0 \u201e\u10ef\u10d8\u10dc\u10e1\u10d4\u10d1\u10d8\u10e1 \u10d7\u10d0\u10dd\u10d1\u10d0\u201c \u10d5\u10dc\u10d0\u10ee\u10dd\u10d7. \u10e1\u10d0\u10e6\u10d0\u10db\u10dd\u10e1 \u10e0\u10d5\u10d0 \u10e1\u10d0\u10d0\u10d7\u10d6\u10d4 \u10d8\u10ec\u10e7\u10d4\u10d1\u10d0. \u2013 \u10d4\u10e1 \u10e1\u10de\u10d4\u10e5\u10e2\u10d0\u10d9\u10da\u10d8 \u10dc\u10d0\u10dc\u10d0\u10ee\u10d8 \u10db\u10d0\u10e5\u10d5\u10e1. \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10dd\u10db\u10d4\u10ec\u10dd\u10dc\u10d0. \u10e8\u10d4\u10dc? \u2013 \u10d0\u10e0\u10d0, \u10d3\u10d8\u10d3\u10d8 \u10ee\u10d0\u10dc\u10d8\u10d0 \u10d7\u10d4\u10d0\u10e2\u10e0\u10e8\u10d8 \u10d0\u10e0 \u10d5\u10e7\u10dd\u10e4\u10d8\u10da\u10d5\u10d0\u10e0. \u2013 \u10db\u10d0\u10e8\u10d8\u10dc \u10dc\u10e3 \u10d2\u10d0\u10d3\u10d0\u10d5\u10d3\u10d4\u10d1\u10d7, \u10d0\u10ee\u10da\u10d0\u10d5\u10d4 \u10e8\u10d4\u10d5\u10d8\u10d3\u10d4\u10d7 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8 \u10d3\u10d0 \u10d0\u10d5\u10d8\u10e6\u10dd\u10d7 \u10d1\u10d8\u10da\u10d4\u10d7\u10d4\u10d1\u10d8. \u10db\u10d4 \u10db\u10d4\u10dd\u10e0\u10d4\u10d3\u10d0\u10ea \u10e1\u10d8\u10d0\u10db\u10dd\u10d5\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d5\u10dc\u10d0\u10ee\u10d0\u10d5. \u2013 \u10d9\u10d0\u10e0\u10d2\u10d8, \u10d0\u10d5\u10d8\u10e6\u10dd\u10d7. \u10d8\u10ea\u10dd\u10d3\u10d4, \u10db\u10d4 \u10d2\u10de\u10d0\u10e2\u10d8\u10df\u10d4\u10d1. \u2013 \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0, \u10d0\u10db\u10ef\u10d4\u10e0\u10d0\u10d3 \u10d0\u10e1\u10d4 \u10d8\u10e7\u10dd\u10e1. \u10e8\u10d4\u10db\u10d3\u10d4\u10d2\u10e8\u10d8 \u10db\u10d4 \u10d3\u10d0\u10d2\u10de\u10d0\u10e2\u10d8\u10df\u10d4\u10d1", "answerA": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10d0\u10e4\u10d8\u10e8\u10d0\u10e1\u10d7\u10d0\u10dc", "answerB": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10d7\u10d0\u10dc", "answerC": "\u10d7\u10d4\u10d0\u10e2\u10e0\u10d8\u10e1 \u10de\u10d0\u10e0\u10 d2\u10d8\u10d9\u10d5\u10d4\u10d7\u10dd\u10d7, \u10e0\u10d0\u10db\u10d3\u10d4\u10dc \u10ee\u10d0\u10dc\u10e8\u10d8 \u10d8\u10e5\u10dc\u10d4\u10d1\u10d0 \u10db\u10d6\u10d0\u10d3? \u2013 10-15 \u10ec\u10e3\u10d7\u10e8\u10d8 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0\u10d8 \u10e8\u10d4\u10d9\u10d5\u10d4\u10d7\u10d0 \u10d2\u10d5\u10d0\u10e5\u10d5\u10e1 \u10db\u10d6\u10d0\u10d3. \u2013 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10d9\u10d0\u10e0\u10d2\u10d8. \u10db\u10d0\u10e8\u10d8\u10dc \u10e9\u10d0\u10d8\u10ec\u10d4\u10e0\u10d4\u10d7. \u2013 \u10d0\u10ee\u10da\u10d0\u10d5\u10d4. \u10d2\u10d8\u10e1\u10db\u10d4\u10dc\u10d7", "answerA": "\u10d0\u10d8\u10d5\u10d0\u10dc\u10d6\u10d4", "answerB": "\u10dd\u10ef\u10d0\u10ee\u10e8\u10d8", "answerC": "\u10de\u10d8\u10d9\u10dc\u10d8\u10d9\u10d6\u10d4", "answerD": "\u10e0\u10d4\u10e1\u10e2\u10dd\u10e0\u10d0\u10dc\u10e8\u10d8", "correctanswer": "B"}, {"questionid": 170, "questiontext": "- \u10d3) III.2.11. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10db\u10d0\u10e0\u10d8\u10d0\u10db, \u10d0\u10ef\u10dd\u10d1\u10d4\u10d1\u10e1 \u10db\u10d8\u10ec\u10d8\u10e1\u10e5\u10d5\u10d4\u10e8\u10d0 \u10d2\u10d0\u10d3\u10d0\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10d8\u10d7 \u10d5\u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10d7, \u10db\u10d4\u10e2\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc\u10d0\u10d0. \u2013 \u10d0\u10e5\u10d5\u10d4 \u201e\u10d6\u10d4\u10d1\u10e0\u10d0\u10d0\u201c \u2013 \u10e1\u10d0\u10e4\u10d4\u10ee\u10db\u10d0\u10d5\u10da\u10dd \u10d2\u10d0\u10d3\u10d0\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10d8, \u10e8\u10e3\u10e5\u10dc\u10d8\u10e8\u10d0\u10dc\u10d8\u10ea\u10d0\u10d0. \u10db\u10d4\u10e2\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc \u10e0\u10d0 \u10d2\u10d5\u10d8\u10dc\u10d3\u10d0? \u2013 \u10e3\u10d8, \u10e8\u10e3\u10e5\u10dc\u10d8\u10e8\u10d0\u10dc\u10d8 \u10d5\u10d4\u10e0\u10ea \u10d9\u10d8 \u10e8\u10d4\u10d5\u10 u10e8\u10d8 III.2.12. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10e3\u10d9\u10d0\u10ea\u10e0\u10d0\u10d5\u10d0\u10d3, \u10ee\u10dd\u10db \u10d5\u10d4\u10e0 \u10db\u10d4\u10e2\u10e7\u10d5\u10d8\u10d7, \u10e1\u10e2\u10d0\u10d3\u10d8\u10dd\u10dc\u10d8 \u10e8\u10dd\u10e0\u10e1\u10d0\u10d0 \u10d0\u10db \u10db\u10d4\u10e2\u10e0\u10dd\u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8\u10d3\u10d0\u10dc? \u2013 \u10d0\u10e0\u10ea \u10d8\u10e1\u10d4, \u10de\u10d0\u10e0\u10d0\u10da\u10d4\u10da\u10e3\u10e0 \u10e5\u10e3\u10e9\u10d0\u10d6\u10d4\u10d0. \u2013 \u10d7\u10e3 \u10d0\u10e0 \u10e8\u10d4\u10ec\u10e3\u10ee\u10d3\u10d4\u10d1\u10d8\u10d7, \u10db\u10d8\u10d7\u10ee\u10d0\u10e0\u10d8\u10d7, \u10d8\u10e5\u10d0\u10db\u10d3\u10d4 \u10e0\u10dd\u10d2\u10dd\u10e0 \u10db\u10d8\u10d5\u10d8\u10d3\u10d4. \u2013 \u10de\u10d8\u10e0\u10d3\u10d0\u10de\u10d8\u10e0 \u10d8\u10d0\u10e0\u10d4\u10d7. \u10e8\u10e3\u10e5\u10dc\u10d8\u10e8\u10d0\u10dc\u10d7\u10d0\u10dc \u10db\u10dd\u10de\u10d8\u10e0\u10d3\u10d0\u10de\u10d8\u10e0\u10d4 \u10db\u10ee\u10d0\u10e0\u10d4\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ee\u10d5\u10d0\u10da\u10d7. \u10d8\u10e5\u10d5\u10d4, \u10d9\u10e3\u10d7\u10ee\u10d4\u10e8\u10d8, \u10d0\u10e4\u10d7\u10d8\u10d0\u10e5\u10d8\u10d0. \u10e5\u10e3\u10e9\u10d0\u10e1 \u10d6\u10d4\u10d5\u10d8\u10d7 \u10d0\u10e3\u10e7\u10d4\u10d5\u10d8\u10d7 \u10d3\u10d0 \u10ee\u10d4\u10da\u10db\u10d0\u10e0\u10ef\u10d5\u10dc\u10d8\u10d5 \u10e1\u10e2\u10d0\u10d3\u10d8\u10dd\u10dc\u10e1 \u10d3\u10d0\u10d8\u10dc\u10d0\u10ee\u10d0\u10d5\u10d7. \u2013 \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0. \u2013 \u10d0\u10e0\u10d0\u10e4\u10e0\u10d8\u10e1", "answerA": "\u10d0\u10e4\u10d7\u10d8\u10d0\u10e5\u10d7\u10d0\u10dc", "answerB": "\u10db\u10d4\u10e2\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "answerC": "\u10e1\u10e2\u10d0\u10d3\u10d8\u10dd\u10dc\u10d7\u10d0\u10dc", "answerD": "\u10e8\u10e3\u10e5\u10dc\u10d8\u 0d0\u10d8\u10e6\u10d4\u10d1\u10e1 \u10d3\u10d0 \u10d2\u10d0\u10d3\u10db\u10dd\u10d2\u10ea\u10d4\u10db\u10d7. \u2013 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0", "answerA": "\u10d4\u10e5\u10d7\u10d0\u10dc\u10d7\u10d0\u10dc", "answerB": "\u10d4\u10e5\u10d8\u10db\u10d7\u10d0\u10dc", "answerC": "\u10e0\u10d4\u10d2\u10d8\u10e1\u10e2\u10e0\u10d0\u10e2\u10dd\u10e0\u10d7\u10d0\u10dc", "answerD": "\u10e0\u10d4\u10dc\u10e2\u10d2\u10d4\u10dc\u10dd\u10da\u10dd\u10d2\u10d7\u10d0\u10dc", "correctanswer": "B"}, {"questionid": 173, "questiontext": "- \u10d2) III.2.14. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d0\u10d3 \u10ee\u10d0\u10e0\u10d7 \u10e9\u10d5\u10d4\u10dc\u10e1 \u10d1\u10d8\u10d1\u10da\u10d8\u10dd\u10d7\u10d4\u10d9\u10d0\u10e8\u10d8? \u2013 \u10d0\u10e0\u10d0, \u10e8\u10d0\u10e0\u10e8\u10d0\u10dc \u10d5\u10d8\u10e7\u10d0\u10d5\u10d8 \u10e9\u10d0\u10ec\u10d4\u10e0\u10d8\u10da\u10d8. \u10e1\u10d0\u10db\u10ec\u10e3\u10ee\u10d0\u10e0\u10dd\u10d3, \u10d1\u10d0\u10e0\u10d0\u10d7\u10d8 \u10d3\u10d0\u10db\u10d4\u10d9\u10d0\u10e0\u10d2\u10d0. \u2013 \u10d2\u10d5\u10d0\u10e0\u10d8 \u10db\u10d8\u10d7\u10ee\u10d0\u10e0\u10d8\u10d7. \u10d4\u10d2\u10d4\u10d1 \u10e1\u10d0\u10e0\u10d4\u10d2\u10d8\u10e1\u10e2\u10e0\u10d0\u10ea\u10d8\u10dd \u10df\u10e3\u10e0\u10dc\u10d0\u10da\u10e8\u10d8 \u10d5\u10d8\u10de\u10dd\u10d5\u10dd \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10db\u10dd\u10dc\u10d0\u10ea\u10d4\u10db\u10d4\u10d1\u10d8. \u2013 \u10db\u10e3\u10db\u10da\u10d0\u10eb\u10d4 \u10d2\u10d8\u10dd\u10e0\u10d2\u10d8. \u2013 \u10d5\u10dc\u10d0\u10ee\u10d4. \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10d1\u10d0\u10e0\u10d0\u10d7\u10d8 \u10d5\u10d0\u10d3\u10d0\u10d2\u10d0\u10e1\u10e3\u10da\u10d8\u10d0. \u10e0\u10d4\u10d2\u10d8\u10e1\u10e2\u10e0\u10d0\u10ea\u10d8\u10d0 \u10d7\u10d0\u10d5\u10d8\u10d3\u10d0\u10dc \u10e3\u10dc\u10d3\u10d0 \u10d2\u10d0\u10d8\u10d0\u10e0\u10dd\u10d7. \u2013 \u10d0\u10d8, \u10e9\u10d4\u10db\u10d8 \u10de\u10d8\u10e0\u10d0\u10d3\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10ec\u10db\u10dd\u10d1\u10d0. \u2013 \u10d8\u10dc\u10d4\u10d1\u10d4\u10d7 \u10d1\u10d0\u10e0\u10d0\u10d7\u10d8. \u10d0\u10ee\u10d0\u10da\u10d8 \u10ec\u10d8\u10d2\u10dc\u10d4\u10d1\u10d8 \u10d0\u10db \u10e1\u10e2\u10d4\u10dc\u10d3\u10d6\u10d4\u10d0 \u10d2\u10d0\u10db\u10dd\u10e4\u10d4\u10dc\u10d8\u10da\u10d8, \u10d0\u10e5\u10d5\u10d4\u10d0 \u10ec\u10d8\u10d2\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d9\u10d0\u10e2\u10d0\u10da\u10dd\u10d2\u10d8\u10ea. \u10e8\u10d4\u10d2\u10d8\u10eb\u10da\u10d8\u10d0\u10d7 \u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10d7 \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10d8\u10d7 \u10d0\u10dc \u10ec\u10d8\u10d2\u10dc\u10d8 \u10e8\u10d8\u10dc \u10ec\u10d0\u10d8\u10e6\u10dd\u10d7. \u2013 \u10d9\u10d0\u10e2\u10d0\u10da\u10dd\u10d2\u10e8\u10d8 \u10db\u10dd\u10d5\u10dc\u10d0\u10ee\u10d0\u10d5 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd \u10ec\u10d8\u10d2\u10dc\u10e1. \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10e8\u10d8 \u10d5\u10d8\u10db\u10e3\u10e8\u10d0\u10d5\u10d4\u10d1", "answerA": "\u10d1\u10d8\u10d1\u10da\u10d8\u10dd\u10d7\u10d4\u10d9\u10d8\u10e1 \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10e8\u10d8", "answerB": "\u10d1\u10d8\u10d1\u10da\u10d8\u10dd\u10d7\u10d4\u10d9\u10d8\u10e1 \u10e0\u10d4\u10d2\u10d8\u10e1\u10e2\u10e0\u10d0\u10e2\u10e3\u10e0\u10d0\u10e8\u10d8", "answerC": "\u10ec\u10d8\u10d2\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10e4\u10d4\u10dc\u10d0\u10d6\u10d4", "answerD": "\u10ec\u10d8\u10d2\u10dc\u10d4\u10d1\u10d8\u10e1 \u10db\u10d0\u10e6\u10d0\u10d6\u10d8\u10d0\u10e8\u10d8", "correctanswer": "C"}, {"questionid": 174, "questiontext": "- \u10d1) 33 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.2.15. \u10d5\u10d8\u10e1\u10d7\u10d0\u10dc \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d3\u10d0\u10d1\u10e0\u10eb\u10d0\u10dc\u10d3\u10d8\u10d7. \u10e0\u10d0 \u10d2\u10d0\u10ec\u10e3\u10ee\u10d4\u10d1\u10d7? \u2013 \u10db\u10d4\u10dd\u10d7\u10ee\u10d4 \u10d3\u10e6\u10d4\u10d0 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10d0\u10ee\u10d5\u10d4\u10da\u10d4\u10d1\u10e1. \u2013 \u10db\u10d8\u10d0\u10db\u10d1\u10d4\u10d7, \u10e0\u10d0 \u10e1\u10d8\u10db\u10de\u10e2\u10dd\u10db\u10d4\u10d1\u10d8 \u10d2\u10e5\u10dd\u10dc\u10d3\u10d0\u10d7 \u10d7\u10d0\u10d5\u10d8\u10d3\u10d0\u10dc? \u2013 \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10d3\u10e6\u10d4\u10e1 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10d0\u10e6\u10d0\u10da\u10d8 \u10e1\u10d8\u10ea\u10ee\u10d4 \u10db\u10e5\u10dd\u10dc\u10d3\u10d0, \u10e1\u10d8\u10e1\u10e3\u10e1\u10e2\u10d4\u10e1 \u10d5\u10d2\u10e0\u10eb\u10dc\u10dd\u10d1\u10d3\u10d8. \u10dd\u10ef\u10d0\u10ee\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8 \u10e8\u10d8\u10dc \u10d0\u10e0 \u10d8\u10e7\u10d5\u10dc\u10d4\u10dc \u10d3\u10d0 \u10db\u10d4\u10d6\u10dd\u10d1\u10d4\u10da\u10db\u10d0 \u10d2\u10d0\u10db\u10dd\u10d8\u10eb\u10d0\u10ee\u10d0 \u10e1\u10d0\u10e1\u10ec\u10e0\u10d0\u10e4\u10dd \u10d3\u10d0\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d0. \u2013 \u10e0\u10d0 \u10d3\u10d0\u10dc\u10d8\u10e8\u10dc\u10e3\u10da\u10d4\u10d1\u10d0 \u10db\u10dd\u10d2\u10ea\u10d4\u10e1? \u2013 \u10dc\u10d4\u10db\u10e1\u10d8 \u10d2\u10d0\u10db\u10d8\u10d9\u10d4\u10d7\u10d4\u10e1, \u10e1\u10d8\u10ea\u10ee\u10d4 \u10d0\u10e6\u10d0\u10e0 \u10db\u10d0\u10e5\u10d5\u10e1, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10db\u10d0\u10ee\u10d5\u10d4\u10da\u10d4\u10d1\u10e1. \u10db\u10d8\u10e0\u10e9\u10d8\u10d4\u10e1 \u10d0\u10db\u10d1\u10e3\u10da\u10d0\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10db\u10d8\u10db\u10d4\u10db\u10d0\u10e0\u10d7\u10d0. \u2013 \u10d9\u10d0\u10e0\u10d2\u10d8, \u10d4\u10e5\u10d7\u10d0\u10dc\u10d8 \u10db\u10d8\u10db\u10d0\u10e0\u10d7\u10d5\u10d0\u10e1 \u10d3\u10d0\u10d2\u10d8\u10ec\u10d4\u10e0\u10d7 \u10e0\u10d0\u10d3\u10d8\u10dd\u10da\u10dd\u10d2\u10d7\u10d0\u10dc. \u2013 \u10d2\u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d7", "answerA": "\u10d0\u10db\u10d1\u10e3\u10da\u10d0\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d4\u10e5\u10d7\u10d0\u10dc\u10d7\u10d0\u10dc", "answerB": "\u10d0\u10db\u10d1\u10e3\u10da\u10d0\u10e2\u10dd\u10e0\u10d8\u10d8\u10e1 \u10d4\u10e5\u10d8\u10db\u10d7\u10d0\u10dc", "answerC": "\u10d4\u10e5\u10d8\u10db \u10e0\u10d0\u10d3\u10d8\u10dd\u10da\u10dd\u10d2\u10d7\u10d0\u10dc", "answerD": "\u10e1\u10d0\u10e1\u10ec\u10e0\u10d0\u10e4\u10dd\u10e1 \u10d4\u10e5\u10d8\u10db\u10d7\u10d0\u10dc", "correctanswer": "B"}, {"questionid": 175, "questiontext": "- \u10d1) III.2.16. \u10d5\u10d8\u10e1\u10d7\u10d0\u10dc \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10dc\u10d8\u10dc\u10dd, \u10e9\u10d4\u10db\u10dd \u10e1\u10d0\u10e7\u10d5\u10d0\u10e0\u10d4\u10da\u10dd, \u10d2\u10d8\u10da\u10dd\u10ea\u10d0\u10d5 \u10d3\u10d0\u10d1\u10d0\u10d3\u10d4\u10d1\u10d8\u10e1 \u10d3\u10e6\u10d4\u10e1! \u2013 \u10e0\u10d0 \u10da\u10d0\u10db\u10d0\u10d6\u10d8 \u10d7\u10d0\u10d8\u10d2\u10e3\u10da\u10d8\u10d0, \u10d3\u10d8\u10d3\u10d8 \u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d0. \u10d3\u10e6\u10d4\u10e1 \u10e9\u10d4\u10db\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10e1\u10e2\u10e3\u10db\u10d0\u10e0\u10d8 \u10ee\u10d0\u10e0, \u10e8\u10d4\u10db\u10dd\u10d1\u10e0\u10eb\u10d0\u10dc\u10d3\u10d8. \u2013 \u10db\u10d4\u10d2\u10dd\u10d1\u10e0\u10d4\u10d1\u10d8 \u10ef\u10d4\u10e0 \u10d0\u10e0 \u10db\u10dd\u10e1\u10e3\u10da\u10d0\u10dc? \u2013 \u10db\u10d0\u10da\u10d4 \u10db\u10dd\u10d5\u10da\u10d4\u10dc, \u10d4\u10e5\u10d5\u10e1\u10d8 \u10e1\u10d0\u10d0\u10d7\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1. \u2013 \u10d3\u10d4\u10d3\u10d0 \u10d3\u10d0 \u10db\u10d0\u10db\u10d0 \u10e1\u10d0\u10d3 \u10d0\u10e0\u10d8\u10d0\u10dc? \u2013 \u10db\u10d0\u10db\u10d0 \u10e1\u10d0\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10e8\u10d8\u10d0. \u10db\u10d4\u10d6\u10dd\u10d1\u10d4\u10da\u10db\u10d0 \u10e8\u10dd\u10d9\u10dd\u10da\u10d0\u10d3\u10d8\u10e1 \u10e2\u10dd\u10e0\u10e2\u10d8 \u10d2\u10d0\u10db\u10dd\u10db\u10d8\u10ea\u10ee\u10dd \u10d3\u10d0 \u10d3\u10d4\u10d3\u10d0 \u10db\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10e1\u10d0\u10e2\u10d0\u10dc\u10d0\u10d3 \u10d2\u10d0\u10d5\u10d8\u10d3\u10d0. \u10d0\u10d8, \u10d6\u10d0\u10e0\u10d8\u10ea. \u10db\u10d0\u10db\u10d8\u10d3\u10d0, \u10d7\u10e3 \u10d0\u10e0 \u10e8\u10d4\u10ec\u10e3\u10ee\u10d3\u10d4\u10d1\u10d8, \u10d9\u10d0\u10e0\u10d8 \u10d2\u10d0\u10d0\u10e6\u10d4. \u2013 \u10d0\u10da\u10d1\u10d0\u10d7 \u10e8\u10d4\u10dc\u10d8 \u10db\u10d4\u10d2\u10dd\u10d1\u10e0\u10d4\u10d1\u10d8 \u10d0\u10e0\u10d8\u10d0\u10dc", "answerA": "\u10d3\u10d4\u10d3\u10d0\u10e1\u10d7\u10d0\u10dc", "answerB": "\u10db\u10d0\u10db\u10d8\u10d3\u10d0\u10e1\u10d7\u10d0\u10dc", "answerC": "\u10db\u10d4\u10d2\u10dd\u10d1\u10e0\u10d4\u10d1\u10d7\u10d0\u10dc", "answerD": "\u10db\u10d4\u10d6\u10dd\u10d1\u10d4\u10da\u10d7\u10d0\u10dc", "correctanswer": "B"}, {"questionid": 176, "questiontext": "- \u10d1) III.2.17. \u10e0\u10dd\u10d3\u10d8\u10e1 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d8\u10db\u10d4\u10d3\u10d8\u10d0, \u10d9\u10d0\u10e0\u10d2\u10d8 \u10d9\u10dd\u10dc\u10ea\u10d4\u10e0\u10e2\u10d8 \u10d8\u10e5\u10dc\u10d4\u10d1\u10d0. \u10eb\u10da\u10d8\u10d5\u10e1 \u10d5\u10d8\u10e8\u10dd\u10d5\u10d4 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8. \u2013 \u10d0\u10d8 \u10de\u10e0\u10dd\u10d2\u10e0\u10d0\u10db\u10d0, \u10de\u10d8\u10e0\u10d5\u10d4\u10da \u10dc\u10d0\u10ec\u10d8\u10da\u10e8\u10d8 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d0\u10d3 \u10d4\u10e1\u10e2\u10e0\u10d0\u10d3\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10d8 \u10db\u10dd\u10db\u10e6\u10d4\u10e0\u10da\u10d4\u10d1\u10d8 \u10d2\u10d0\u10db\u10dd\u10d3\u10d8\u10d0\u10dc. \u2013 \u10e0\u10dd\u10d2\u10dd\u10e0\u10ea \u10d5\u10d8\u10ea\u10d8, \u10e3\u10ea\u10ee\u10dd\u10d4\u10da\u10d8 \u10db\u10dd\u10db\u10e6\u10d4\u10e0\u10da\u10d4\u10d1\u10d8\u10ea \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d4\u10dc. \u2013 \u10d9\u10d8, \u10e8\u10d4\u10e1\u10d5\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2, \u10d9\u10dd\u10dc\u10ea\u10d4\u10e0\u10e2\u10d8\u10e1 \u10db\u10d4\u10dd\u10e0\u10d4 \u10dc\u10d0\u10ec\u10d8\u10da\u10e8\u10d8. \u2013 \u10d3\u10d8\u10d3\u10d8 \u10ee\u10d0\u10dc\u10d8\u10d0 \u10d0\u10e1\u10d4\u10d7 \u10d9\u10dd\u10dc\u10ea\u10d4\u10e0\u10e2\u10d6\u10d4 \u10d0\u10e0 \u10d5\u10e7\u10dd\u10e4\u10d8\u10da\u10d5\u10d0\u10e0, \u10e1\u10d8\u10d0\u10db\u10dd\u10d5\u10dc\u10d4\u10d1\u10d8\u10d7 \u10ec\u10d0\u10db\u10dd\u10d5\u10d4\u10d3\u10d8. \u2013 \u10db\u10dd\u10d3\u10d8 \u10e8\u10d4\u10d5\u10d8\u10d3\u10d4\u10d7 \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10e8\u10d8, \u10d0\u10d3\u10d2\u10d8\u10da\u10d4\u10d1\u10d8 \u10d3\u10d0\u10d5\u10d8\u10d9\u10d0\u10d5\u10dd\u10d7. \u2013 \u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10d8\u10e1 \u10d2\u10d0\u10db\u10dd\u10e0\u10d7\u10d5\u10d0 \u10d0\u10e0 \u10d3\u10d0\u10d2\u10d5\u10d0\u10d5\u10d8\u10ec\u10e7\u10d3\u10d4\u10e1. \u2013 \u10d9\u10d0\u10e0\u10d2\u10d8\u10d0, \u10e0\u10dd\u10db \u10e8\u10d4\u10db\u10d0\u10ee\u10e1\u10d4\u10dc\u10d4. \u10d9\u10dd\u10dc\u10ea\u10d4\u10e0\u10e2\u10d8\u10e1 \u10e8\u10d4\u10db\u10d3\u10d4\u10d2 \u10e9\u10d4\u10db\u10d7\u10d0\u10dc \u10ec\u10d0\u10d5\u10d8\u10d3\u10d4\u10d7. \u2013 \u10d3\u10e6\u10d4\u10e1 \u10d0\u10e0\u10d0, \u10d2\u10d5\u10d8\u10d0\u10dc \u10d8\u10e5\u10dc\u10d4\u10d1\u10d0", "answerA": "\u10d1\u10d8\u10da\u10d4\u10d7\u10d8\u10e1 \u10d0\u10e6\u10d4\u10d1\u10d8\u10e1\u10d0\u10e1", "answerB": "\u10d9\u10dd\u10dc\u10ea\u10d4\u10e0\u10e2\u10d8\u10e1 \u10d3\u10d0\u10ec\u10e7\u10d4\u10d1\u10d0\u10db\u10d3\u10d4", "answerC": "\u10d9\u10dd\u10dc\u10ea\u10d4\u10e0\u10e2\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1", "answerD": "\u10e8\u10d4\u10e1\u10d5\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1", "correctanswer": "B"}, {"questionid": 177, "questiontext": "- \u10d1) 34 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 III.2.18. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0, \u10d7\u10e5\u10d5\u10d4\u10dc\u10d8 \u10e2\u10e3\u10e0\u10d8\u10e1\u10e2\u10e3\u10da\u10d8 \u10d1\u10d8\u10e3\u10e0\u10dd \u10db\u10d8\u10e0\u10e9\u10d8\u10d4\u10e1, \u10e1\u10d0\u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10dd \u10e2\u10e3\u10e0\u10d4\u10d1\u10e1 \u10d2\u10d4\u10d2\u10db\u10d0\u10d5\u10d4\u10dc\u10dd. \u2013 \u10d2\u10d8\u10e1\u10db\u10d4\u10dc\u10d7, \u10e1\u10d0\u10d3 \u10d0\u10de\u10d8\u10e0\u10d4\u10d1\u10d7 \u10d2\u10d0\u10db\u10d2\u10d6\u10d0\u10d5\u10e0\u10d4\u10d1\u10d0\u10e1 \u10d3\u10d0 \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8 \u10ee\u10dc\u10d8\u10d7? \u2013 \u10dd\u10e0\u10d8 \u10d9\u10d5\u10d8\u10e0\u10d8\u10d7 \u10db\u10d8\u10dc\u10d3\u10d0 \u10e1\u10d0\u10d1\u10d4\u10e0\u10eb\u10dc\u10d4\u10d7\u10e8\u10d8 \u10d2\u10d0\u10d5\u10e4\u10e0\u10d8\u10dc\u10d3\u10d4. \u10d3\u10d0\u10e1\u10d5\u10d4\u10dc\u10d4\u10d1\u10d0\u10ea \u10e3\u10dc\u10d3\u10d0 \u10db\u10dd\u10d5\u10d0\u10e1\u10ec\u10e0\u10dd \u10d3\u10d0 \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10e3\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10dc\u10d0\u10ee\u10e3\u10da\u10d4\u10d1\u10d0\u10ea. \u2013 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10da\u10d0\u10d3 \u10d3\u10d0\u10d2\u10d4\u10ee\u10db\u10d0\u10e0\u10d4\u10d1\u10d8\u10d7. \u10d8\u10e1\u10d4\u10d7 \u10e2\u10e3\u10e0\u10e1 \u10e8\u10d4\u10d2\u10d8\u10e0\u10e9\u10d4\u10d5\u10d7, \u10d9\u10db\u10d0\u10e7\u10dd\u10e4\u10d8\u10da\u10d8 \u10d3\u10d0\u10e0\u10e9\u10d4\u10d1\u10d8\u10d7. \u2013 \u10d8\u10dc\u10d4\u10d1\u10d4\u10d7 \u10e9\u10d4\u10db\u10d8 \u10de\u10d0\u10e1\u10de\u10dd\u10e0\u10e2\u10d8. \u2013 \u10d7\u10d5\u10d8\u10d7\u10db\u10e4\u10e0\u10d8\u10dc\u10d0\u10d5\u10d8\u10e1 \u10d1\u10d8\u10da\u10d4\u10d7\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10ee\u10d5\u10d0 \u10db\u10dd\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d1\u10e3\u10d7\u10d4\u10d1\u10e1 \u10d2\u10d0\u10d5\u10d0\u10e4\u10dd\u10e0\u10db\u10d4\u10d1 \u10d3\u10d0 \u10e1\u10d0\u10d5\u10d0\u10e0\u10d0\u10e3\u10d3\u10dd \u10d7\u10d0\u10dc\u10ee\u10d0\u10e1\u10d0\u10ea \u10d2\u10d4\u10e2\u10e7\u10d5\u10d8\u10d7. \u2013 \u10e1\u10d0\u10e1\u10e2\u10e3\u10db\u10e0\u10dd\u10e1 \u10dc\u10dd\u10db\u10d4\u10e0\u10d8\u10ea \u10ee\u10dd\u10db \u10e8\u10d4\u10d3\u10d8\u10e1 \u10db\u10dd\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8? \u2013 \u10e0\u10d0 \u10d7\u10e5\u10db\u10d0 \u10e3\u10dc\u10d3\u10d0, \u10d0\u10ee\u10da\u10d0\u10d5\u10d4 \u10e7\u10d5\u10d4\u10da\u10d0\u10e4\u10d4\u10e0\u10e1 \u10d2\u10d0\u10d2\u10d0\u10ea\u10dc\u10dd\u10d1\u10d7. \u2013 \u10d2\u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d7", "answerA": "\u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10d8\u10e1 \u10e0\u10d4\u10d2\u10d8\u10e1\u10e2\u10e0\u10d0\u10e2\u10e3\u10e0\u10d0\u10e8\u10d8", "answerB": "\u10d1\u10d8\u10da\u10d4\u10d7\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "answerC": "\u10e1\u10d0\u10de\u10d0\u10e1\u10de\u10dd\u10e0\u10e2\u10dd \u10d2\u10d0\u10dc\u10e7\u10dd\u10e4\u10d8\u10da\u10d4\u10d1\u10d0\u10e8\u10d8", "answerD": "\u10e2\u10e3\u10e0\u10d8\u10e1\u10e2\u10e3\u10da \u10d1\u10d8\u10e3\u10e0\u10dd\u10e8\u10d8", "correctanswer": "B"}, {"questionid": 178, "questiontext": "- \u10d3) III.2.19. \u10d5\u10d8\u10e1\u10d7\u10d0\u10dc \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0, \u10d9\u10d0\u10dc\u10ea\u10d4\u10da\u10d0\u10e0\u10d8\u10d0 \u10d0\u10e5 \u10d0\u10e0\u10d8\u10e1? \u10d7\u10e5\u10d5\u10d4\u10dc \u10d1\u10e0\u10eb\u10d0\u10dc\u10d3\u10d4\u10d1\u10d8\u10d7 \u10e3\u10e4\u10e0\u10dd\u10e1\u10d8? \u2013 \u10d3\u10d8\u10d0\u10ee, \u10db\u10dd\u10d1\u10e0\u10eb\u10d0\u10dc\u10d3\u10d8\u10d7. \u10e0\u10d0 \u10d2\u10dc\u10d4\u10d1\u10d0\u10d5\u10d7? \u2013 \u10d7\u10e5\u10d5\u10d4\u10dc\u10d7\u10d0\u10dc \u10d5\u10d0\u10d9\u10d0\u10dc\u10e1\u10d8\u10d0 \u10d2\u10d0\u10db\u10dd\u10ea\u10ee\u10d0\u10d3\u10d3\u10d0 \u10d3\u10d0 \u10d9\u10dd\u10dc\u10d9\u10e3\u10e0\u10e1\u10e8\u10d8 \u10d5\u10d0\u10de\u10d8\u10e0\u10d4\u10d1 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0\u10e1. \u10e1\u10d0\u10d1\u10e3\u10d7\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10d1\u10d0\u10e0\u10d4\u10d1\u10d0 \u10db\u10d8\u10dc\u10d3\u10d0. \u2013 \u10d3\u10d4\u10e0\u10d4\u10e4\u10d0\u10dc\u10e8\u10d8\u10d0 \u10d2\u10d0\u10db\u10dd\u10d9\u10e0\u10e3\u10da\u10d8 \u10e1\u10d0\u10d1\u10e3\u10d7\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10dc\u10d0\u10d7\u10d5\u10d0\u10da\u10d8, \u10d2\u10d0\u10d3\u10d0\u10d0\u10db\u10dd\u10ec\u10db\u10d4\u10d7. \u2013 \u10d3\u10d8\u10d0\u10ee, \u10e3\u10d9\u10d5\u10d4 \u10e8\u10d4\u10d5\u10d0\u10db\u10dd\u10ec\u10db\u10d4. \u10d4\u10e1 \u10e1\u10d0\u10d1\u10e3\u10d7\u10d4\u10d1\u10d8 \u10d7\u10e5\u10d5\u10d4\u10dc \u10d3\u10d0\u10d2\u10d8\u10e2\u10dd\u10d5\u10dd\u10d7? \u2013 \u10e4\u10d0\u10d8\u10da\u10e8\u10d8 \u10e9\u10d0\u10d3\u10d4\u10d7 \u10d3\u10d0 \u10db\u10d3\u10d8\u10d5\u10d0\u10dc\u10e1 \u10e9\u10d0\u10d0\u10d1\u10d0\u10e0\u10d4\u10d7. \u10d4\u10e0\u10d7 \u10d9\u10d5\u10d8\u10e0\u10d0\u10e8\u10d8 \u10d9\u10dd\u10db\u10d8\u10e1\u10d8\u10d0 \u10d2\u10d0\u10dc\u10d8\u10ee\u10d8\u10da\u10d0\u10d5\u10e1 \u10d3\u10d0 \u10de\u10d0\u10e1\u10e3\u10ee\u10e1 \u10e8\u10d4\u10d2\u10d0\u10e2\u10e7\u10dd\u10d1\u10d8\u10dc\u10d4\u10d1\u10d7. \u2013 \u10d2\u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d7. \u10dc\u10d0\u10ee\u10d5\u10d0\u10db\u10d3\u10d8\u10e1", "answerA": "\u10d9\u10d0\u10dc\u10ea\u10d4\u10da\u10d0\u10e0\u10d8\u10d8\u10e1 \u10db\u10d3\u10d8\u10d5\u10d0\u10dc\u10d7\u10d0\u10dc", "answerB": "\u10d9\u10d0\u10dc\u10ea\u10d4\u10da\u10d0\u10e0\u10d8\u10d8\u10e1 \u10e3\u10e4\u10e0\u10dd\u10e1\u10d7\u10d0\u10dc", "answerC": "\u10d9\u10dd\u10db\u10d8\u10e1\u10d8\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d7\u10d0\u10dc", "answerD": "\u10d9\u10dd\u10dc\u10d9\u10e3\u10e0\u10e1\u10d8\u10e1 \u10dd\u10e0\u10d2\u10d0\u10dc\u10d8\u10d6\u10d0\u10e2\u10dd\u10e0\u10d7\u10d0\u10dc", "correctanswer": "D"}, {"questionid": 179, "questiontext": "- \u10d1) III.2.20. \u10e1\u10d0\u10d3 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10e1\u10d0\u10e3\u10d1\u10d0\u10e0\u10d8? \u2013 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10dd\u10d1\u10d0, \u10d7\u10e5\u10d5\u10d4\u10dc\u10d7\u10d0\u10dc \u10ec\u10d0\u10db\u10da\u10d4\u10d1\u10d8 \u10e3\u10e0\u10d4\u10ea\u10d4\u10de\u10e2\u10dd\u10d3 \u10d2\u10d0\u10d8\u10ea\u10d4\u10db\u10d0? \u2013 \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d0\u10db\u10d0\u10da\u10d8 \u10d2\u10dc\u10d4\u10d1\u10d0\u10d5\u10d7? \u10e0\u10d0 \u10d2\u10d0\u10ec\u10e3\u10ee\u10d4\u10d1\u10d7? \u2013 \u10db\u10d0\u10ee\u10d5\u10d4\u10da\u10d4\u10d1\u10e1 \u10d3\u10d0 \u10e7\u10d4\u10da\u10d8\u10ea \u10db\u10e2\u10d9\u10d8\u10d5\u10d0. \u2013 \u10e0\u10d0\u10db\u10d3\u10d4\u10dc\u10d8\u10db\u10d4 \u10ec\u10d0\u10db\u10d0\u10da\u10d8 \u10d2\u10d5\u10d0\u10e5\u10d5\u10e1, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10d0\u10ef\u10dd\u10d1\u10d4\u10d1\u10e1, \u10d7\u10e3 \u10d9\u10da\u10d8\u10dc\u10d8\u10d9\u10d0\u10e8\u10d8 \u10d4\u10e5\u10d8\u10db\u10e1 \u10d2\u10d0\u10d4\u10e1\u10d8\u10dc\u10ef\u10d4\u10d1\u10d8\u10d7 \u10d3\u10d0 \u10ec\u10d0\u10db\u10d0\u10da\u10e1 \u10db\u10d8\u10e1\u10d8 \u10d3\u10d0\u10dc\u10d8\u10e8\u10dc\u10e3\u10da\u10d4\u10d1\u10d8\u10d7 \u10e8\u10d4\u10d8\u10eb\u10d4\u10dc\u10d7. \u2013 \u10d9\u10d0\u10e0\u10d2\u10d8, \u10db\u10d8\u10d5\u10d0\u10da. \u10db\u10d0\u10e8\u10d8\u10dc \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e7\u10d4\u10da\u10d8\u10e1 \u10e2\u10d9\u10d8\u10d5\u10d8\u10da\u10d8\u10e1 \u10ec\u10d0\u10db\u10d0\u10da\u10d8 \u10db\u10dd\u10db\u10d4\u10ea\u10d8\u10d7. \u2013 \u10d0\u10d8, \u10d4\u10e1 \u10d8\u10dc\u10d4\u10d1\u10d4\u10d7. \u10d3\u10e6\u10d4\u10e8\u10d8 \u10e1\u10d0\u10db\u10ef\u10d4\u10e0 \u10db\u10d8\u10d8\u10e6\u10d4\u10d7. \u10d7\u10d0\u10dc\u10ee\u10d0 \u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8 \u10d2\u10d0\u10d3\u10d0\u10d8\u10ee\u10d0\u10d3\u10d4\u10d7. \u2013 \u10d2\u10db\u10d0\u10d3\u10da\u10dd\u10d1\u10d7, \u10dc\u10d0\u10ee\u10d5\u10d0\u10db\u10d3\u10d8\u10e1", "answerA": "\u10d0\u10e4\u10d7\u10d8\u10d0\u10e5\u10e8\u10d8", "answerB": "\u10d4\u10e5\u10d8\u10db\u10d8\u10e1 \u10d9\u10d0\u10d1\u10d8\u10dc\u10d4\u10e2\u10e8\u10d8", "answerC": "\u10d9\u10da\u10d8\u10dc\u10d8\u10d9\u10d8\u10e1 \u10e0\u10d4\u10d2\u10d8\u10e1\u10e2\u10e0\u10d0\u10e2\u10e3\u10e0\u10d0\u10e8\u10d8", "answerD": "\u10e1\u10d0\u10da\u10d0\u10e0\u10dd\u10e8\u10d8", "correctanswer": "B"}, {"questionid": 180, "questiontext": "- \u10d0) 35 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e5\u10d0\u10e0\u10d7\u10e3\u10da \u10d4\u10dc\u10d0\u10e8\u10d8 3. \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10e3\u10da\u10d8 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8 III.3.1. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d0 \u10db\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10da\u10dd\u10d5\u10d0\u10dc\u10d8 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10e3\u10da-\u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10e3\u10da\u10d8 \u10eb\u10d4\u10d2\u10da\u10d8\u10d0. \u10d4\u10e1 \u10e3\u10eb\u10d5\u10d4\u10da\u10d4\u10e1\u10d8 \u10ea\u10d8\u10ee\u10d4\u10e1\u10d8\u10db\u10d0\u10d2\u10e0\u10d4 \u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4 \u10db\u10e2\u10d9\u10d5\u10d0\u10e0\u10e1 \u10d2\u10d0\u10d3\u10d0\u10f0\u10e7\u10e3\u10e0\u10d4\u10d1\u10e1. \u10da\u10d4\u10d2\u10d4\u10dc\u10d3\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10ea\u10d8\u10ee\u10d8\u10e1 \u10d0\u10d2\u10d4\u10d1\u10d0 \u10db\u10d4\u10e4\u10d4 \u10d5\u10d0\u10ee\u10e2\u10d0\u10dc\u10d2 \u10d2\u10dd\u10e0\u10d2\u10d0\u10e1\u10da\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10e1 \u10e3\u10d9\u10d0\u10d5\u10e8\u10d8\u10e0\u10d3\u10d4\u10d1\u10d0. \u10d8\u10e1\u10e2\u10dd\u10e0\u10d8\u10e3\u10da \u10ec\u10e7\u10d0\u10e0\u10dd\u10d4\u10d1\u10e8\u10d8 \u10d8\u10e1 \u10e8\u10e3\u10e0\u10d8\u10e1 \u10ea\u10d8\u10ee\u10d4\u10d3 \u10d0\u10e0\u10d8\u10e1 \u10db\u10dd\u10ee\u10e1\u10d4\u10dc\u10d8\u10d4\u10d1\u10e3\u10da\u10d8, \u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d0 \u10d9\u10d8 \u10db\u10dd\u10dc\u10e6\u10dd\u10da\u10d7\u10d0 \u10d1\u10d0\u10e2\u10dd\u10dc\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10d3\u10d0\u10d4\u10e0\u10e5\u10d5\u10d0. \u10e1\u10d8\u10e2\u10e7\u10d5\u10d0 \u201e\u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d0\u201c \u10db\u10ea\u10d8\u10e0\u10d4 \u10ea\u10d8\u10ee\u10d4\u10e1\u10d8\u10db\u10d0\u10d2\u10e0\u10d4\u10e1 \u10dc\u10d8\u10e8\u10dc\u10d0\u10d5\u10e1. \u10eb\u10dc\u10d4\u10da\u10d0\u10d3 \u10db\u10d8\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8 \u10d4\u10e1 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10d7\u10d8 \u10dc\u10d0\u10d2\u10d4\u10d1\u10dd\u10d1\u10d0 \u10d3\u10d0\u10d5\u10d8\u10d7 \u10d0\u10e6\u10db\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10da\u10d8\u10e1 \u10db\u10d4\u10e4\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10e1\u10d0\u10d9\u10db\u10d0\u10dd\u10d3 \u10d2\u10d0\u10e4\u10d0\u10e0\u10d7\u10dd\u10d5\u10d3\u10d0. \u10d8\u10d2\u10d8 \u10db\u10e2\u10d9\u10d8\u10ea\u10d4 \u10d9\u10d4\u10d3\u10da\u10d4\u10d1\u10d8\u10d7, \u10d9\u10dd\u10e8\u10d9\u10d4\u10d1\u10d8\u10d7\u10d0 \u10d3\u10d0 \u10d1\u10d0\u10e1\u10e2\u10d8\u10dd\u10dc\u10d4\u10d1\u10d8\u10d7 \u10d8\u10e7\u10dd \u10d2\u10d0\u10db\u10d0\u10d2\u10e0\u10d4\u10d1\u10e3\u10da\u10d8. \u10d0\u10d3\u10e0\u10d4\u10e3\u10da\u10d8 \u10db\u10e8\u10d4\u10dc\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10dc\u10d0\u10e8\u10d7\u10d4\u10d1\u10d8 \u10d3\u10e6\u10d4\u10e1\u10d0\u10ea \u10d0\u10e0\u10d8\u10e1 \u10e8\u10d4\u10db\u10dd\u10e0\u10e9\u10d4\u10dc\u10d8\u10da\u10d8 \u10ea\u10d8\u10ee\u10d8\u10e1 \u10d4\u10e0\u10d7\u10d4\u10e0\u10d7\u10d8 \u10d9\u10dd\u10e8\u10d9\u10d8\u10e1 \u10d9\u10d4\u10d3\u10da\u10d4\u10d1\u10e8\u10d8", "answerA": "\u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d8\u10e1 \u10eb\u10d5\u10d4\u10da\u10d8 \u10e1\u10d0\u10ee\u10d4\u10da\u10ec\u10dd\u10d3\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10e1\u10d0\u10ee\u10d4\u10d1 \u10e3\u10ea\u10dc\u10dd\u10d1\u10d8\u10d0", "answerB": "\u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d0 \u10e1\u10d0\u10d9\u10db\u10d0\u10dd\u10d3 \u10d2\u10d0\u10db\u10d0\u10d2\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10d7\u10d8 \u10dc\u10d0\u10d2\u10d4\u10d1\u10dd\u10d1\u10d0 \u10e7\u10dd\u10e4\u10d8\u10da\u10d0", "answerC": "\u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d8\u10e1 \u10d9\u10d4\u10d3\u10da\u10d4\u10d1\u10d8 \u10db\u10dd\u10dc\u10e6\u10dd\u10da\u10d7\u10d0 \u10d1\u10d0\u10e2\u10dd\u10dc\u10dd\u10d1\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10d2\u10d0\u10dc\u10d0\u10d3\u10d2\u10e3\u10e0\u10d4\u10d1\u10e3\u10da\u10d0", "answerD": "\u10ea\u10d8\u10ee\u10d4\u10e1\u10d8\u10db\u10d0\u10d2\u10e0\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u201e\u10dc\u10d0\u10e0\u10d8\u10e7\u10d0\u10da\u10d0\u201c \u10db\u10d4\u10e4\u10d4 \u10d3\u10d0\u10d5\u10d8\u10d7 \u10d0\u10e6\u10db\u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10d4\u10da\u10e1 \u10d3\u10d0\u10e3\u10e0\u10e5\u10db\u10d4\u10d5\u10d8\u10d0", "correctanswer": "A"}, {"questionid": 181, "questiontext": "- \u10d1) III.3.2. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8 \u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10db\u10d0 \u10e4\u10e3\u10dc\u10e5\u10ea\u10d8\u10dd\u10dc\u10d8\u10e0\u10d4\u10d1\u10d0 1923 \u10ec\u10d4\u10da\u10e1 \u10d3\u10d0\u10d8\u10ec\u10e7\u10dd. \u10d3\u10e6\u10d4\u10e1 \u10d8\u10d2\u10d8 \u10d9\u10d0\u10d5\u10d9\u10d0\u10e1\u10d8\u10d8\u10e1 \u10e0\u10d4\u10d2\u10d8\u10dd\u10dc\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d8 \u10d9\u10dd\u10db\u10d4\u10e0\u10ea\u10d8\u10e3\u10da\u10d8 \u10d3\u10d0 \u10e1\u10e2\u10e0\u10d0\u10e2\u10d4\u10d2\u10d8\u10e3\u10da\u10d8 \u10ea\u10d4\u10dc\u10e2\u10e0\u10d8\u10d0. \u10d0\u10e5 \u10e3\u10d0\u10db\u10e0\u10d0\u10d5\u10d8 \u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10e2\u10d5\u10d8\u10e0\u10d7\u10d8 \u10e8\u10d4\u10db\u10dd\u10d3\u10d8\u10e1 \u10d3\u10d0 \u10d2\u10d0\u10d3\u10d8\u10e1. \u10e1\u10d0\u10db\u10d0\u10e0\u10e8\u10e0\u10e3\u10e2\u10dd \u10ee\u10d0\u10d6\u10e1 \u2013 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8-\u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10d8-\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8 \u2013 \u10d4\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10d4\u10d1\u10d0 \u10d0\u10d5\u10e2\u10dd\u10d1\u10e3\u10e1\u10d8, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10d2\u10d0\u10e9\u10d4\u10e0\u10d4\u10d1\u10d0\u10ea \u10e9\u10d0\u10db\u10dd\u10e4\u10e0\u10d4\u10dc\u10d8\u10e1 \u10d3\u10d0\u10e0\u10d1\u10d0\u10d6\u10d8\u10e1 \u10d2\u10d0\u10e1\u10d0\u10e1\u10d5\u10da\u10d4\u10da\u10d7\u10d0\u10dc\u10d0\u10d0. \u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10ea\u10d4\u10dc\u10e2\u10e0\u10d0\u10db\u10d3\u10d4 \u10db\u10d2\u10d6\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0\u10e1 20-30 \u10ec\u10e3\u10d7\u10d8 \u10e1\u10ed\u10d8\u10e0\u10d3\u10d4\u10d1\u10d0. \u10e2\u10d4\u10e0\u10db\u10d8\u10dc\u10d0\u10da\u10d8\u10e1 \u10db\u10d8\u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d2\u10d0\u10d7\u10d5\u10da\u10d8\u10da\u10d8\u10d0 370 \u10d0\u10d5\u10e2\u10dd\u10db\u10dd\u10d1\u10d8\u10da\u10d6\u10d4. \u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8\u10d7 \u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10d1\u10d0 \u10e4\u10d0\u10e1\u10d8\u10d0\u10dc\u10d8\u10d0. 2015 \u10ec\u10d4\u10da\u10e1 \u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10e1 \u10e8\u10dd\u10d7\u10d0 \u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10d8 \u10d4\u10ec\u10dd\u10d3\u10d0", "answerA": "\u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10d8\u10e1 \u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8 \u10dc\u10d4\u10d1\u10d8\u10e1\u10db\u10d8\u10d4\u10e0\u10d8 \u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d8\u10e1 \u10db\u10d0\u10dc\u10e5\u10d0\u10dc\u10d0\u10e1 \u10d8\u10e2\u10d4\u10d5\u10e1", "answerB": "\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8\u10e1 \u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10d8 \u10d9\u10d0\u10d5\u10d9\u10d0\u10e1\u10d8\u10d8\u10e1 \u10e1\u10e2\u10e0\u10d0\u10e2\u10d4\u10d2\u10d8\u10e3\u10da\u10d8 \u10ea\u10d4\u10dc\u10e2\u10e0\u10d8\u10d0", "answerC": "\u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8\u10e1 \u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10d8\u10e1 \u10d0\u10d5\u10e2\u10dd\u10e1\u10d0\u10d3\u10d2\u10dd\u10db\u10d8\u10d7 \u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10d1\u10d0 \u10e3\u10e4\u10d0\u10e1\u10dd\u10d0", "answerD": "\u10e8\u10dd\u10d7\u10d0 \u10e0\u10e3\u10e1\u10d7\u10d0\u10d5\u10d4\u10da\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10d8 \u10d0\u10d4\u10e0\u10dd\u10de\u10dd\u10e0\u10e2\u10e1 \u10d0\u10e8\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4 \u10db\u10d8\u10d4\u10dc\u10d8\u10ed\u10d0", "correctanswer": "B"}, {"questionid": 182, "questiontext": "- \u10d1) III.3.3. \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10ec\u10d8\u10dc\u10d0\u10d3\u10d0\u10d3\u10d4\u10d1\u10d0 \u10e8\u10d4\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d4\u10d1\u10d0 \u10e2\u10d4\u10e5\u10e1\u10e2\u10d8\u10e1 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10e1? \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8\u10e1 \u10db\u10d4\u10e2\u10e0\u10dd\u10de\u10dd\u10da\u10d8\u10e2\u10d4\u10dc\u10d8 1966 \u10ec\u10d4\u10da\u10e1 \u10d2\u10d0\u10d8\u10ee\u10e1\u10dc\u10d0. \u10d0\u10db\u10df\u10d0\u10db\u10d0\u10d3 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10d8\u10e1 \u10db\u10d4\u10e2\u10e0\u10dd\u10e8\u10d8 23 \u10db\u10dd\u10e5\u10db\u10d4\u10d3\u10d8 \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d8\u10d0, \u10d0\u10e5\u10d4\u10d3\u10d0\u10dc 16 \u10d2\u10d0\u10dc\u10da\u10d0\u10d2\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10d2\u10da\u10d3\u10d0\u10dc\u10d8-\u10d5\u10d0\u10e0\u10d9\u10d4\u10d7\u10d8\u10da\u10d8\u10e1, \u10ee\u10dd\u10da\u10dd 7 \u2013 \u10e1\u10d0\u10d1\u10e3\u10e0\u10d7\u10d0\u10da\u10dd\u10e1 \u10ee\u10d0\u10d6\u10d6\u10d4. \u10e1\u10d0\u10d3\u10d2\u10e3\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10db\u10d4\u10e2\u10d4\u10e1\u10dd\u10d1\u10d0 \u10eb\u10d0\u10da\u10d8\u10d0\u10dc \u10e6\u10e0\u10db\u10d0\u10d3 \u10d0\u10e0\u10d8\u10e1 \u10db\u10d8\u10ec\u10d8\u10e1 \u10e5\u10d5\u10d4\u10e8. \u10d5\u10d0\u10d2\u10dd\u10dc\u10d4\u10d1\u10e1 \u10d4\u10db\u10e1\u10d0\u10ee\u10e3\u10e0\u10d4\u10d1\u10d0 \u10dd\u10e0\u10d8 \u10d3\u10d4\u10de\u10dd: \u201e\u10dc\u10d0\u10eb\u10d0\u10da\u10d0\u10d3\u10d4\u10d5\u10d8\u201c \u10d3\u10d0 \u201e\u10d2\u10da\u10d3\u10d0\u10dc\u10d8\u201c. \u10e7\u10dd\u10d5\u10d4\u10da\u10ec\u10da\u10d8\u10e3\u10e0\u10d0\u10d3 \u10db\u10d4\u10e2\u10e0\u10dd\u10e1 \u10e1\u10d0\u10e8\u10e3\u10d0\u10da\u10dd\u10d3 105,6 \u10db\u10d8\u10da\u10d8\u10dd\u10dc\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8 \u10d2\u10d0\u10d3\u10d0\u10f0\u10e7\u10d0\u10d5\u10e1. \u10d4\u10e5\u10e1\u10de\u10da\u10dd\u10d0\u10e2\u10d0\u10ea\u10d8\u10d0\u10e8\u10d8\u10d0 186 \u10d5\u10d0\u10d2\u10dd\u10dc\u10d8. \u10db\u10d2\u10d6\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10d0\u10e1\u10e3\u10e0\u10d8 1 \u10da\u10d0\u10e0\u10d8\u10d0, \u10e1\u10e2\u10e3\u10d3\u10d4\u10dc\u10e2\u10d4\u10d1\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u2013 20 \u10d7\u10d4\u10d7\u10e0\u10d8, \u10e1\u10d9\u10dd\u10da\u10d8\u10e1 \u10db\u10dd\u10e1\u10ec\u10d0\u10d5\u10da\u10d4\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10d9\u10d8 \u10e3\u10e4\u10d0\u10e1\u10dd\u10d0. \u10db\u10d4\u10e2\u10e0\u10dd \u10db\u10e3\u10e8\u10d0\u10dd\u10d1\u10e1 \u10d3\u10d8\u10da\u10d8\u10e1 6 \u10e1\u10d0\u10d0\u10d7\u10d8\u10d3\u10d0\u10dc \u10e6\u10d0\u10db\u10d8\u10e1 12 \u10e1\u10d0\u10d0\u10d7\u10d0\u10db\u10d3\u10d4. \u10db\u10d0\u10e2\u10d0\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d2\u10d0\u10d3\u10d8\u10e1 \u10e7\u10dd\u10d5\u10d4\u10da 4 \u10ec\u10e3\u10d7\u10e8\u10d8, \u10de\u10d8\u10d9\u10d8\u10e1 \u10e1\u10d0\u10d0\u10d7\u10d4\u10d1\u10e8\u10d8 \u10d9\u10d8 \u2013 2,5 \u10ec\u10e3\u10d7\u10e8\u10d8", "answerA": "\u10db\u10d4\u10e2\u10e0\u10dd\u10d7\u10d8 \u10d
