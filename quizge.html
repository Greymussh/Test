, "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0 \u10d0\u10e6\u10d8\u10d0\u10e0\u10d4\u10d1\u10e1 \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0 \u10d0\u10e0 \u10d0\u10e6\u10d8\u10d0\u10e0\u10d4\u10d1\u10e1 \u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1", "correctanswer": "C"}, {"questionid": 126, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10db\u10d0\u10e0\u10d7\u10d5\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e6\u10d8\u10d0\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0: \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10d7\u10d0 \u10d3\u10d0\u10e1\u10d0\u10ea\u10d0\u10d5\u10d0\u10d3 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1\u10d7\u10d5\u10d8\u10e1", "answerA": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1", "answerB": "\u10e7\u10d5\u10d4\u10da\u10d0 \u10de\u10d8\u10e0\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1", "answerC": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e5\u10db\u10d4\u10d3\u10e3\u10dc\u10d0\u10e0\u10d8\u10d0\u10dc\u10d8 \u10de\u10d8\u10e0\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10dc\u10d0\u10e1\u10d0\u10db\ D": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10dd \u10db\u10db\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d1\u10d8\u10e1 \u10de\u10e0\u10d8\u10dc\u10ea\u10d8\u10de\u10d6\u10d4 \u10d3\u10d0\u10e7\u10e0\u10d3\u10dc\u10dd\u10d1\u10d8\u10d7", "correctanswer": "A"}, {"questionid": 128, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0? \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1", "answerA": "\u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d4\u10db\u10d9\u10d5\u10d8\u10d3\u10e0\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e6\u10d8\u10d0\u10e0\u10d4\u10d1\u10e3\u10da\u10d8\u10d0", "answerB": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d9\u10d4\u10e0\u10eb\u10dd \u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10e8\u10d4\u10e3\u10d6\u10e6\u10e3\u10d3\u10d0\u10d5\u10d8\u10d0", "answerD": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd \u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7", "correctanswer": "D"}, {"questionid": 129, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10d7 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0\u10dc \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10e2\u10d8\u10d0 \u10d3\u10d0 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10dc \u10db\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e8\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10db\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1 \u10e1\u10ee\u10d5\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10d7 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0\u10dc \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10e2\u10d8\u10d0 \u10d3\u10d0 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10dc \u10db\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e8\u10d8", "answerC": "\u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d4\u10d1\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0\u10d7 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0\u10dc \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10e2\u10d8\u10d0 \u10d3\u10d0 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0 \u10db\u10d8\u10d8\u10e6\u10dd\u10dc \u10db\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e8\u10d8", "answerD": "\u10e1\u10ee\u10d5\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10d7 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0\u10dc \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10de\u10d0\u10e0\u10e2\u10d8\u10d0, \u10db\u10d0\u10d2\u10e0\u10d0\u10db \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10e3\u10da\u10d8 \u10d0\u10e5\u10d5\u10d7 \u10db\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e8\u10d8 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0", "correctanswer": "A"}, {"questionid": 130, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0\u10e8\u10d8 \u10db\u10d8\u10d7\u10d8\u10d7\u10d4\u10d1\u10e3\u10da\u10d8 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d5\u10e0\u10ea\u10d4\u10da\u10d3\u10d4\u10d1\u10d0: \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1", "answerA": "\u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da \u10de\u10d8\u10e0\u10d4\u10d1\u10d6\u10d4 \u10db\u10d0\u10d7\u10d8 \u10e8\u10d8\u10dc\u10d0\u10d0\u10e0\u10e1\u10d8\u10e1 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d0\u10e0\u10d0\u10d9\u10dd\u10db\u10d4\u10e0\u10ea\u10d8\u10e3\u10da \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da \u10de\u10d8\u10e0\u10d4\u10d1\u10d6\u10d4", "answerC": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10db\u10d4\u10ec\u10d0\u10e0\u10db\u10d4\u10dd \u10d8\u10e3\u10e0\u10d8\u10d3\u10d8\u10e3\u10da \u10de\u10d8\u10e0\u10d4\u10d1\u10d6\u10d4", "answerD": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e4\u10d8\u10d6\u10d8\u10d9\u10e3\u10e0 \u10de\u10d8\u10e0\u10d4\u10d1\u10d6\u10d4", "correctanswer": "A"}, {"questionid": 131, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8?", "answerA": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d4\u10e0\u10eb\u10dd \u10d3\u10d0\u10ec\u10d4\u10e1\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10e8\u10d8 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e7\u10dd\u10e4\u10e1 \u10d7\u10d0\u10dc\u10d0\u10d1\u10d0\u10e0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10e1\u10d0 \u10d3\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10da\u10dd\u10d1\u10d4\u10d1\u10e1 \u10db\u10d0\u10db\u10d0\u10d9\u10d0\u10ea\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e5\u10d0\u10da\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerB": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd \u10d3\u10d0\u10ec\u10d4\u10e1\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10e8\u10d8 \u10e3\u10d6\u10e0\u10e3\u10dc\u10d5\u10d4\u10da\u10e7\u10dd\u10e4\u10e1 \u10d7\u10d0\u10dc\u10d0\u10d1\u10d0\u10e0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10e1\u10d0 \u10d3\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10da\u10dd\u10d1\u1 10d5\u10dc\u10d4\u10d1\u10e8\u10d8 \u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10e1 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10e1 \u10e8\u10d4\u10db\u10ea\u10d8\u10e0\u10d4\u10d1\u10d0 \u10d0\u10dc \u10d2\u10d0\u10d6\u10e0\u10d3\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d3\u10d4\u10d9\u10e0\u10d4\u10e2\u10d8\u10d7", "answerB": "\u10e1\u10d0\u10e7\u10dd\u10d5\u10d4\u10da\u10d7\u10d0\u10dd \u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10e8\u10d8 \u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10e1 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10e1 \u10d2\u10d0\u10d6\u10e0\u10d3\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10ea\u10d4\u10dc\u10e2\u10e0\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10d9\u10dd\u10db\u10d8\u10e1\u10d8\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10e1\u10d0\u10e7\u10dd\u10d5\u10d4\u10da\u10d7\u10d0\u10dd \u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10e8\u10d8 \u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10e1 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10e1 \u10e8\u10d4\u10db\u10ea\u10d8\u10e0\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d2\u10d0\u10d6\u10e0\u10d3\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "answerD": "\u10e1\u10d0\u10e7\u10dd\u10d5\u10d4\u10da\u10d7\u10d0\u10dd \u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10e8\u10d8 \u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10e1 \u10db\u10d8\u10db\u10d3\u10d8\u10dc\u10d0\u10e0\u10d4 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10d0\u10dc \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10e8\u10d4\u10db\u10ea\u10d8\u10e0\u10d4\u10d1\u10d0 \u10d0\u10dc \u10d2\u10d0\u10d6\u10e0\u10d3\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0. \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10db\u10dd\u10e1\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10e1", "correctanswer": "D"}, {"questionid": 146, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10db\u10e1\u10ef\u10d0\u10d5\u10e0\u10d3\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10e1 \u10e8\u10d4\u10d8\u10ec\u10e7\u10d0\u10da\u10d4\u10d1\u10e1:", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "answerD": "\u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "correctanswer": "B"}, {"questionid": 147, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 10e0\u10d7\u10da\u10dd, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0\u10e8\u10d8 \u10e8\u10d4\u10d3\u10d8\u10e1 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 30 \u10db\u10dd\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4", "answerC": "\u10e1\u10d0\u10d9\u10d0\u10e1\u10d0\u10ea\u10d8\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0\u10e8\u10d8 \u10e8\u10d4\u10d3\u10d8\u10e1 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 9 \u10db\u10dd\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4", "answerD": "\u10e1\u10d0\u10d9\u10d0\u10e1\u10d0\u10ea\u10d8\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0\u10e8\u10d8 \u10e8\u10d4\u10d3\u10d8\u10e1 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 28 \u10db\u10dd\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4", "correctanswer": "D"}, {"questionid": 149, "questiontext": "\u10d5\u10d8\u10dc \u10d8\u10e0\u10e9\u10d4\u10d5\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4\u10e1?", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d7\u10d0\u10d2\u10d0\u10dc \u10d8\u10e3\u10e1\u10e2\u10d8\u10ea\u10d8\u10d8\u10e1 \u10e3\u10db\u10d0\u10e6\u10da\u10d4\u10e1\u10d8 \u10e1\u10d0\u10d1\u10ed\u10dd\u10e1 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u u10d4\u10da\u10d7\u10d0\u10dd, \u10d7\u10d0\u10dc\u10d0\u10e1\u10ec\u10dd\u10e0\u10d8 \u10d3\u10d0 \u10de\u10d8\u10e0\u10d3\u10d0\u10de\u10d8\u10e0\u10d8 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4 \u10e6\u10d8\u10d0 \u10d9\u10d4\u10dc\u10ed\u10d8\u10e1\u10e7\u10e0\u10d8\u10d7 \u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1\u10d2\u10d0\u10dc", "answerD": "\u10e1\u10d0\u10e7\u10dd\u10d5\u10d4\u10da\u10d7\u10d0\u10dd, \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10d0\u10da\u10d8, \u10d7\u10d0\u10dc\u10d0\u10e1\u10ec\u10dd\u10e0\u10d8 \u10d3\u10d0 \u10de\u10d8\u10e0\u10d3\u10d0\u10de\u10d8\u10e0\u10d8 \u10e1\u10d0\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4 \u10e4\u10d0\u10e0\u10e3\u10da\u10d8 \u10d9\u10d4\u10dc\u10ed\u10d8\u10e1\u10e7\u10e0\u10d8\u10d7 \u10d0\u10e0\u10e9\u10d4\u10e3\u10da\u10d8 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d4\u10d1\u10d8\u10e1\u10d2\u10d0\u10dc", "correctanswer": "D"}, {"questionid": 153, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0? \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d5\u10d8\u10e1 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10e1\u10d0\u10d9\u10d0\u10dc\u10dd\u10dc\u10db\u10d3\u10d4\u10d1\u10da\u10dd \u10d8\u10dc\u10d8\u10ea\u10d8\u10d0\u10e2\u10d8\u10d5\u10d8\u10e1", "answerA": "20 000 \u10d0\u10db\u10dd\u10db\u10e0\u10e9\u10d4\u10d5\u10d4\u10da\u10e1", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10e1", "answerC": "\u10e1\u10d0\u10de\u10 e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10e3\u10da\u10d8 \u10de\u10d0\u10e1\u10e3\u10ee\u10d8\u10e1\u10db\u10d2\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0", "correctanswer": "C"}, {"questionid": 157, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0:", "answerA": "\u10db\u10ee\u10d0\u10e0\u10d4\u10d7\u10d0 \u10d7\u10d0\u10dc\u10d0\u10d1\u10e0\u10dd\u10d1\u10d8\u10e1 \u10de\u10e0\u10d8\u10dc\u10ea\u10d8\u10de\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d8\u10d7", "answerB": "\u10db\u10ee\u10d0\u10e0\u10d4\u10d7\u10d0 \u10d7\u10d0\u10dc\u10d0\u10e1\u10ec\u10dd\u10e0\u10dd\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e8\u10d4\u10ef\u10d8\u10d1\u10e0\u10d4\u10d1\u10d8\u10d7\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4", "answerC": "\u10db\u10ee\u10d0\u10e0\u10d4\u10d7\u10d0 \u10e3\u10e0\u10d7\u10d8\u10d4\u10e0\u10d7\u10d2\u10d0\u10d2\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4", "answerD": "\u10db\u10ee\u10d0\u10e0\u10d4\u10d7\u10d0 \u10e8\u10dd\u10e0\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10d1\u10d0\u10e0 \u10e1\u10d0\u10ec\u10e7\u10d8\u10e1\u10d4\u10d1\u10d6\u10d4", "correctanswer": "B"}, {"questionid": 158, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10ec\u10e7\u10d5\u10d4\u10e2\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10d7\u10e3 :", "answerA": "\u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10e2\u10e0\u10d0\u10dc\u10e1\u10de\u10dd\u10e0\u10e2\u10d8\u10e1 \u10e1\u10d0\u10db\u10dd\u10eb\u10e0\u10d0\u10dd \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1 \u10d8\u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10d0", "answerB": "\u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10ee\u10d0\u10da\u10ee\u10d8\u10e1 \u10e1\u10d0\u10db\u10dd\u10eb\u10e0\u10d0\u10dd \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1 \u10d8\u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10d0", "answerC": "\u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0\u10db \u10d9\u10d0\u10dc\u10dd\u10dc\u10e1\u10d0\u10ec\u10d8\u10dc\u10d0\u10d0\u10e6\u10db\u10d3\u10d4\u10d2\u10dd \u10ee\u10d0\u10e1\u10d8\u10d0\u10d7\u10d8 \u10db\u10d8\u10d8\u10e6\u10dd", "answerD": "\u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d8\u10da\u10d8 \u10ee\u10d0\u10da\u10ee\u10d8 \u10e8\u10e3\u10d0\u10e6\u10d0\u10db\u10d4\u10db\u10d3\u10d4 \u10d0\u10e0 \u10d8\u10e8\u10da\u10d4\u10d1\u10d0", "correctanswer": "C"}, {"questionid": 159, "questiontext": "\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10e1\u10d0 \u10d3\u10d0 \u10e0\u10d4\u10e4\u10d4\u10e0\u10d4\u10dc\u10d3\u10e3\u10db\u10e8\u10d8 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1:", "answerA": "\u10d0\u10d3\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d0\u10ea\u10e3\u10da\u10d8 \u10ec\u10d4\u10e1\u10d8\u10d7 \u10e1\u10d0\u10ee\u10d3\u10d4\u10da\u10d3\u10d0\u10d3\u10d4\u10d1\u10e3\u10da \u10de\u10d8\u10e0\u10e1", "answerB": "\u10e5\u10dd\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10e1\u10d0\u10ee\u10d0\u10d3\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ee\u10d3\u10d8\u10e1\u10e3\u10e3\u10dc\u10d0\u10e0\u10dd \u10de\u10d8\u10e0\u10e1", "answerC": "\u10db\u10ee\u10d0\u10e0\u10d3\u10d0\u10ed\u10d4\u10e0\u10d8\u10e1 \u10db\u10d8\u10db\u10e6\u10d4\u10d1 \u10d3\u10d0 \u10e8\u10d4\u10e1\u10d0\u10d1\u10d0\u10db\u10d8\u10e1 \u10e1\u10e 10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10e6\u10d4\u10d1\u10d8\u10e1 \u10d7\u10d0\u10e0\u10d8\u10e6\u10d8\u10d0:", "answerA": "1918 \u10ec\u10da\u10d8\u10e1 26 \u10db\u10d0\u10d8\u10e1\u10d8", "answerB": "1921 \u10ec\u10da\u10d8\u10e1 25 \u10d7\u10d4\u10d1\u10d4\u10e0\u10d5\u10d0\u10da\u10d8; 53 \u10e2\u10d4\u10e1\u10e2\u10d4\u10d1\u10d8 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10db\u10dd\u10de\u10dd\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d4\u10d1\u10e8\u10d8", "answerC": "1991 \u10ec\u10da\u10d8\u10e1 9 \u10d0\u10de\u10e0\u10d8\u10da\u10d8", "answerD": "1995 \u10ec\u10da\u10d8\u10e1 24 \u10d0\u10d2\u10d5\u10d8\u10e1\u10e2\u10dd", "correctanswer": "D"}, {"questionid": 162, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d8\u10db\u10d0\u10d5\u10d3\u10e0\u10dd\u10e3\u10da\u10d0\u10d3 \u10e1\u10ee\u10d5\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d0, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10e1 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d4\u10d9\u10e0\u10eb\u10d0\u10da\u10d4\u10d1\u10d0?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10d9\u10dd\u10dc\u10dd\u10db\u10d8\u10d9\u10d8\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d8\u10e1", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10d2\u10d0\u10e0\u10d4\u10dd \u10e1\u10d0\u10e5\u10db\u10d4\u10d7\u10d0 \u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1", "correctanswer": "C"}, {"questionid": 163, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10d2\u10d0\u10dc\u10d0\u10d7\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10e6\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10e5\u10d5\u10e1:", "answerA": "\u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10db\u10e5\u10dd\u10dc\u10d4 \u10de\u10d8\u10e0\u10d4\u10d1\u10e1", "answerB": "\u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10ee\u10d5\u10d0 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1", "answerD": "\u10e7\u10d5\u10d4\u10da\u10d0 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10e1", "correctanswer": "D"}, {"questionid": 164, "questiontext": "\u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1 \u10e3\u10d0\u10e0\u10d8 \u10d4\u10d7\u10e5\u10d5\u10d0\u10e1 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0\u10d6\u10d4 \u10e8\u10d4\u10db\u10dd\u10e1\u10d5\u10da\u10d0\u10d6\u10d4?", "answerA": "\u10d0\u10e0\u10d0, \u10d7\u10e3 \u10ec\u10d0\u10e0\u10db\u10dd\u10d0\u10d3\u10d2\u10d4\u10dc\u10e1 \u10e1\u10d0\u10d2\u10d0\u10e0\u10d4\u10dd \u10e1\u10d0\u10e5\u10db\u10d4\u10d7\u10d0 \u10e1\u10d0\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10dd\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d0\u10e1", "answerB": "\u10d0\u10e0\u10d0, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10e8\u10d4\u10db\u10dd\u10d5\u10d8\u10d3\u10d4\u10e1 \u10e5\u10d5\u10d4\u10e7\u10d0\u10dc\u10d0\u10e8\u10d8", "answerC": "\u10d3\u10d8\u10d0\u10ee, \u10d7\u10e3 \u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10e3\u10da\u10d8\u10d0 \u10e3\u10ea\u10ee\u10dd \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10db\u10d8\u10d4\u10e0", "answerD": "\u10d3\u10d8\u10d0\u10ee, \u10d7\u10e3 \u10e3\u10d9\u10d0\u10dc\u10dd\u10dc\u10dd\u10d3 \u10d3\u10d0\u10e2\u10dd\u10d5\u10d0 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10e2\u10d4\u10e0\u10d8\u10e2\u10dd\u10e0\u10d8\u10d0", "correctanswer": "B"}, {"questionid": 165, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10e3\u10db\u10d0\u10e6\u10da\u10d4\u10e1\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10d0;", "answerA": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10d3\u10d8\u10e0\u10d4\u10e5\u10e2\u10dd\u10e0\u10d0\u10e2\u10d8", "answerB": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10de\u10da\u10d4\u10dc\u10e3\u10db\u10d8", "answerC": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10e1\u10d0\u10d1\u10ed\u10dd", "answerD": "\u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e1 \u10ec\u10d0\u10e0\u10db\u10dd\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10d4\u10da\u10d7\u10d0 \u10d9\u10e0\u10d4\u10d1\u10d0", "correctanswer": "C"}, {"questionid": 166, "questiontext": "\u10e9\u10d0\u10db\u10dd\u10d7\u10d5\u10da\u10d8\u10da\u10d7\u10d0\u10d2\u10d0\u10dc \u10e0\u10d0 \u10eb\u10d0\u10da\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d0\u10e8\u10d8? \u10d4\u10d9\u10e0\u10eb\u10d0\u10da\u10d4\u10d1\u10d0 \u10de\u10d8\u10e0\u10e1, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10e9\u10d0\u10d8\u10e0\u10d8\u10ea\u10ee\u10d4\u10d1\u10d0 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1", "answerA": "\u10d0\u10d9\u10d0\u10d3\u10d4\u10db\u10d8\u10e3\u10e0\u10d8 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0", "answerB": "\u10d0\u10e0\u10e9\u10d4\u10d5\u10dc\u10d4\u10d1\u10e8\u10d8 \u10ee\u10db\u10d8\u10e1 \u10db\u10d8\u10ea\u10d4\u10db\u10d0", "answerC": "\u10dd\u10ef\u10d0\u10ee\u10d8\u10e1 \u10e8\u10d4\u10e5\u10db\u10dc\u10d0", "answerD": "\u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d0\u10e8\u10d8 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0", "correctanswer": "D"}, {"questionid": 167, "questiontext": "\u10e1\u10d0\u10d4\u10e0\u10d7\u10dd \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10db\u10dd\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10d4 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d0\u10d6\u10d4 \u10d2\u10d0\u10dc\u10ec\u10d4\u10e1\u10d3\u10d4\u10d1\u10d0:", "answerA": "15 \u10ec\u10da\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10d7", "answerB": "20 \u10ec\u10da\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10d7", "answerC": "30 \u10ec\u10da\u10d8\u10e1 \u10d5\u10d0\u10d3\u10d8\u10d7", "answerD": "\u10e3\u10d5\u10d0\u10d3\u10dd\u10d3", "correctanswer": "D"}, {"questionid": 168, "questiontext": "\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da \u10d4\u10dc\u10d0\u10d6\u10d4 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0?", "answerA": "\u10dd\u10e0\u10d8\u10d5\u10d4 \u10db\u10ee\u10d0\u10e0\u10d8\u10e1 \u10db\u10dd\u10d7\u10ee\u10dd\u10d5\u10dc\u10d8\u10d7 \u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10db\u10d0\u10d7 \u10db\u10d8\u10d4\u10e0 \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10e3\u10da \u10d4\u10dc\u10d0\u10d6\u10d4", "answerB": "\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0\u10d6\u10d4, \u10d2\u10d0\u10e0\u10d3\u10d0 \u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d8\u10e1\u10d0, \u10e0\u10dd\u10d3\u10d4\u10e1\u10d0\u10ea \u10db\u10ee\u10d0\u10e0\u10d4\u10e1 \u10ec\u10d0\u10e0\u10db\u10dd\u10d0\u10d3\u10d2\u10d4\u10dc\u10e1 \u10e3\u10ea\u10ee\u10dd\u10d4\u10da\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1", "answerC": "\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0\u10d6\u10d4; \u10de\u10d8\u10e0\u10e1, \u10e0\u10dd\u10db\u10d4\u10da\u10db\u10d0\u10ea \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0 \u10d0\u10e0 \u10d8\u10ea\u10d8\u10e1, \u10db\u10d8\u10d4\u10e9\u10d8\u10dc\u10d4\u10d1\u10d0 \u10d7\u10d0\u10e0\u10ef\u10d8\u10db\u10d0\u10dc\u10d8", "answerD": "\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10d0\u10da\u10ec\u10d0\u10e0\u10db\u10dd\u10d4\u10d1\u10d0 \u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d3\u10d4\u10d1\u10d0 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d0\u10d6\u10d4, \u10d2\u10d0\u10e0\u10d3\u10d0 \u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d8\u10e1\u10d0, \u10e0\u10dd\u10d3\u10d4\u10e1\u10d0\u10ea \u10d8\u10ee\u10d8\u10da\u10d4\u10d1\u10d0 \u10d4\u10e5\u10e1\u10e2\u10e0\u10d0\u10d3\u10d8\u10e0\u10d4\u10d1\u10d0\u10e1 \u10d3\u10d0\u10e5\u10d5\u10d4\u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10d1\u10e3\u10da\u10d8 \u10de\u10d8\u10e0\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d4", "correctanswer": "C"}, {"questionid": 169, "questiontext": "\u10d5\u10d8\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e3\u10e5\u10db\u10d4\u10d1\u10d0?", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10e1", "answerB": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1", "answerC": "\u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1", "answerD": "\u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10e1", "correctanswer": "C"}, {"questionid": 170, "questiontext": "\u10d5\u10d8\u10dc \u10d0\u10d9\u10dd\u10db\u10de\u10da\u10d4\u10e5\u10e2\u10d4\u10d1\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0\u10e1?", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerB": "\u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "answerD": "\u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e1\u10d0\u10ee\u10da\u10d4\u10dd\u10d1\u10d0", "correctanswer": "C"}, {"questionid": 171, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8 ?", "answerA": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10e0\u10d4\u10d5\u10d0 \u10de\u10d8\u10e0\u10d8\u10e1 \u10d3\u10d0\u10e1\u10d0\u10e5\u10db\u10d4\u10d1\u10d8\u10e1 \u10de\u10e0\u10dd\u10ea\u10d4\u10e1\u10e8\u10d8", "answerB": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10e8\u10d8 \u10d0\u10e0 \u10e8\u10d4\u10d3\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d7\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e5\u10db\u10d4\u10d1\u10d0", "answerC": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1\u10d8 \u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10d8\u10d0 \u10db\u10e8\u10e0\u10dd\u10db\u10d4\u10da\u10d7\u10d0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8", "answerD": "\u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10ee\u10d4\u10da\u10e1 \u10e3\u10ec\u10e7\u10dd\u10d1\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10e1 \u10d3\u10d0\u10e1\u10d0\u10e5\u10db\u10d4\u10d1\u10d0\u10e8\u10d8", "correctanswer": "D"}, {"questionid": 172, "questiontext": "\u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10d0 \u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10e1 \u10de\u10d8\u10e0\u10d8, \u10e0\u10dd\u10db\u10da\u10d8\u10e1 \u10d1\u10d8\u10dc\u10d8\u10e1, \u10db\u10d0\u10dc\u10e5\u10d0\u10dc\u10d8\u10e1, \u10e1\u10d0\u10db\u10e3\u10e8\u10d0\u10dd \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d0\u10dc \u10de\u10d8\u10e0\u10d0\u10d3\u10d8 \u10d2\u10d0\u10e9\u10ee\u10e0\u10d4\u10d9\u10d0, \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10e1 \u10d2\u10d0\u10e0\u10d4\u10e8\u10d4, \u10d7\u10e3 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8 \u10d0\u10e0\u10d0 \u10d0\u10e5\u10d5\u10e1 \u10d3\u10d0\u10dc\u10d0\u10e8\u10d0\u10e3\u10da\u10d6\u10d4 \u10ec\u10d0\u10e1\u10ec\u10e0\u10d4\u10d1\u10d0\u10e1?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d0\u10ee\u10d0\u10da\u10d2\u10d0\u10d6\u10e0\u10d3\u10d0 \u10d8\u10e3\u10e0\u10d8\u10e1\u10e2\u10d7\u10d0 \u10d0\u10e1\u10dd\u10ea\u10d8\u10d0\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10db\u10e3\u10dc\u10d8\u10d9\u10d0\u10ea\u10d8\u10d4\u10d1\u10d8\u10e1 \u10db\u10d0\u10e0\u10d4\u10d2\u10e3\u10da\u10d8\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d9\u10dd\u10db\u10d8\u10e1\u10d8\u10d8\u10e1 \u10d7\u10d0\u10d5\u10db\u10ef\u10d3\u10dd\u10db\u10d0\u10e0\u10d4", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10d8", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e8\u10e0\u10dd\u10db\u10d8\u10e1 \u10d8\u10dc\u10e1\u10de\u10d4\u10e5\u10e2\u10dd\u10e0\u10d8", "correctanswer": "C"}, {"questionid": 173, "questiontext": "\u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10d7, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0?", "answerA": "\u201e\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0", "answerB": "\u201e\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10d7\u10e3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d8\u10d7 \u10e1\u10ee\u10d5\u10d0 \u10e0\u10d0\u10db \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10e3\u10da\u10d8", "answerC": "\u201e\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4", "answerD": "\u201e\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d8\u10e1 \u10d2\u10d0\u10eb\u10d4\u10d5\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10d3\u10d0\u10dc \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1\u10d8 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10dc\u10d0\u10e9\u10d4\u10dc\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4", "correctanswer": "A"}, {"questionid": 174, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10d7\u10d0\u10dc\u10d0\u10ee\u10db\u10d0\u10d3, \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e5\u10db\u10d8\u10d0\u10dc\u10dd\u10d1\u10d8\u10e1 \u10eb\u10d8\u10e0\u10d8\u10d7\u10d0\u10d3\u10d8 \u10db\u10d8\u10db\u10d0\u10e0\u10d7\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d0\u10d6\u10d4 \u10de\u10d0\u10e1\u10e3\u10ee\u10d8\u10e1\u10db\u10d2\u10d4\u10d1\u10d4\u10da\u10d8\u10d0:", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8", "correctanswer": "D"}, {"questionid": 175, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e7\u10dd\u10d5\u10d4\u10da \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10e1 \u10d0\u10e5\u10d5\u10e1:", "answerA": "\u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d8\u10dc\u10d3\u10d8\u10e1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerB": "\u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1, \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d8\u10dc\u10d3\u10d8\u10e1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerC": "\u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10d0\u10e6\u10db\u10e1\u10d0\u10e0\u10d4\u10d1\u10da\u10dd\u10d1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "answerD": "\u10e0\u10ec\u10db\u10d4\u10dc\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d8\u10dc\u10d3\u10d8\u10e1\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d0", "correctanswer": "B"}, {"questionid": 176, "questiontext": "\u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10d0 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8\u10d0 \u10ee\u10d4\u10da\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10ec\u10d8\u10dc\u10d0\u10e1\u10ec\u10d0\u10e0\u10d8 \u10d2\u10d0\u10e4\u10e0\u10d7\u10ee\u10d8\u10da\u10d4\u10d1\u10d0? \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10db\u10d0\u10e0\u10d7\u10d5\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerA": "\u10d7\u10e3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10de\u10dd\u10da\u10d8\u10e2\u10d8\u10d9\u10e3\u10e0\u10d8 \u10db\u10dd\u10d7\u10ee\u10dd\u10d5\u10dc\u10d8\u10d7 \u10d8\u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10d0", "answerB": "\u10d7\u10e3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 1000-\u10d6\u10d4 \u10db\u10d4\u10e2\u10d8 \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10e1", "answerC": "\u10d7\u10e3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 \u10e3\u10ea\u10ee\u10dd \u10e5\u10d5\u10d4\u10e7\u10dc\u10d8\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10d8\u10ea \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d4\u10dc", "answerD": "\u10d7\u10e3 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0 \u10ee\u10d0\u10da\u10ee\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e2\u10e0\u10d0\u10dc\u10e1\u10de\u10dd\u10e0\u10e2\u10d8\u10e1 \u10e1\u10d0\u10db\u10dd\u10eb\u10e0\u10d0\u10dd \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1 \u10d8\u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10d0", "correctanswer": "D"}, {"questionid": 177, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u1 ": 184, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10db\u10e3\u10e8\u10d0\u10dd\u10d1\u10d8\u10e1 \u10ec\u10d4\u10e1\u10d8 \u10d2\u10d0\u10dc\u10d8\u10e1\u10d0\u10d6\u10e6\u10d5\u10e0\u10d4\u10d1\u10d0:", "answerA": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d1\u10e0\u10eb\u10d0\u10dc\u10d4\u10d1\u10d8\u10d7", "answerB": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d2\u10d0\u10dc\u10d9\u10d0\u10e0\u10d2\u10e3\u10da\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "answerD": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10e0\u10d4\u10d2\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10d7", "correctanswer": "D"}, {"questionid": 185, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10db\u10e1\u10ef\u10d4\u10da\u10dd\u10d1\u10d0\u10d0 \u10db\u10d0\u10e0\u10d7\u10d4\u10d1\u10e3\u10da\u10d8:", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8 \u10d0\u10e0\u10d8\u10e1 \u10d1\u10d0\u10dc\u10d9\u10d7\u10d0 \u10d1\u10d0\u10dc\u10d9\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8 \u10d0\u10e0\u10d8\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10d9\u10dd\u10dc\u10dd\u10db\u10d8\u10d9\u10d8\u10e1 \u10e1\u10d0\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10dd\u10e1 \u10e4\u10d8\u10e1\u10d9\u10d0\u10da\u10e3\u10e0\u10d8 \u10d0\u10d2\u10d4\u10dc\u10e2\u10d8", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8 \u10d0\u10e0\u10d8\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10d7\u10d0\u10d5\u10e0\u10dd\u10d1\u10d8\u10e1 \u10dc\u10d0\u10ec\u10d8\u10da\u10d8", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d4\u10e0\u10dd\u10d5\u10dc\u10e3\u10da\u10d8 \u10d1\u10d0\u10dc\u10d9\u10d8 \u10d0\u10e0\u10d8\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e4\u10d8\u10dc\u10d0\u10dc\u10e1\u10d7\u10d0 \u10e1\u10d0\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10dd\u10e1 \u10d1\u10d0\u10dc\u10d9\u10d8\u10e0\u10d8", "correctanswer": "A"}, {"questionid": 186, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e3\u10d6\u10d4\u10dc\u10d0\u10d4\u10e1\u10d8 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8 \u10d0\u10e0\u10d8\u10e1:", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d0", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10d8\u10e1 \u10d1\u10e0\u10eb\u10d0\u10dc\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d2\u10d0\u10dc\u10d9\u10d0\u10e0\u10d2\u10e3\u10da\u10d4\u10d1\u10d0", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10d4\u10e0\u10d7\u10d0\u10e8\u10dd\u10e0\u10d8\u10e1\u10dd \u10ee\u10d4\u10da\u10e8\u10d4\u10d9\u10e0\u10e3\u10da\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10e8\u10d4\u10d7\u10d0\u10dc\u10ee\u10db\u10d4\u10d1\u10d4\u10d1\u10d8", "correctanswer": "A"}, {"questionid": 187, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10d3\u10d8\u10e1 \u10e3\u10dc\u10d3\u10d0 \u10d2\u10d0\u10dc\u10d4\u10db\u10d0\u10e0\u10e2\u10dd\u10e1 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10e3\u10da \u10de\u10d8\u10e0\u10e1 \u10db\u10d8\u10e1\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8 \u10d3\u10d0 \u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d8?", "answerA": "\u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10d3\u10d0\u10dc 24 \u10e1\u10d0\u10d0\u10d7\u10e8\u10d8", "answerB": "\u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1 \u10d0\u10d3\u10d2\u10d8\u10da\u10d0\u10e1 \u10d2\u10d0\u10dc\u10d7\u10d0\u10d5\u10e1\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "answerC": "\u10d3\u10d0\u10d9\u10d0\u10d5\u10d4\u10d1\u10d8\u10e1\u10d7\u10d0\u10dc\u10d0\u10d5\u10d4", "answerD": "\u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e8\u10d8 \u10de\u10d8\u10e0\u10d5\u10d4\u10da\u10d8 \u10ec\u10d0\u10e0\u10d3\u10d2\u10d4\u10dc\u10d8\u10e1\u10d0\u10e1", "correctanswer": "C"}, {"questionid": 188, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10d0 \u10de\u10d8\u10e0\u10dd\u10d1\u10d8\u10d7 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10e1 \u10db\u10d8\u10d8\u10e6\u10dd\u10e1 \u10e8\u10d4\u10d9\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 \u10db\u10dd\u10dc\u10d0\u10ec\u10d8\u10da\u10d4\u10dd\u10d1\u10d0?", "answerA": "\u10e3\u10dc\u10d3\u10d0 \u10d8\u10e7\u10dd\u10e1 \u10d7\u10d0\u10d5\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0 0\u10e1\u10d0 \u10d3\u10d0 \u10db\u10d8\u10e1 \u10db\u10dd\u10d0\u10d3\u10d2\u10d8\u10da\u10d4\u10d4\u10d1\u10e1 \u10d4\u10e0\u10d7\u10dd\u10d1\u10da\u10d8\u10d5\u10d8 \u10d3\u10d0\u10d3\u10d2\u10d4\u10dc\u10d8\u10da\u10d4\u10d1\u10d8\u10d7", "answerC": "\u10de\u10d0\u10e0\u10da\u10d0\u10db\u10d4\u10dc\u10e2\u10d8\u10e1 \u10ec\u10d4\u10d5\u10e0\u10d7\u10d0 \u10e1\u10e0\u10e3\u10da\u10d8 \u10e8\u10d4\u10db\u10d0\u10d3\u10d2\u10d4\u10dc\u10da\u10dd\u10d1\u10d8\u10e1 \u10d0\u10e0\u10d0\u10dc\u10d0\u10d9\u10da\u10d4\u10d1 \u10d4\u10e0\u10d7 \u10db\u10d4\u10e1\u10d0\u10db\u10d4\u10d3\u10e1", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10d6\u10d8\u10d3\u10d4\u10dc\u10e2\u10e1\u10d0 \u10d3\u10d0 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10e1\u10e1 \u10d4\u10e0\u10d7\u10dd\u10d1\u10da\u10d8\u10d5\u10d0\u10d3", "correctanswer": "C"}, {"questionid": 190, "questiontext": "\u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0\u10d7 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e8\u10d4\u10d8\u10dc\u10d0\u10e0\u10e9\u10e3\u10dc\u10dd\u10dc \u10d3\u10d0 \u10d2\u10d0\u10dc\u10d0\u10d5\u10d8\u10d7\u10d0\u10e0\u10dd\u10dc \u10d7\u10d0\u10d5\u10d8\u10d0\u10dc\u10d7\u10d8 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10d0, \u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10dc \u10d3\u10d4\u10d3\u10d0\u10d4\u10dc\u10d8\u10d7 \u10de\u10d8\u10e0\u10d0\u10d3 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10dc \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3?", "answerA": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0\u10d7 \u10e8\u10d4\u10d8\u10dc\u10d0\u10e0\u10e9\u10e3\u10dc\u10dd\u10dc \u10d7\u10d0\u10d5\u10d8\u10d0\u10dc\u10d7\u10d8 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10d0, \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d7 \u10de\u10d8\u10e0\u10d3\u10d0\u10de\u10d8\u10e0 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10e3\u10da \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8", "answerB": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0\u10d7 \u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10dc \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd \u10d4\u10dc\u10d8\u10d7 \u10de\u10d8\u10e0\u10d0\u10d3 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d3\u10d0 \u10d2\u10d0\u10dc\u10d0\u10d5\u10d8\u10d7\u10d0\u10e0\u10dd\u10dc \u10e5\u10d0\u10e0\u10d7\u10e3\u10da\u10d8 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10d0", "answerC": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0\u10d7 \u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10dc, \u10e8\u10d4\u10d8\u10dc\u10d0\u10e0\u10e9\u10e3\u10dc\u10dd\u10dc \u10d3\u10d0 \u10d2\u10d0\u10dc\u10d0\u10d5\u10d8\u10d7\u10d0\u10e0\u10dd\u10dc \u10d7\u10d0\u10d5\u10d8\u10d0\u10dc\u10d7\u10d8 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10d0, \u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10dc \u10d3\u10d4\u10d3\u10d0\u10d4\u10dc\u10d8\u10d7 \u10de\u10d8\u10e0\u10d0\u10d3 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8 \u10d0\u10dc \u10e1\u10d0\u10ef\u10d0\u10e0\u10dd\u10d3", "answerD": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d4\u10d1\u10e1 \u10e8\u10d4\u10e3\u10eb\u10da\u10d8\u10d0\u10d7 \u10d2\u10d0\u10dc\u10d0\u10d5\u10d8\u10d7\u10d0\u10e0\u10dd\u10dc \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10d9\u10e3\u10da\u10e2\u10e3\u10e0\u10d0, \u10d8\u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10dd\u10dc \u10e1\u10d0\u10d9\u10e3\u10d7\u10d0\u10e0\u10d8 \u10d3\u10d4\u10d3\u10d0\u10d4\u10dc\u10d8\u10d7 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10de\u10d8\u10e0\u10d0\u10d3 \u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d0\u10e8\u10d8", "correctanswer": "C"}, {"questionid": 191, "questiontext": "\u10e0\u10d0 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10da\u10d8\u10d7 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0?", "answerA": "\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10d0\u10e3\u10ea\u10d8\u10da\u10d4\u10d1\u10d4\u10da\u10d8 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10e1\u10d0\u10ed\u10d8\u10e0\u10dd\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1", "answerB": "\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0 \u10d0\u10d1\u10e1\u10dd\u10da\u10e3\u10e2\u10e3\u10e0\u10d0\u10d3 \u10ee\u10d4\u10da\u10e8\u10d4\u10e3\u10d5\u10d0\u10da\u10d8\u10d0", "answerC": "\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10d8\u10db \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8, \u10d7\u10e3 \u10db\u10d4\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10db\u10dd\u10e5\u10d0\u10da\u10d0\u10e5\u10d4", "answerD": "\u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e9\u10d0\u10db\u10dd\u10e0\u10d7\u10db\u10d4\u10d5\u10d0 \u10e8\u10d4\u10e1\u10d0\u10eb\u10da\u10d4\u10d1\u10d4\u10da\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10d8\u10e1\u10d8 \u10e1\u10d0\u10d1\u10d0\u10d6\u10e0\u10dd \u10e6\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10dc\u10d0\u10ec\u10d8\u10da\u10dd\u10d1\u10e0\u10d8\u10d5\u10d8 \u10d0\u10dc\u10d0\u10d6\u10e6\u10d0\u10e3\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10db\u10d7\u10ee\u10d5\u10d4\u10d5\u10d0\u10e8\u10d8", "correctanswer": "A"}, {"questionid": 192, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e0\u10dd\u10db\u10d4\u10da\u10d8 \u10dd\u10e0\u10d2\u10d0\u10dc\u10dd\u10e1 \u10d0\u10dc \u10d7\u10d0\u10dc\u10d0\u10db\u10d3\u10d4\u10d1\u10dd\u10d1\u10d8\u10e1 \u10de\u10d8\u10e0\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4 \u10d0\u10e0\u10d8\u10e1 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8 \u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0?", "answerA": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10d7; \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10db\u10d7\u10d0\u10d5\u10d0\u10e0\u10d8 \u10de\u10e0\u10dd\u10d9\u10e3\u10e0\u10dd\u10e0\u10d8\u10e1", "answerB": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e1\u10d0\u10db\u10d0\u10e0\u10d7\u10da\u10dd\u10e1 \u10d2\u10d0\u10d3\u10d0\u10ec\u10e7\u10d5\u10d4\u10e2\u10d8\u10da\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4", "answerC": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0 \u10d3\u10d0\u10e1\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10e1\u10d0\u10ee\u10d0\u10da\u10ee\u10dd \u10d3\u10d0\u10db\u10ea\u10d5\u10d4\u10da\u10d8\u10e1 \u10d7\u10d0\u10dc\u10ee\u10db\u10dd\u10d1\u10d8\u10d7", "answerD": "\u10d0\u10d3\u10d0\u10db\u10d8\u10d0\u10dc\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e6\u10d9\u10d5\u10d4\u10d7\u10d0 \u10e1\u10d0\u10d4\u10e0\u10d7\u10dd\u10d3 \u10d3\u10d0\u10e3\u10e8\u10d5\u10d4\u10d1\u10d4\u10da\u10d8\u10d0", "correctanswer": "B"}, {"questionid": 193, "questiontext": "\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10d9\u10dd\u10dc\u10e1\u10e2\u10d8\u10e2\u10e3\u10ea\u10d8\u10d8\u10e1 \u10db\u10d8\u10ee\u10d4\u10d3\u10d5\u10d8\u10d7, \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0 \u10d7\u10e3 \u10d0\u10e0\u10d0 \u10e8\u10d4\u10d8\u10d6\u10e6\u10e3\u10d3\u10dd\u10e1 \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d0 \u10db\u10d0\u10d7\u10d7\u10d5\u10d8\u10e1, \u10d5\u10d8\u10dc\u10ea \u10d9\u10d0\u10dc\u10dd\u10dc\u10d8\u10d4\u10e0\u10d0\u10d3 \u10d8\u10db\u10e7\u10dd\u10e4\u10d4\u10d1\u10d0 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e8\u10d8?", "answerA": "\u10d0\u10e0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d0 \u10d0\u10d1\u10e1\u10dd\u10da\u10e3\u10e2\u10e3\u10e0\u10d8 \u10e3\u10e4\u10da\u10d4\u10d1\u10d0\u10d0", "answerB": "\u10d0\u10e0 \u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0, \u10e0\u10d0\u10d3\u10d2\u10d0\u10dc \u10e1\u10d0\u10ea\u10ee\u10dd\u10d5\u10e0\u10d4\u10d1\u10d4\u10da\u10d8 \u10d0\u10d3\u10d2\u10d8\u10da\u10d8\u10e1 \u10d7\u10d0\u10d5\u10d8\u10e1\u10e3\u10e4\u10da\u10d0\u10d3 \u10d0\u10e0\u10e9\u10d4\u10d5\u10d0 \u10d2\u10d0\u10db\u10dd\u10d8\u10ec\u10d5\u10d4\u10d5\u10e1 \u10e1\u10d0\u10ee\u10d4\u10da\u10db\u10ec\u10d8\u10e4\u10dd\u10e1 \u10d8\u10dc\u10e2\u10d4\u10e0\u10d4\u10e1\u10d4\u10d1\u10d8\u10e1 \u10e8\u10d4\u10d6\u10e6\u10e3\u10d3\u10d5\u10d0\u10e1", "answerC": "\u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0, \u10db\u10ee\u10dd\u10da\u10dd\u10d3 \u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd\u10e1 \u10de\u10e0\u10d4\u10db\u10d8\u10d4\u10e0-\u10db\u10d8\u10dc\u10d8\u10e1\u10e2\u10e0\u10d8\u10e1 \u10d1\u10e0\u10eb\u10d0\u10dc\u10d4\u10d1\u10d8\u10e1 \u10e1\u10d0\u10e4\u10e3\u10eb\u10d5\u10d4\u10da\u10d6\u10d4", "answerD": "\u10e8\u10d4\u10d8\u10eb\u10da\u10d4\u10d1\u10d0, \u10ef\u10d0\u10dc\u10db\u10e0\u10d7\u10d4\u10da\u10dd\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10d0\u10dc \u10db\u10d0\u10e0\u10d7\u10da\u10db\u10e1\u10d0\u10ef\u10e3\u10da\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10dc\u10ee\u10dd\u10e0\u10ea\u10d8\u10d4\u10da\u10d4\u10d1\u10d8\u10e1 \u10db\u10d8\u10d6\u10dc\u10d8\u10d7", "correctanswer": "D"}, {"questionid": 194, "questiontext": "\u10e1\u10d0\u
