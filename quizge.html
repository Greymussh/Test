    next_section: 'Следующий раздел',
    mistakes_nav: 'Ошибки',
    mistakes_title: 'Мои ошибки',
    mistakes_subtitle: 'Вопросы, на которые вы ответили неверно — практикуйтесь!',
    mistakes_empty: 'Ошибок пока нет! Продолжайте проходить тесты.',
    mistakes_empty_sub: 'Неправильные ответы появятся здесь автоматически.',
    mistakes_filter_all: 'Все предметы',
    mistakes_count: '{n} вопрос(ов)',
    mistakes_removed: '✓ Правильно! Убрано из ошибок.',
    mistakes_wrong: '✗ Снова неверно. Попробуйте ещё!',
    mistakes_done_subject: 'Все исправлено в этом предмете! 🎉',
  }
};

let currentLang = localStorage.getItem('lang') || 'en';

function t(key, vars = {}) {
  let str = TRANSLATIONS[currentLang][key] || TRANSLATIONS['en'][key] || key;
  for (const [k, v] of Object.entries(vars)) str = str.replace(`{${k}}`, v);
  return str;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  // re-render current view
  if (currentView === 'home') showHome();
  else if (currentView === 'section-picker') renderSectionPicker();
  else if (currentView === 'question') renderQuestion();
  else if (currentView === 'score') renderScore();
  else if (currentView === 'mistakes-picker') renderMistakesPicker();
  else if (currentView === 'mistakes-question') renderMistakesQuestion();
  else if (currentView === 'mistakes-score') renderMistakesScore();
}

// ─── State ────────────────────────────────────────────────────
let currentView = 'home';
let activeSubject = null;
let allQuestions = [];
let questions = [];
let currentSection = 0;
let totalSections = 0;
let current = 0;
let score = 0;
let wrongCount = 0;
let answered = false;

// Mistakes state (in-memory, session only)
let mistakes = JSON.parse(localStorage.getItem('quizge_mistakes') || '{}');
// mistakes = { subject1: [{questionid, addedAt}], ... }

function saveMistakes() {
  localStorage.setItem('quizge_mistakes', JSON.stringify(mistakes));
}

const SECTION_SIZE = 20;
const SUBJECT_META = {
  subject1: { icon: '📚', titleKey: 's1_title' },
  subject2: { icon: '📜', titleKey: 's2_title' },
  subject3: { icon: '⚖️', titleKey: 's3_title' },
};

// ─── Render helpers ───────────────────────────────────────────
const app = () => document.getElementById('app');

function showHome() {
  currentView = 'home';
  const mistakesTotal = Object.values(mistakes).reduce((a, arr) => a + arr.length, 0);

  app().innerHTML = `
    <section class="hero">
      <h1>${t('hero_title')}</h1>
      <p>${t('hero_sub')}</p>
    </section>
    <div class="subjects-grid">
      ${['subject1','subject2','subject3'].map(key => {
        const meta = SUBJECT_META[key];
        const total = (ALL_QUESTIONS[key] || []).length;
        const sections = Math.ceil(total / SECTION_SIZE);
        return `
          <div class="subject-card" onclick="startSubject('${key}')">
            <span class="subject-icon">${meta.icon}</span>
            <h2>${t(meta.titleKey)}</h2>
            <p>${t(key === 'subject1' ? 's1_desc' : key === 'subject2' ? 's2_desc' : 's3_desc')}</p>
            <span class="badge badge-free">${total} questions</span>
            <br><br>
            <span class="btn btn-primary btn-sm">${t('start_quiz')}</span>
          </div>
        `;
      }).join('')}
      <div class="subject-card mistakes-card" onclick="showMistakesPicker()">
        <span class="subject-icon">❌</span>
        <h2>${t('mistakes_title')}</h2>
        <p>${t('mistakes_subtitle')}</p>
        ${mistakesTotal > 0
          ? `<span class="badge badge-mistakes">${t('mistakes_count', {n: mistakesTotal})}</span>`
          : `<span class="badge badge-free">✓ All clear!</span>`
        }
        <br><br>
        <span class="btn btn-secondary btn-sm">Practice →</span>
      </div>
    </div>
  `;
}

// ─── Subject / Section ────────────────────────────────────────
function startSubject(subjectKey) {
  activeSubject = subjectKey;
  allQuestions = ALL_QUESTIONS[subjectKey] || [];
  totalSections = Math.ceil(allQuestions.length / SECTION_SIZE);
  renderSectionPicker();
}

function renderSectionPicker() {
  currentView = 'section-picker';
  const meta = SUBJECT_META[activeSubject];
  app().innerHTML = `
    <div class="quiz-wrap">
      <a href="#" class="back-link" onclick="showHome(); return false;">${t('back')}</a>
      <div class="quiz-header">
        <h1>${meta.icon} ${t(meta.titleKey)}</h1>
        <p style="color:var(--muted);margin-top:.3rem">${t('section_pick_prompt')}</p>
      </div>
      <div class="section-picker">
        ${Array.from({length: totalSections}, (_, i) => {
          const start = i * SECTION_SIZE + 1;
          const end = Math.min((i + 1) * SECTION_SIZE, allQuestions.length);
          return `
            <div class="section-card" onclick="startSection(${i})">
              <div class="section-num">${t('section_label', {n: i+1})}</div>
              <div class="section-range">${t('questions_range', {start, end})}</div>
              <div class="section-go">→</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function startSection(idx) {
  currentSection = idx;
  const start = idx * SECTION_SIZE;
  questions = allQuestions.slice(start, start + SECTION_SIZE);
  current = 0; score = 0; wrongCount = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  currentView = 'question';
  if (current >= questions.length) { renderScore(); return; }
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round((current / total) * 100);
  const meta = SUBJECT_META[activeSubject];
  answered = false;

  app().innerHTML = `
    <div class="quiz-wrap">
      <a href="#" class="back-link" onclick="renderSectionPicker(); return false;">${t('back')}</a>
      <div class="quiz-header">
        <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
          <h1 style="font-size:1.5rem">${meta.icon} ${t(meta.titleKey)}</h1>
          <span class="section-pill">${t('section_label', {n: currentSection+1})}</span>
        </div>
        <div class="quiz-meta" style="margin-top:.4rem">
          <span>${t('question_of', {n: current+1, total})}</span>
        </div>
        <div class="progress-area">
          <div class="progress-label">
            <span>${t('progress')}</span><span>${pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="question-card">
        <div class="question-num">${t('question_of', {n: current+1, total})}</div>
        <div class="question-text">${q.questiontext}</div>
        <div class="answers-grid">
          ${['A','B','C','D'].map(letter => `
            <button class="answer-btn" id="btn-${letter}" onclick="selectAnswer('${letter}', '${q.correctanswer}', ${q.questionid})">
              <span class="answer-letter">${letter}</span>
              <span>${q['answer'+letter]}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <div class="quiz-nav">
        <button class="btn btn-ghost btn-sm" onclick="renderSectionPicker()">✕ ${t('section_label', {n: currentSection+1})}</button>
        <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">
          ${current + 1 >= total ? '🏁 ' + t('score_title') : t('next_q')}
        </button>
      </div>
    </div>
  `;
}

function selectAnswer(answer, correctAnswer, questionid) {
  if (answered) return;
  answered = true;
  ['A','B','C','D'].forEach(l => document.getElementById('btn-' + l).disabled = true);

  if (answer === correctAnswer) {
    score++;
    document.getElementById('btn-' + answer).classList.add('correct');
    // Remove from mistakes if it was there
    if (mistakes[activeSubject]) {
      mistakes[activeSubject] = mistakes[activeSubject].filter(m => m.questionid !== questionid);
      if (mistakes[activeSubject].length === 0) delete mistakes[activeSubject];
      saveMistakes();
    }
  } else {
    wrongCount++;
    document.getElementById('btn-' + answer).classList.add('wrong');
    document.getElementById('btn-' + correctAnswer).classList.add('correct');
    // Add to mistakes
    if (!mistakes[activeSubject]) mistakes[activeSubject] = [];
    if (!mistakes[activeSubject].find(m => m.questionid === questionid)) {
      mistakes[activeSubject].push({ questionid, addedAt: new Date().toISOString() });
      saveMistakes();
    }
  }
  document.getElementById('next-btn').style.display = '';
}

function nextQuestion() { current++; renderQuestion(); }

function renderScore() {
  currentView = 'score';
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '🙂' : '😬';
  const hasNext = currentSection + 1 < totalSections;

  app().innerHTML = `
    <div class="quiz-wrap">
      <div class="score-card">
        <div style="font-size:3rem">${emoji}</div>
        <h2>${t('score_title')}</h2>
        <div class="score-big">${pct}%</div>
        <div class="score-label">${t('score_label')} — ${t('section_label', {n: currentSection+1})}</div>
        <div class="score-breakdown">
          <div class="score-stat score-correct"><div class="num">${score}</div><div class="lbl">${t('correct_label')}</div></div>
          <div class="score-stat score-wrong"><div class="num">${wrongCount}</div><div class="lbl">${t('wrong_label')}</div></div>
        </div>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-outline" onclick="startSection(${currentSection})">${t('play_again')}</button>
          ${hasNext ? `<button class="btn btn-primary" onclick="startSection(${currentSection+1})">${t('next_section')} →</button>` : ''}
          <button class="btn btn-ghost" onclick="renderSectionPicker()">${t('all_sections')}</button>
        </div>
      </div>
    </div>
  `;
}

// ─── Mistakes ─────────────────────────────────────────────────
let mistakesQueue = [];
let mistakesIndex = 0;
let mistakesCorrect = 0;
let mistakesWrong = 0;
let mistakesAnswered = false;

function showMistakesPicker() {
  renderMistakesPicker();
}

function renderMistakesPicker() {
  currentView = 'mistakes-picker';
  const total = Object.values(mistakes).reduce((a, arr) => a + arr.length, 0);

  if (total === 0) {
    app().innerHTML = `
      <div class="quiz-wrap">
        <a href="#" class="back-link" onclick="showHome(); return false;">${t('back')}</a>
        <div class="mistakes-empty">
          <div style="font-size:4rem;margin-bottom:1rem">✅</div>
          <h2>${t('mistakes_empty')}</h2>
          <p style="color:var(--muted);margin-top:.5rem">${t('mistakes_empty_sub')}</p>
          <br>
          <button class="btn btn-primary" onclick="showHome()">${t('back_home')}</button>
        </div>
      </div>`;
    return;
  }

  const subjects = Object.keys(mistakes).filter(s => mistakes[s].length > 0);
  app().innerHTML = `
    <div class="quiz-wrap">
      <a href="#" class="back-link" onclick="showHome(); return false;">${t('back')}</a>
      <div class="mistakes-picker">
        <div class="mistakes-title-row">
          <span style="font-size:2.2rem">❌</span>
          <div>
            <h1>${t('mistakes_title')}</h1>
            <p style="color:var(--muted)">${t('mistakes_subtitle')}</p>
          </div>
        </div>
        <div class="picker-cards">
          <div class="picker-card picker-all" onclick="startMistakesSession('all')">
            <div class="picker-icon">🔀</div>
            <div class="picker-info">
              <div class="picker-label">${t('mistakes_filter_all')}</div>
              <div class="picker-count">${t('mistakes_count', {n: total})}</div>
            </div>
            <div class="picker-arrow">→</div>
          </div>
          ${subjects.map(s => {
            const meta = SUBJECT_META[s] || { icon: '📝', titleKey: 's1_title' };
            return `
              <div class="picker-card" onclick="startMistakesSession('${s}')">
                <div class="picker-icon">${meta.icon}</div>
                <div class="picker-info">
                  <div class="picker-label">${t(meta.titleKey)}</div>
                  <div class="picker-count">${t('mistakes_count', {n: mistakes[s].length})}</div>
                </div>
                <div class="picker-arrow">→</div>
              </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function startMistakesSession(subject) {
  mistakesQueue = [];
  if (subject === 'all') {
    for (const [subj, ms] of Object.entries(mistakes)) {
      ms.forEach(m => {
        const q = (ALL_QUESTIONS[subj] || []).find(q => q.questionid === m.questionid);
        if (q) mistakesQueue.push({ ...q, subject: subj });
      });
    }
  } else {
    (mistakes[subject] || []).forEach(m => {
      const q = (ALL_QUESTIONS[subject] || []).find(q => q.questionid === m.questionid);
      if (q) mistakesQueue.push({ ...q, subject });
    });
  }
  // Shuffle
  for (let i = mistakesQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [mistakesQueue[i], mistakesQueue[j]] = [mistakesQueue[j], mistakesQueue[i]];
  }
  mistakesIndex = 0; mistakesCorrect = 0; mistakesWrong = 0; mistakesAnswered = false;
  renderMistakesQuestion();
}

function renderMistakesQuestion() {
  currentView = 'mistakes-question';
  if (mistakesIndex >= mistakesQueue.length) { renderMistakesScore(); return; }
  const q = mistakesQueue[mistakesIndex];
  const total = mistakesQueue.length;
  const pct = Math.round((mistakesIndex / total) * 100);
  const meta = SUBJECT_META[q.subject] || { icon: '📝', titleKey: 's1_title' };
  mistakesAnswered = false;

  app().innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-header">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
          <h1 style="font-size:1.5rem">❌ ${t('mistakes_title')}</h1>
          <button class="btn btn-ghost btn-sm" onclick="renderMistakesPicker()">✕ ${t('mistakes_filter_all')}</button>
        </div>
        <div class="quiz-meta" style="margin-top:.4rem">
          <span class="mistake-subject-badge">${meta.icon} ${t(meta.titleKey)}</span>
          <span>${t('question_of', {n: mistakesIndex+1, total})}</span>
        </div>
        <div class="progress-area">
          <div class="progress-label"><span>${t('progress')}</span><span>${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="question-card" id="mcard">
        <div class="question-num">${t('question_of', {n: mistakesIndex+1, total})}</div>
        <div class="question-text">${q.questiontext}</div>
        <div class="answers-grid">
          ${['A','B','C','D'].map(letter => `
            <button class="answer-btn" id="mbtn-${letter}" onclick="answerMistake('${q.subject}', ${q.questionid}, '${letter}', '${q.correctanswer}')">
              <span class="answer-letter">${letter}</span>
              <span>${q['answer'+letter]}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <div class="quiz-nav">
        <span></span>
        <button class="btn btn-primary" id="mnext-btn" style="display:none" onclick="nextMistake()">
          ${mistakesIndex + 1 >= total ? '🏁 ' + t('score_title') : t('next_q')}
        </button>
      </div>
    </div>
  `;
}

function answerMistake(subject, questionid, answer, correctAnswer) {
  if (mistakesAnswered) return;
  mistakesAnswered = true;
  ['A','B','C','D'].forEach(l => { const b = document.getElementById('mbtn-'+l); if(b) b.disabled = true; });

  const correct = answer === correctAnswer;
  if (correct) {
    mistakesCorrect++;
    document.getElementById('mbtn-'+answer).classList.add('correct');
    if (mistakes[subject]) {
      mistakes[subject] = mistakes[subject].filter(m => m.questionid !== questionid);
      if (mistakes[subject].length === 0) delete mistakes[subject];
      saveMistakes();
    }
  } else {
    mistakesWrong++;
    document.getElementById('mbtn-'+answer).classList.add('wrong');
    document.getElementById('mbtn-'+correctAnswer).classList.add('correct');
  }

  const card = document.getElementById('mcard');
  if (card) {
    const banner = document.createElement('div');
    banner.className = 'feedback-msg ' + (correct ? 'feedback-correct' : 'feedback-wrong');
    banner.style.marginTop = '1rem';
    banner.textContent = correct ? t('mistakes_removed') : t('mistakes_wrong');
    card.appendChild(banner);
  }
  document.getElementById('mnext-btn').style.display = '';
}

function nextMistake() { mistakesIndex++; mistakesAnswered = false; renderMistakesQuestion(); }

function renderMistakesScore() {
  currentView = 'mistakes-score';
  const total = mistakesQueue.length;
  const pct = total > 0 ? Math.round((mistakesCorrect / total) * 100) : 0;
  const remaining = Object.values(mistakes).reduce((a, arr) => a + arr.length, 0);
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '🙂' : '😬';

  app().innerHTML = `
    <div class="quiz-wrap">
      <div class="score-card">
        <div style="font-size:3rem">${emoji}</div>
        <h2>${t('score_title')}</h2>
        <div class="score-big">${pct}%</div>
        <div class="score-label">${t('score_label')}</div>
        <div class="score-breakdown">
          <div class="score-stat score-correct"><div class="num">${mistakesCorrect}</div><div class="lbl">${t('correct_label')} ✓ removed</div></div>
          <div class="score-stat score-wrong"><div class="num">${mistakesWrong}</div><div class="lbl">${t('wrong_label')} – still in list</div></div>
        </div>
        ${remaining > 0
          ? `<p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem">${t('mistakes_count', {n: remaining})} remaining</p>`
          : `<p style="color:var(--success);font-weight:700;margin-bottom:1.5rem">🎉 ${t('mistakes_done_subject')}</p>`
        }
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
          ${remaining > 0 ? `<button class="btn btn-secondary" onclick="renderMistakesPicker()">${t('play_again')}</button>` : ''}
          <button class="btn btn-ghost" onclick="showHome()">${t('back_home')}</button>
        </div>
      </div>
    </div>
  `;
}

// ─── Init ─────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.lang === currentLang);
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

showHome();
</script>
</body>
</html>
